<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Takk og på stell</title>
<link rel="manifest" id="pwa-manifest">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Takk">
<meta name="theme-color" content="#C22B2B">
<link rel="apple-touch-icon" href="takk-ikon.png">
<link rel="icon" type="image/png" href="takk-ikon.png">
<script>
(function(){
  var m={name:"Takk og på stell",short_name:"Takk",description:"Takk og på stell",
    start_url:".",display:"standalone",background_color:"#FBFAF9",theme_color:"#C22B2B",
    icons:[{src:"takk-ikon.png",sizes:"512x512",type:"image/png",purpose:"any maskable"}]};
  var b=new Blob([JSON.stringify(m)],{type:"application/manifest+json"});
  document.getElementById("pwa-manifest").href=URL.createObjectURL(b);
})();
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4EADB;--card:#FDF7EC;--ink:#3D211C;--red:#8E1F1D;
  --salmon:#F5A38B;--red-soft:#FAD5C6;--rose:#C99383;--amber:#B86E2A;
  --muted:#8A6A5C;--line:#E8D6C2;
}
body{background:var(--bg);color:var(--ink);font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;font-size:15px;line-height:1.5;min-height:100vh}

/* ── Layout: sidebar + main ── */
.layout{display:flex;min-height:100vh}
.sidebar{
  width:230px;background:var(--card);border-right:1px solid var(--line);
  padding:16px 0 40px;flex-shrink:0;overflow-y:auto;
  position:fixed;top:0;bottom:0;left:0;z-index:150;
  transform:translateX(-100%);transition:transform .2s;
}
.sidebar.open{transform:translateX(0)}
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:140;display:none}
.sidebar-overlay.show{display:block}
.main{flex:1;min-width:0;padding-bottom:100px}
@media(min-width:900px){
  .sidebar{transform:none;position:sticky;height:100vh}
  .sidebar-overlay{display:none!important}
  .main{margin-left:0}
  .menu-btn{display:none}
}

/* Sidebar innhold */
.side-title{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--rose);padding:6px 18px 10px}
.side-month{display:flex;align-items:center;gap:8px;padding:8px 18px;cursor:pointer;user-select:none;font-size:14px;font-weight:600;color:var(--ink)}
.side-month:hover{background:var(--bg)}
.side-sub{display:flex;align-items:center;gap:8px;padding:6px 18px 6px 34px;cursor:pointer;font-size:13px;color:var(--muted);user-select:none}
.side-sub:hover{background:var(--bg)}
.side-leaf{display:block;width:100%;text-align:left;padding:5px 18px 5px 52px;font-size:13px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:inherit}
.side-leaf:hover{background:var(--bg);color:var(--red)}
.side-leaf.on{color:var(--red);font-weight:600}
.s-arrow{width:14px;flex-shrink:0;color:var(--red);font-size:10px;transition:transform .15s;display:inline-flex;justify-content:center}
.s-arrow.open{transform:rotate(90deg)}

/* Topbar */
.topbar{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--line);padding:12px 16px 0}
.topbar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.menu-btn{background:none;border:1px solid var(--line);border-radius:8px;font-size:16px;padding:4px 10px;cursor:pointer;color:var(--ink)}
h1{font-size:13px;font-weight:700;letter-spacing:.12em;flex:1}
.edit-btn{font-size:13px;font-weight:600;color:var(--muted);background:none;border:none;cursor:pointer;font-family:inherit}
.edit-btn.on{color:var(--red)}
.icon-btn{font-size:12px;font-weight:600;color:var(--muted);background:none;border:1px solid var(--line);border-radius:8px;padding:4px 9px;cursor:pointer;font-family:inherit}
.tabs{display:flex;gap:2px}
.tab{flex:1;padding:9px 0;border:none;background:none;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;font-family:inherit}
.tab.on{color:var(--red);border-bottom-color:var(--red)}

/* Innhold */
.view-title{font-size:15px;font-weight:700;padding:16px 16px 2px}
.view-sub{font-size:12px;color:var(--muted);padding:0 16px 8px}
.card{background:var(--card);border-radius:14px;overflow:hidden;margin:8px 12px 4px;border:1px solid var(--line)}
.entry-row{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:1px solid var(--line)}
.entry-row:last-child{border-bottom:none}
.entry-dot{width:5px;height:5px;border-radius:99px;background:var(--rose);flex-shrink:0;margin-top:8px}
.entry-body{flex:1;min-width:0}
.entry-text{font-size:13px;color:var(--ink);line-height:1.5}
.entry-date{font-size:11px;color:var(--rose);margin-top:1px}
.entry-cats{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.entry-cat{font-size:10px;color:var(--red);background:var(--red-soft);padding:2px 7px;border-radius:99px}
.tag-pill{font-size:10px;color:var(--amber);background:#F5E8D8;padding:2px 7px;border-radius:99px}
.del-btn{font-size:12px;color:var(--red);background:none;border:none;cursor:pointer;padding:2px 4px;align-self:center;flex-shrink:0}
.empty{padding:18px;font-size:14px;color:var(--muted);line-height:1.7}
.hint-box{margin:12px 12px 0;padding:9px 14px;background:var(--red-soft);border-radius:10px;font-size:12px;color:var(--red)}

/* Rutinerad */
.chk{width:22px;height:22px;border-radius:6px;flex-shrink:0;margin-top:1px;border:2px solid var(--line);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:transparent}
.chk.done{border-color:var(--salmon);background:var(--salmon);color:var(--red)}

/* Rutiner som knapper */
.rt-chips{display:flex;flex-wrap:wrap;gap:8px;padding:12px 14px}
.rt-btn{padding:8px 14px;border-radius:99px;border:1.5px solid var(--line);background:var(--card);color:var(--ink);font-size:13px;cursor:pointer;font-family:inherit;transition:background .1s}
.rt-btn.done{background:var(--salmon);border-color:var(--salmon);color:var(--red);font-weight:600}

/* Linjert dagliste */
.daylist{padding:6px 10px 8px}
.dl-row{display:flex;align-items:baseline;gap:8px;padding:2px 4px;border-bottom:1px solid var(--line);min-height:19px;font-size:11px}
.dl-row:last-child{border-bottom:none}
.dl-row.wend{background:var(--bg)}
.dl-wk{width:16px;flex-shrink:0;color:var(--rose);font-size:9px;text-align:right}
.dl-date{width:42px;flex-shrink:0;color:var(--muted)}
.dl-row.today .dl-date,.dl-row.today .dl-wk{color:var(--red);font-weight:700}
.dl-evs{display:flex;flex-wrap:wrap;gap:4px;flex:1;min-width:0}
.dl-ev{font-size:11px;line-height:1.4;border:none;background:var(--salmon);color:var(--red);font-weight:600;border-radius:6px;padding:1px 8px;cursor:pointer;font-family:inherit;text-align:left}
.dl-ev.done{opacity:.4;text-decoration:line-through}

/* Komprimert kategorioversikt */
.freq-block{padding:8px 14px;border-bottom:1px solid var(--line)}
.freq-block:last-child{border-bottom:none}
.freq-main{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700}
.freq-subs{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.freq-pill{font-size:11px;color:var(--muted);background:var(--bg);border:1px solid var(--line);padding:2px 8px;border-radius:99px;font-family:inherit}
button.freq-pill{cursor:pointer}
button.freq-pill:hover{color:var(--red);border-color:var(--red)}

/* Oppsummering */
.cloud{padding:20px 16px;display:flex;flex-wrap:wrap;gap:10px 14px;align-items:baseline;justify-content:center}
.cloud-word{background:none;border:none;cursor:pointer;font-family:inherit;padding:0}
.cloud-word.lv1{color:#7A2E28;opacity:.75}
.cloud-word.lv2{color:#9C3D2E}
.cloud-word.lv3{color:#BF5638}
.cloud-word.lv4{color:#E07348}
.cloud-word.lv5{color:#FF9466}
.cloud-word.hot{font-weight:700}
.cloud-word.sel{color:var(--amber);font-weight:700;text-decoration:underline}
.freq-row{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid var(--line)}
.freq-row:last-child{border-bottom:none}
.freq-name{flex:1;font-size:13px}
.freq-name.main{font-weight:700}
.freq-name.sub{padding-left:16px;color:var(--muted)}
.freq-count{font-size:12px;color:var(--rose)}

/* FAB — brukes ikke, Nytt innlegg er i toppmenyen */

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.32);display:flex;align-items:flex-end;justify-content:center;z-index:200}
.modal{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;padding:20px 18px 32px}
.modal-title{font-size:18px;font-weight:700;margin-bottom:16px}
.close-btn{float:right;background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted)}
.field-lbl{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;display:block;margin:16px 0 6px}
.inp{width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid var(--line);font-size:15px;background:var(--bg);color:var(--ink);font-family:inherit}
.inp:focus{outline:none;border-color:var(--red)}
textarea.inp{min-height:80px;resize:vertical}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.chip{padding:6px 12px;border-radius:99px;font-size:13px;cursor:pointer;border:1.5px solid var(--line);background:var(--card);color:var(--ink);font-family:inherit}
.chip.on{border-color:var(--red);background:var(--red-soft);color:var(--red);font-weight:600}
.chip-new{padding:6px 12px;border-radius:99px;font-size:13px;cursor:pointer;border:1.5px dashed var(--rose);background:transparent;color:var(--muted);font-family:inherit}
.save-btn{width:100%;margin-top:18px;padding:13px 0;border-radius:12px;border:none;background:var(--salmon);color:var(--red);font-size:16px;font-weight:700;cursor:pointer;font-family:inherit}
.save-btn:disabled{background:#D8C2C2;cursor:default}
.del-full-btn{display:block;width:100%;margin-top:10px;padding:11px 0;border-radius:12px;border:1.5px solid var(--red);background:transparent;color:var(--red);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
.step-back{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;margin-bottom:8px;display:block;font-family:inherit}
.hint{font-size:12px;color:var(--rose);margin-top:4px}
.add-btn{display:block;width:calc(100% - 24px);margin:10px 12px;padding:11px 0;border-radius:12px;border:1.5px dashed var(--rose);background:transparent;color:var(--muted);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}

@media(max-width:480px){
  body{font-size:13px}
  h1{font-size:12px}
  .tab{font-size:11px}
  .card{margin:8px 8px 4px}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div id="app"><div class="empty" style="padding:40px 18px">Laster …</div></div>

<script>
'use strict';

var SK='takknemlighet-v2';
var MND_FULL=['januar','februar','mars','april','mai','juni','juli','august','september','oktober','november','desember'];
var UKEDAGER_FULL=['mandag','tirsdag','onsdag','torsdag','fredag','lørdag','søndag'];

function pad(n){return String(n).padStart(2,'0');}
function dow(d){return(new Date(d).getDay()+6)%7;}
function isoDate(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function fmtDate(s){var d=new Date(s+'T00:00:00');return d.getDate()+'. '+MND_FULL[d.getMonth()]+' '+d.getFullYear();}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function q(s){return String(s).replace(/'/g,'\\x27');}
function nbSort(a,b){return a.localeCompare(b,'nb');}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}

var today=new Date();
var curYear=today.getFullYear();
var curMonth=today.getMonth()+1;

/* ── State ──
   entries:  {id,text,cats:[subIds],tags:[],date}
   cats:     {id,name,parentId?}
   routines: {id,name,cats:[subIds],months:[1-12] (tom=alle),log:['YYYY-MM']}
   events:   {id,name,cats:[subIds],year,month,done}
*/
var entries=[],cats=[],routines=[],events=[],goals=[],laters=[],results=[],inventories=[],budgetRows=[],deposits=[];
var invShowMissing=false;
var openGoals={};
var editMode=false;
var modal=null;
var drawerOpen=false;
var dOpenMonth={},dOpenSec={};
var view={kind:'hjem',month:curMonth,year:curYear};
var selectedTag=null;
var searchQuery='';

/* ── Persist ── */
function load(){
  try{entries=JSON.parse(localStorage.getItem(SK+'_entries')||'[]');}catch(e){entries=[];}
  try{cats=JSON.parse(localStorage.getItem(SK+'_cats')||'[]');}catch(e){cats=[];}
  try{routines=JSON.parse(localStorage.getItem(SK+'_routines')||'[]');}catch(e){routines=[];}
  try{events=JSON.parse(localStorage.getItem(SK+'_events')||'[]');}catch(e){events=[];}
  try{goals=JSON.parse(localStorage.getItem(SK+'_goals')||'[]');}catch(e){goals=[];}
  try{laters=JSON.parse(localStorage.getItem(SK+'_laters')||'[]');}catch(e){laters=[];}
  try{results=JSON.parse(localStorage.getItem(SK+'_results')||'[]');}catch(e){results=[];}
  try{inventories=JSON.parse(localStorage.getItem(SK+'_inv')||'[]');}catch(e){inventories=[];}
  try{budgetRows=JSON.parse(localStorage.getItem(SK+'_budget')||'[]');}catch(e){budgetRows=[];}
  try{deposits=JSON.parse(localStorage.getItem(SK+'_deposits')||'[]');}catch(e){deposits=[];}
  render();
}
function save(){
  try{localStorage.setItem(SK+'_entries',JSON.stringify(entries));}catch(e){}
  try{localStorage.setItem(SK+'_cats',JSON.stringify(cats));}catch(e){}
  try{localStorage.setItem(SK+'_routines',JSON.stringify(routines));}catch(e){}
  try{localStorage.setItem(SK+'_events',JSON.stringify(events));}catch(e){}
  try{localStorage.setItem(SK+'_goals',JSON.stringify(goals));}catch(e){}
  try{localStorage.setItem(SK+'_laters',JSON.stringify(laters));}catch(e){}
  try{localStorage.setItem(SK+'_results',JSON.stringify(results));}catch(e){}
  try{localStorage.setItem(SK+'_inv',JSON.stringify(inventories));}catch(e){}
  try{localStorage.setItem(SK+'_budget',JSON.stringify(budgetRows));}catch(e){}
  try{localStorage.setItem(SK+'_deposits',JSON.stringify(deposits));}catch(e){}
}

/* ── Navigasjon ── */
function toggleDrawer(){drawerOpen=!drawerOpen;render();}
function dToggleMonth(m){dOpenMonth[m]=!dOpenMonth[m];render();}
function dToggleSec(key){dOpenSec[key]=!dOpenSec[key];render();}
function goArsrapport(y){view={kind:'arsrapport',year:y};selectedTag=null;searchQuery='';drawerOpen=false;render();}
function goRapport(m,y){view={kind:'rapport',month:m,year:y};selectedTag=null;searchQuery='';drawerOpen=false;render();}
function goHjem(){view={kind:'hjem',month:curMonth,year:curYear};selectedTag=null;searchQuery='';drawerOpen=false;render();}
function goDagbok(m,y){view={kind:'dagbok',month:m,year:y};selectedTag=null;searchQuery='';drawerOpen=false;render();}
function goRutiner(m,catId){view={kind:'rutiner',month:m,cat:catId||null};drawerOpen=false;render();}
function goOppsummering(){view={kind:'oppsummering'};selectedTag=null;drawerOpen=false;render();}
function goPlanlegging(){view={kind:'planlegging'};drawerOpen=false;render();}
function selectTag(t){selectedTag=(selectedTag===t)?null:t;render();}
function setEdit(v){editMode=v;render();}

/* ── Dagbok-handlinger ── */
function deleteEntry(id){entries=entries.filter(function(e){return e.id!==id;});save();render();}

/* ── Rutine/hendelse-handlinger ── */
function toggleRoutine(id,ym){
  var r=routines.find(function(x){return x.id===id;});if(!r)return;
  r.log=r.log||[];
  r.log=r.log.includes(ym)?r.log.filter(function(l){return l!==ym;}):[].concat(r.log,[ym]);
  save();render();
}
function toggleEvent(id,year){
  var e=events.find(function(x){return x.id===id;});if(!e)return;
  if(e.repeat){
    year=Number(year)||curYear;
    e.log=e.log||[];
    e.log=e.log.includes(year)?e.log.filter(function(y){return y!==year;}):[].concat(e.log,[year]);
  } else {
    e.done=!e.done;
  }
  save();render();
}
function evDone(e,year){return e.repeat?(e.log||[]).includes(Number(year)):!!e.done;}
function evYears(e,y){var s=Number(e.sinceYear);return s>0&&y-s>0?y-s:null;}
function evYearsTag(e,y,light){
  var n=evYears(e,y);if(n===null)return'';
  return light
    ?' <span style="opacity:.75;font-weight:400">· '+n+' år</span>'
    :' <span style="color:var(--rose);font-size:11px;font-weight:400">· '+n+' år</span>';
}
function deleteRoutine(id){routines=routines.filter(function(r){return r.id!==id;});save();closeModal();}
function deleteEvent(id){events=events.filter(function(e){return e.id!==id;});save();closeModal();}
function goalById(id){return goals.find(function(g){return g.id===id;});}
function resultById(id){return results.find(function(r){return r.id===id;});}
function resultsFor(goalId){return results.filter(function(r){return r.valueId===goalId;}).sort(function(a,b){return(a.year*100+a.month)-(b.year*100+b.month)||nbSort(a.name,b.name);});}
function monthsLeft(r){return(r.year-curYear)*12+(r.month-curMonth);}
function resultDeadlineHTML(r){
  var saveTxt='';
  if(r.targetAmount){
    var sv=savedFor(r.id);
    saveTxt=' \u00b7 '+fmtKr(sv)+' av '+fmtKr(r.targetAmount)+' kr';
    var ml0=monthsLeft(r);
    if(!r.achieved&&ml0>0&&sv<r.targetAmount){
      saveTxt+=' \u00b7 ~'+fmtKr((r.targetAmount-sv)/Math.ceil(ml0/3))+'/kvartal';
    }
  }
  if(r.achieved)return' <span style="font-size:11px;color:var(--red);font-weight:700">\u2713 oppn\u00e5dd'+saveTxt+'</span>';
  var ml=monthsLeft(r);
  var txt='frist '+MND_FULL[r.month-1]+' '+r.year;
  if(ml<0)return' <span style="font-size:11px;color:var(--muted);font-weight:400">'+txt+' \u00b7 passert'+saveTxt+'</span>';
  return' <span style="font-size:11px;color:var(--rose);font-weight:400">'+txt+' \u00b7 '+(ml===0?'denne m\u00e5neden':ml+' mnd igjen')+saveTxt+'</span>';
}
function resultCatMatch(r,entryCats){
  var sc=r.subCats||[];
  if(!sc.length)return false;
  return(entryCats||[]).some(function(cid){return sc.includes(cid);});
}
function openResultModal(){modal={step:'result',form:{name:'',valueId:'',month:curMonth,year:curYear+1,subCats:[],achieved:false,targetAmount:''}};render();}
function openEditResult(id){
  var r=resultById(id);if(!r)return;
  modal={step:'result_edit',form:{id:id,name:r.name,valueId:r.valueId,month:r.month,year:r.year,subCats:[].concat(r.subCats||[]),achieved:!!r.achieved,targetAmount:r.targetAmount||''}};render();
}
function submitResult(){
  var f=mf();var name=(f.name||'').trim();if(!name||!f.valueId)return;
  results.push({id:'x'+Date.now()+Math.random().toString(36).slice(2,6),name:name,valueId:f.valueId,month:Number(f.month),year:Number(f.year),subCats:f.subCats||[],achieved:!!f.achieved,targetAmount:parseKr(f.targetAmount)});
  save();closeModal();
}
function saveEditResult(){
  var f=mf();var name=(f.name||'').trim();if(!name||!f.valueId)return;
  var r=resultById(f.id);if(!r)return;
  r.name=name;r.valueId=f.valueId;r.month=Number(f.month);r.year=Number(f.year);
  r.subCats=f.subCats||[];r.achieved=!!f.achieved;r.targetAmount=parseKr(f.targetAmount);
  save();closeModal();
}
function deleteResultSilent(id){
  deposits=deposits.filter(function(d){return d.resultId!==id;});
  routines.forEach(function(r){r.resultIds=(r.resultIds||[]).filter(function(x){return x!==id;});});
  events.forEach(function(e){e.resultIds=(e.resultIds||[]).filter(function(x){return x!==id;});});
  results=results.filter(function(r){return r.id!==id;});
}
function deleteResult(id){
  deposits=deposits.filter(function(d){return d.resultId!==id;});
  routines.forEach(function(r){r.resultIds=(r.resultIds||[]).filter(function(x){return x!==id;});});
  events.forEach(function(e){e.resultIds=(e.resultIds||[]).filter(function(x){return x!==id;});});
  results=results.filter(function(r){return r.id!==id;});
  save();closeModal();
}
function toggleFormResult(id){
  var a=mf().resultIds||[];
  mf().resultIds=a.includes(id)?a.filter(function(x){return x!==id;}):[].concat(a,[id]);
  render();

function exportJSON(){
  var data=JSON.stringify({entries:entries,cats:cats,routines:routines,events:events,goals:goals,laters:laters,results:results,inventories:inventories,budgetRows:budgetRows,deposits:deposits},null,2);
  var blob=new Blob([data],{type:'application/json'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='takknemlighetsdagbok-'+isoDate(today)+'.json';
  a.click();
  try{localStorage.setItem(SK+'_backup',String(Date.now()));}catch(e){}
  render();
}
function importJSON(){
  var inp=document.createElement('input');
  inp.type='file';inp.accept='.json,application/json';
  inp.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var d=JSON.parse(ev.target.result);
        if(!d.entries)throw new Error('Ugyldig fil');
        entries=d.entries||[];cats=d.cats||[];routines=d.routines||[];events=d.events||[];goals=d.goals||[];laters=d.laters||[];results=d.results||[];inventories=d.inventories||[];budgetRows=d.budgetRows||[];deposits=d.deposits||[];
        save();render();
      }catch(err){alert('Kunne ikke lese filen: '+err.message);}
    };
    reader.readAsText(file);
  };
  inp.click();
}
function exportTekst(){
  var lines=['# Takknemlighetsdagbok','',''];
  var mains=cats.filter(function(c){return!c.parentId;}).sort(function(a,b){return nbSort(a.name,b.name);});
  mains.forEach(function(m){
    var subs=cats.filter(function(c){return c.parentId===m.id;}).sort(function(a,b){return nbSort(a.name,b.name);});
    var any=false;var block=['## '+m.name,''];
    subs.forEach(function(s){
      var es=entries.filter(function(e){return e.cats.includes(s.id);});
      if(!es.length)return;
      any=true;block.push('### '+s.name,'');
      es.slice().sort(function(a,b){return a.date<b.date?1:-1;}).forEach(function(e){
        block.push('- '+e.text+' _('+fmtDate(e.date)+')_'+((e.tags||[]).length?' #'+e.tags.join(' #'):''));
      });
      block.push('');
    });
    if(any)lines=lines.concat(block);
  });
  var blob=new Blob([lines.join('\n')],{type:'text/markdown'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='takknemlighetsdagbok-'+isoDate(today)+'.md';
  a.click();
}

  c.name=name;
  if(c.parentId&&f.parentId)c.parentId=f.parentId;
  save();closeModal();
}
function mergeCat(fromId,toId){
  if(!fromId||!toId||fromId===toId)return;
  var from=catById(fromId),to=catById(toId);
  if(!from||!to)return;
  var remap=function(arr){
    var out=(arr||[]).map(function(cid){return cid===fromId?toId:cid;});
    return out.filter(function(c,i){return out.indexOf(c)===i;});
  };
  entries.forEach(function(e){e.cats=remap(e.cats);});
  routines.forEach(function(r){r.cats=remap(r.cats);});
  events.forEach(function(e){e.cats=remap(e.cats);});
  cats.forEach(function(c){if(c.parentId===fromId)c.parentId=toId;});
  cats=cats.filter(function(c){return c.id!==fromId;});
  budgetRows.forEach(function(b){if(b.catId===fromId)b.catId=toId;});
  save();closeModal();
}

function deleteCat(id){
  var c=cats.find(function(x){return x.id===id;});if(!c)return;
  if(!c.parentId){
    var subIds=cats.filter(function(x){return x.parentId===id;}).map(function(x){return x.id;});
    cats=cats.filter(function(x){return x.id!==id&&x.parentId!==id;});
    var strip=function(arr){return arr.filter(function(cid){return !subIds.includes(cid)&&cid!==id;});};
    entries.forEach(function(e){e.cats=strip(e.cats);});
    routines.forEach(function(r){r.cats=strip(r.cats||[]);});
    events.forEach(function(e){e.cats=strip(e.cats||[]);});
  } else {
    cats=cats.filter(function(x){return x.id!==id;});
    entries.forEach(function(e){e.cats=e.cats.filter(function(cid){return cid!==id;});});
    routines.forEach(function(r){r.cats=(r.cats||[]).filter(function(cid){return cid!==id;});});
    events.forEach(function(e){e.cats=(e.cats||[]).filter(function(cid){return cid!==id;});});
  }
  save();closeModal();
}

function flushTags(f){
  var inp=document.getElementById('tag-inp');
  if(inp&&inp.value.trim()){
    inp.value.split(',').map(function(v){return v.trim().toLowerCase();}).filter(Boolean)
      .forEach(function(v){if(!f.tags.includes(v))f.tags=[].concat(f.tags,[v]);});
  }
}
function entryValid(){var f=mf();return(f.text||'').trim().length>0&&f.cats.length>0;}
function submitEntry(){

  if(!f.cats.length)return;
  entries.unshift({id:'e'+Date.now()+Math.random().toString(36).slice(2,6),text:text,cats:f.cats,tags:f.tags||[],date:isoDate(today)});
  save();closeModal();

}

function submitEvent(){

function updateSaveBtn(){
  var btn=document.querySelector('.save-btn');

  if(step==='routine'||step==='routine_edit'||step==='event'||step==='event_edit')enabled=routineValid();

  }
  if(step==='cat_edit'||step==='goal'||step==='goal_edit'||step==='later'||step==='later_edit')enabled=(mf().name||'').trim().length>0;

function entryRowHTML(e){
  var pillItems=e.cats.map(function(cid){
    var c=catById(cid);if(!c)return'';
    var m=c.parentId?catById(c.parentId):null;
    return'<span class="entry-cat">'+esc((m?m.name+' / ':'')+c.name)+'</span>';
  }).join('')+(e.tags||[]).map(function(t){
    return'<span class="tag-pill">#'+esc(t)+'</span>';
  }).join('');
  var pills=pillItems?'<div class="entry-cats">'+pillItems+'</div>':'';
  return'<div class="entry-row">'
    +'<div class="entry-dot"></div>'
    +'<div class="entry-body">'
    +'<div class="entry-text">'+esc(e.text)+'</div>'
    +'<div class="entry-date">'+fmtDate(e.date)+'</div>'
    +pills
    +'</div>'
    +(editMode?'<button class="icon-btn" style="font-size:11px;padding:2px 7px;align-self:center;flex-shrink:0" onclick="openEditEntry(\''+q(e.id)+'\')">✎</button>'
       +'<button class="del-btn" onclick="deleteEntry(\''+q(e.id)+'\')">✕</button>':'')
    +'</div>';
}

/* ── Sidemeny ── */
function sidebarHTML(){
  var h='<div class="side-month'+(view.kind==='hjem'?'" style="color:var(--red)':'')+'" onclick="goHjem()"><span class="s-arrow">☀\ufe0e</span>I dag</div>';
  h+='<div class="side-title" style="padding-top:12px">Måneder</div>';
  for(var m=1;m<=12;m++){
    var open=!!dOpenMonth[m];
    h+='<div class="side-month" onclick="dToggleMonth('+m+')">'
      +'<span class="s-arrow'+(open?' open':'')+'">▶\ufe0e</span>'+cap(MND_FULL[m-1])+'</div>';
    if(open){
      // Dagbok med årstall
      var dbKey=m+'-db';var dbOpen=!!dOpenSec[dbKey];
      h+='<div class="side-sub" onclick="dToggleSec(\''+dbKey+'\')">'
        +'<span class="s-arrow'+(dbOpen?' open':'')+'">▶\ufe0e</span>Dagbok</div>';
      if(dbOpen){
        var years={};years[curYear]=true;
        entries.forEach(function(e){
          if(Number(e.date.slice(5,7))===m)years[Number(e.date.slice(0,4))]=true;
        });
        Object.keys(years).map(Number).sort(function(a,b){return b-a;}).forEach(function(y){
          var on=view.kind==='dagbok'&&view.month===m&&view.year===y;
          h+='<button class="side-leaf'+(on?' on':'')+'" onclick="goDagbok('+m+','+y+')">'+y+'</button>';
        });
      }
      // Rutiner og hendelser med kategorier
      var rtKey=m+'-rt';var rtOpen=!!dOpenSec[rtKey];
      h+='<div class="side-sub" onclick="dToggleSec(\''+rtKey+'\')">'
        +'<span class="s-arrow'+(rtOpen?' open':'')+'">▶\ufe0e</span>Rutiner og hendelser</div>';
      if(rtOpen){
        var on0=view.kind==='rutiner'&&view.month===m&&!view.cat;
        h+='<button class="side-leaf'+(on0?' on':'')+'" onclick="goRutiner('+m+',null)">Alle</button>';
        cats.filter(function(c){return!c.parentId;}).sort(function(a,b){return nbSort(a.name,b.name);}).forEach(function(c){
          var on=view.kind==='rutiner'&&view.month===m&&view.cat===c.id;
          h+='<button class="side-leaf'+(on?' on':'')+'" onclick="goRutiner('+m+',\''+q(c.id)+'\')">'+esc(c.name)+'</button>';
        });
      }
    }
  }
  return h;
}

/* ── Visninger ── */
function hjemViewHTML(){
  var todayIso=isoDate(today);
  var ym=curYear+'-'+pad(curMonth);
  var h='<div class="view-title" style="font-size:18px">'+cap(UKEDAGER_FULL[dow(today)])+' '+today.getDate()+'. '+MND_FULL[today.getMonth()]+' '+today.getFullYear()+'</div>';

  // Dagens innlegg
  var todaysEntries=entries.filter(function(e){return e.date===todayIso;});
  if(todaysEntries.length){
    h+='<div class="view-sub" style="padding-top:10px;font-weight:600">Skrevet i dag</div>'
      +'<div class="card">'+todaysEntries.map(entryRowHTML).join('')+'</div>';
  } else {
    h+='<div class="hint-box">Ingenting ført inn i dag ennå — trykk «Nytt innlegg» når du er klar.</div>';
  }

  // På denne dagen tidligere år
  var mmdd=todayIso.slice(5);
  var earlier=entries.filter(function(e){return e.date.slice(5)===mmdd&&e.date<todayIso;})
    .sort(function(a,b){return a.date<b.date?1:-1;});
  if(earlier.length){
    h+='<div class="view-sub" style="padding-top:12px;font-weight:600;color:var(--red)">På denne dagen tidligere år</div>'
      +'<div class="card">'+earlier.map(entryRowHTML).join('')+'</div>';
  }

  // Rutiner denne måneden
  var monthRoutines=routines.filter(function(r){
    var months=r.months||[];
    return !months.length||months.includes(curMonth);
  }).sort(function(a,b){return nbSort(a.name,b.name);});

  var chipItems=routineChipItems(monthRoutines,curMonth,curYear,true);
  if(chipItems.length){
    var doneCount=chipItems.filter(function(it){return it.done;}).length;
    h+='<div class="view-sub" style="padding-top:12px;font-weight:600">Rutiner i '+MND_FULL[curMonth-1]+' <span style="font-weight:400;color:var(--rose)">· '+doneCount+' av '+chipItems.length+'</span></div>'
      +'<div class="card">'+routineChipsHTML(chipItems)+'</div>';
  }

  // Hendelser denne måneden
  var monthEvents=monthEventsFor(curMonth,curYear)

function monthEventsFor(m,y){
  return events.filter(function(e){
    return e.month===m&&(e.repeat?y>=Number(e.year):Number(e.year)===y);
  });
}

function weekNum(date){
  var d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));
  var day=(d.getUTCDay()+6)%7;
  d.setUTCDate(d.getUTCDate()-day+3);
  var thu=d.getTime();
  d.setUTCMonth(0,1);
  if(d.getUTCDay()!==4)d.setUTCMonth(0,1+((4-d.getUTCDay())+7)%7);
  return 1+Math.round((thu-d.getTime())/(7*24*3600*1000));
}

function dayListHTML(m,y,evList){

  for(var d=1;d<=daysIn;d++){
    var dt=new Date(y,m-1,d);
    var wk=weekNum(dt);

      +'<span class="dl-wk">'+(wk!==lastWeek?wk:'')+'</span>'

      }).join('')+'</span>'
      +'</div>';
    lastWeek=wk;
  }
  h+='</div>';
  return h;
}

function isWeekly(r){return r.freq==='weekly'||r.freq==='odd'||r.freq==='even';}
function weekYear(date){
  var d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));
  var day=(d.getUTCDay()+6)%7;
  d.setUTCDate(d.getUTCDate()-day+3);
  return d.getUTCFullYear();
}
function routineWeeksIn(m,y,freq){
  var daysIn=new Date(y,m,0).getDate();
  var seen={},list=[];
  for(var d=1;d<=daysIn;d++){
    var dt=new Date(y,m-1,d);
    var wn=weekNum(dt);
    var key='w'+weekYear(dt)+'-'+pad(wn);
    if(seen[key])continue;seen[key]=1;
    if(freq==='odd'&&wn%2===0)continue;
    if(freq==='even'&&wn%2===1)continue;
    list.push({week:wn,key:key});
  }
  return list;
}
function routineChipItems(list,m,y,onlyCurrentWeek){
  var ym=y+'-'+pad(m);
  var items=[];
  var nowKey='w'+weekYear(today)+'-'+pad(weekNum(today));
  list.forEach(function(r){
    if(isWeekly(r)){
      routineWeeksIn(m,y,r.freq).forEach(function(w){
        if(onlyCurrentWeek&&w.key!==nowKey)return;
        items.push({rid:r.id,key:w.key,label:r.name+' · uke '+w.week,done:(r.log||[]).includes(w.key)});
      });
    } else {
      items.push({rid:r.id,key:ym,label:r.name,done:(r.log||[]).includes(ym)});
    }
  });
  return items;
}

function routineMonthStatus(r,m,y){
  var ym=y+'-'+pad(m);
  if(isWeekly(r)){
    var weeks=routineWeeksIn(m,y,r.freq);
    var dn=weeks.filter(function(w){return(r.log||[]).includes(w.key);}).length;
    return{done:weeks.length>0&&dn===weeks.length,txt:dn+'/'+weeks.length+' uker'};
  }
  return{done:(r.log||[]).includes(ym),txt:null};
}
function hasMonthContent(m,y){
  var ym=y+'-'+pad(m);
  if(entries.some(function(e){return e.date.slice(0,7)===ym;}))return true;
  if(routines.some(function(r){
    if(isWeekly(r)){
      return routineWeeksIn(m,y,r.freq).some(function(w){return(r.log||[]).includes(w.key);});
    }
    return(r.log||[]).includes(ym);
  }))return true;
  if(monthEventsFor(m,y).some(function(e){return evDone(e,y);}))return true;
  return false;
}
function goalGroupSort(rows){
  return rows.sort(function(a,b){
    var ga=a.gent.length?0:(a.done>0?1:(a.total>0?2:3));
    var gb=b.gent.length?0:(b.done>0?1:(b.total>0?2:3));
    if(ga!==gb)return ga-gb;
    if(ga===0&&a.gent.length!==b.gent.length)return b.gent.length-a.gent.length;
    return nbSort(a.g.name,b.g.name);
  });
}

      h+=secLbl('Rutiner og hendelser')+secNote('Ingenting knyttet til denne verdien denne m\u00e5neden.');
    }

    if(!(g.cats||[]).length){
      h+=secLbl('Takknemlighet')
        +secNote('Koble verdien til hovedkategorier (via \u270e under Planlegging) for \u00e5 se takknemligheten den gir.');
    } else {
      h+=secLbl('Takknemlighet \u00b7 '+gent.length);
      h+=gent.length?gent.map(entryRowHTML).join(''):secNote('Ingen innlegg i tilknyttede kategorier denne m\u00e5neden.');
    }
    h+='</div>';
  });

  var rest=monthEntries.filter(function(e){return!goals.some(function(g){return goalCatMatch(g,e.cats);});});
  if(rest.length){
    h+='<div class="card" style="margin-top:14px">'
      +'<div style="display:flex;align-items:center;gap:8px;padding:11px 14px;border-bottom:1px solid var(--line)">'
      +'<span style="font-weight:700;flex:1">Utenfor verdiene</span>'
      +'<span style="font-size:12px;color:var(--rose)">'+rest.length+' innlegg</span></div>'
      +secNote('Gleder du ikke har planlagt deg til.')
      +rest.map(entryRowHTML).join('')
      +'</div>';
  }

  var prevMonths=[];
  for(var pm=1;pm<curMonth;pm++){if(hasMonthContent(pm,curYear)&&!(pm===m&&curYear===y))prevMonths.push(pm);}
  if(prevMonths.length){
    h+='<div class="view-sub" style="padding-top:14px;font-weight:600">Tidligere m\u00e5nedsrapporter i '+curYear+'</div>'
      +'<div class="card"><div class="rt-chips">'
      +prevMonths.map(function(pm){
        return'<button class="rt-btn" onclick="goRapport('+pm+','+curYear+')">'+MND_FULL[pm-1]+'</button>';
      }).join('')
      +'</div></div>';
  }
  return h;
}

function yearsWithContent(){
  var ys={};
  entries.forEach(function(e){ys[Number(e.date.slice(0,4))]=1;});
  routines.forEach(function(r){(r.log||[]).forEach(function(k){
    ys[Number(k.charAt(0)==='w'?k.slice(1,5):k.slice(0,4))]=1;
  });});
  events.forEach(function(e){
    if(e.repeat)(e.log||[]).forEach(function(yy){ys[Number(yy)]=1;});
    else if(e.done)ys[Number(e.year)]=1;
  });
  return Object.keys(ys).map(Number).sort();
}

function arsrapportViewHTML(){

    +'</div></div>';

  var ecoRows=budgetRows.filter(function(b){return b.year===y;});

    ecoRows.forEach(function(b){
      var p=b.plan.reduce(function(a,v){return a+(v||0);},0);
      var a2=b.actual.reduce(function(a,v){return a+(v||0);},0);
      if(b.type==='in'){eInP+=p;eInA+=a2;}else{eUtP+=p;eUtA+=a2;}
    });
    var balP=eInP-eUtP,balA=eInA-eUtA;

      });
      var ge=yEvents.filter(function(e){return(e.goalIds||[]).includes(g.id)||(e.resultIds||[]).some(function(x){return resIdSet.includes(x);});});
      var gent=yearEntries.filter(function(e){return goalCatMatch(g,e.cats);});
      var total=gr.length+ge.length;
      var done=gr.filter(function(x){return x.total>0&&x.done===x.total;}).length
              +ge.filter(function(e){return evDone(e,y);}).length;
      return{g:g,gr:gr,ge:ge,gent:gent,total:total,done:done};
    });
    goalGroupSort(rows).forEach(function(row){
      var g=row.g;
      h+='<div class="card" style="margin-top:14px">'

      var rLine=function(x){

      };
      var eLine=function(e){

        return'<div style="font-size:13px;padding:2px 0">'+(d?'<span style="color:var(--red);font-weight:700">\u2713</span>':'<span style="color:var(--rose)">\u25cb</span>')+' '+esc(e.name)+' <span style="color:var(--muted);font-size:11px">'+MND_FULL[e.month-1]+'</span></div>';
      };
      var shownY={};
      vRes.forEach(function(x){
        var xr=row.gr.filter(function(w){return(w.r.resultIds||[]).includes(x.id);});
        var xe=row.ge.filter(function(e){return(e.resultIds||[]).includes(x.id);});
        var xEnt=(x.subCats||[]).length?yearEntries.filter(function(e){return resultCatMatch(x,e.cats);}).length:null;
        h+=secLbl(esc(x.name)+resultDeadlineHTML(x));
      inventories.filter(function(iv){return(iv.resultIds||[]).includes(x.id);}).forEach(function(iv){
        var ic=invCounts(iv);
        h+='<div style="padding:0 14px 4px;font-size:12px;color:var(--muted)">'+esc(iv.name)+': '+ic.have+'/'+ic.total+(ic.missing?' \u00b7 mangler '+ic.missing:' \u00b7 komplett')+'</div>';
      });
        if(xr.length||xe.length){
          h+='<div style="padding:2px 14px 6px">';
          xr.forEach(function(w){shownY[w.r.id]=1;h+=rLine(w);});
          xe.forEach(function(e){shownY[e.id]=1;h+=eLine(e);});
          h+='</div>';

        if(xEnt!==null)h+='<div style="padding:0 14px 8px;font-size:12px;color:var(--muted)">Takknemlighet \u00b7 '+xEnt+' innlegg i resultatets underkategorier</div>';

      var dirRY=row.gr.filter(function(w){return!shownY[w.r.id];});
      var dirEY=row.ge.filter(function(e){return!shownY[e.id];});
      if(dirRY.length||dirEY.length){
        h+=secLbl(vRes.length?'Direkte p\u00e5 verdien':'Rutiner og hendelser')
          +'<div style="padding:2px 14px 10px">';
        dirRY.forEach(function(w){h+=rLine(w);});
        dirEY.forEach(function(e){h+=eLine(e);});
        h+='</div>';
      } else if(!vRes.length){
        h+=secLbl('Rutiner og hendelser')+secNote('Ingenting knyttet til denne verdien i '+y+'.');
      }

      if(!(g.cats||[]).length){
        h+=secLbl('Takknemlighet')
          +secNote('Koble verdien til hovedkategorier (via \u270e under Planlegging) for \u00e5 se takknemligheten den gir.');
      } else {
        h+=secLbl('Takknemlighet \u00b7 '+row.gent.length);

          var dist=Object.keys(perM).map(Number).sort(function(a,b){return a-b;})
            .map(function(mm){return MND_FULL[mm-1].slice(0,3)+' '+perM[mm];}).join(' \u00b7 ');
          h+='<div style="padding:2px 14px 10px;font-size:13px">'+dist+'</div>'

  var yrs=yearsWithContent().filter(function(yy){return yy!==y;});
  if(yrs.length){

      +'</div></div>';

  return h;
}

function budsjettViewHTML(){
  var y=view.year;
  var qSel=view.q;
  var h='<div style="display:flex;align-items:center;gap:6px;padding:14px 12px 0">'
    +'<button class="icon-btn" onclick="goBudsjett('+(y-1)+',view.q)">\u2039</button>'
    +'<div class="view-title" style="padding:0;flex:1;text-align:center">Budsjett og regnskap \u00b7 '+y+'</div>'
    +'<button class="icon-btn" onclick="goBudsjett('+(y+1)+',view.q)">\u203a</button>'
    +'</div>';
  h+='<div class="chips" style="justify-content:center;padding:8px 12px 0">'
    +[1,2,3,4].map(function(qn){
      return'<button class="chip'+(qSel===qn?' on':'')+'" onclick="goBudsjett('+y+','+qn+')">'+KVARTAL[qn-1]+'</button>';
    }).join('')
    +'<button class="chip'+(qSel==='\u00e5r'?' on':'')+'" onclick="goBudsjett('+y+',\'\u00e5r\')">\u00c5ret</button>'
    +'</div>';

  var yearRows=budgetRows.filter(function(b){return b.year===y;});
  var sumField=function(row,field){return row[field].reduce(function(a,v){return a+(v===null?0:v);},0);};
  var pOf=function(row){return qSel==='\u00e5r'?sumField(row,'plan'):(row.plan[qSel-1]||0);};
  var aOf=function(row){return qSel==='\u00e5r'?sumField(row,'actual'):(row.actual[qSel-1]||0);};

  var mains=cats.filter(function(c){return!c.parentId;}).sort(function(a,b){return nbSort(a.name,b.name);});

  // avvik: positivt = bedre enn plan (inntekt: faktisk-plan, utgift: plan-faktisk)
  var renderSection=function(type,label){
    var rows=yearRows.filter(function(b){return(b.type==='in'?'in':'ut')===type;});
    if(!rows.length)return{html:'',p:0,a:0,any:false};
    var secP=0,secA=0;
    var hh='<div style="padding:8px 14px 2px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--rose)">'+label+'</div>'
      +'<div style="display:flex;gap:8px;padding:0 14px 2px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--rose)">'
      +'<span style="flex:1"></span><span style="width:76px;text-align:right">Plan</span><span style="width:76px;text-align:right">Faktisk</span><span style="width:60px;text-align:right">Avvik</span></div>';

    var rowLine=function(row,name,indent,computed){
      var p=computed?row.p:pOf(row);
      var a=computed?row.a:aOf(row);
      var diff=type==='in'?(a-p):(p-a);
      var pCell,aCell;
      if(computed||qSel==='\u00e5r'){
        pCell='<span style="width:76px;text-align:right;font-size:13px">'+fmtKr(p)+'</span>';
        aCell='<span style="width:76px;text-align:right;font-size:13px">'+fmtKr(a)+'</span>';
      } else {
        pCell=budgetCellHTML(row,qSel-1,'plan');
        aCell=budgetCellHTML(row,qSel-1,'actual');
      }
      var dTxt=(p||a)?'<span style="width:60px;text-align:right;font-size:12px;color:'+(diff<0?'var(--amber)':'var(--muted)')+'">'+(diff>0?'+':'')+fmtKr(diff)+'</span>':'<span style="width:60px"></span>';
      return'<div style="display:flex;align-items:center;gap:8px;padding:4px 14px">'
        +'<span style="flex:1;font-size:13px;'+(indent?'padding-left:14px;color:var(--muted)':'font-weight:700')+'">'+esc(name)
        +(!computed?' <button class="icon-btn" style="font-size:10px;padding:0 5px" onclick="openEditBudgetRow(\''+q(row.id)+'\')">\u270e</button>':'')
        +'</span>'+pCell+aCell+dTxt+'</div>';
    };

    mains.forEach(function(mc){
      var mainRow=rows.find(function(b){return b.catId===mc.id;});
      var subRows=rows.filter(function(b){var c=catById(b.catId);return c&&c.parentId===mc.id;})
        .sort(function(a,b){return nbSort((catById(a.catId)||{}).name||'',(catById(b.catId)||{}).name||'');});
      if(!mainRow&&!subRows.length)return;
      if(subRows.length){
        var agg={p:0,a:0};
        subRows.forEach(function(r){agg.p+=pOf(r);agg.a+=aOf(r);});
        if(mainRow){agg.p+=pOf(mainRow);agg.a+=aOf(mainRow);}
        hh+=rowLine(agg,mc.name,false,true);
        if(mainRow)hh+=rowLine(mainRow,'(direkte p\u00e5 '+mc.name+')',true,false);
        subRows.forEach(function(r){hh+=rowLine(r,(catById(r.catId)||{}).name||'?',true,false);});
        secP+=agg.p;secA+=agg.a;
      } else {
        hh+=rowLine(mainRow,mc.name,false,false);
        secP+=pOf(mainRow);secA+=aOf(mainRow);
      }
    });

    var sDiff=type==='in'?(secA-secP):(secP-secA);
    hh+='<div style="display:flex;align-items:center;gap:8px;padding:6px 14px;border-top:1px solid var(--line)">'
      +'<span style="flex:1;font-size:13px;font-weight:700">Sum '+label.toLowerCase()+'</span>'
      +'<span style="width:76px;text-align:right;font-size:13px;font-weight:700">'+fmtKr(secP)+'</span>'
      +'<span style="width:76px;text-align:right;font-size:13px;font-weight:700">'+fmtKr(secA)+'</span>'
      +'<span style="width:60px;text-align:right;font-size:12px;font-weight:700;color:'+(sDiff<0?'var(--amber)':'var(--muted)')+'">'+(sDiff>0?'+':'')+fmtKr(sDiff)+'</span></div>';
    return{html:hh,p:secP,a:secA,any:true};
  };

  var inn=renderSection('in','Inntekter');
  var ut=renderSection('ut','Utgifter');

  h+='<div class="card" style="margin-top:10px">';
  if(!inn.any&&!ut.any){
    h+='<div class="empty">Ingen budsjettlinjer for '+y+' enn\u00e5.</div>';
  } else {
    h+=inn.html+ut.html;
    var balP=inn.p-ut.p,balA=inn.a-ut.a,balD=balA-balP;
    h+='<div style="display:flex;align-items:center;gap:8px;padding:9px 14px;border-top:2px solid var(--line);background:var(--bg)">'
      +'<span style="flex:1;font-size:13px;font-weight:700;color:var(--red)">Balanse</span>'
      +'<span style="width:76px;text-align:right;font-size:13px;font-weight:700;color:'+(balP<0?'var(--amber)':'var(--red)')+'">'+fmtKr(balP)+'</span>'
      +'<span style="width:76px;text-align:right;font-size:13px;font-weight:700;color:'+(balA<0?'var(--amber)':'var(--red)')+'">'+fmtKr(balA)+'</span>'
      +'<span style="width:60px;text-align:right;font-size:12px;font-weight:700;color:'+(balD<0?'var(--amber)':'var(--muted)')+'">'+(balD>0?'+':'')+fmtKr(balD)+'</span></div>';
  }
  h+='</div>';
  h+='<button class="add-btn" onclick="openBudgetLineModal()">+ Ny budsjettlinje</button>';

  var saveGoals=results.filter(function(r){return r.targetAmount;}).sort(function(a,b){return(a.year*100+a.month)-(b.year*100+b.month);});
  if(saveGoals.length){
    h+='<div class="view-sub" style="padding-top:12px;font-weight:600">Sparem\u00e5l</div><div class="card">';
    saveGoals.forEach(function(r){
      h+='<div class="entry-row"><div class="entry-body">'
        +'<div class="entry-text"'+(r.achieved?' style="opacity:.55"':'')+'>'+esc(r.name)+resultDeadlineHTML(r)+'</div>'
        +'</div>'
        +'<button class="icon-btn" style="font-size:11px;padding:2px 8px;align-self:center" onclick="openDepositModal(\''+q(r.id)+'\')">+ innbetaling</button>'
        +'</div>';
    });
    h+='</div>';
  }
  return h;
}

function planleggingViewHTML(){
  var h='<div class="view-title">Planlegging</div>'
    +'<div class="view-sub">Verdier er hvem du vil være. Resultater er målbare og har frist. Rutiner og planer er det du gjør.</div>';

  h+='<div class="view-sub" style="padding-top:12px;font-weight:600">Verdier</div>';
  if(!goals.length){
    h+='<div class="card"><div class="empty">Ingen verdier ennå. En verdi er identitetsmålet — hvem du vil være — og eier en hovedkategori.</div></div>';
  } else {
    h+='<div class="card">';
    goals.slice().sort(function(a,b){return nbSort(a.name,b.name);}).forEach(function(g){
      var linkedR=routines.filter(function(r){return(r.goalIds||[]).includes(g.id);}).sort(function(a,b){return nbSort(a.name,b.name);});
      var linkedE=events.filter(function(e){return(e.goalIds||[]).includes(g.id);}).sort(function(a,b){return(a.year*100+a.month)-(b.year*100+b.month)||nbSort(a.name,b.name);});
      var open=!!openGoals[g.id];
      h+='<div style="border-bottom:1px solid var(--line)">'
        +'<div style="display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer" onclick="toggleGoalOpen(\''+q(g.id)+'\')">'
        +'<span class="s-arrow'+(open?' open':'')+'">\u25b6\ufe0e</span>'
        +'<span style="font-weight:700;flex:1">'+esc(g.name)+'</span>'
        +'<span style="font-size:11px;color:var(--rose)">'+linkedR.length+' rutiner · '+linkedE.length+' planer</span>'
        +(editMode?'<button class="icon-btn" style="font-size:11px;padding:2px 7px" onclick="event.stopPropagation();openEditGoal(\''+q(g.id)+'\')">\u270e</button>':'')
        +'</div>';
      if(open){
        h+='<div style="padding:0 14px 12px 34px">';
        if(g.text){
          h+='<div style="font-size:12px;font-style:italic;color:var(--muted);white-space:pre-wrap;margin-bottom:8px">'+esc(g.text)+'</div>';
        }
        var vResults=resultsFor(g.id);
        if(vResults.length){
          h+='<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--rose);margin:6px 0 3px">Resultater</div>';
          vResults.forEach(function(r){h+='<div style="font-size:13px;padding:2px 0">'+esc(r.name)+resultDeadlineHTML(r)+'</div>';});
        }
        if(linkedR.length){
          h+='<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--rose);margin:6px 0 3px">Rutiner</div>';
          linkedR.forEach(function(r){h+='<div style="font-size:13px;padding:2px 0">'+esc(r.name)+'</div>';});
        }
        if(linkedE.length){
          h+='<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--rose);margin:6px 0 3px">Planer og hendelser</div>';
          linkedE.forEach(function(e){h+='<div style="font-size:13px;padding:2px 0">'+esc(e.name)+' <span style="color:var(--muted);font-size:11px">· '+(e.day?e.day+'. ':'')+MND_FULL[e.month-1]+(e.repeat?' hvert år':' '+e.year)+'</span></div>';});
        }
        var vInvs=inventories.filter(function(iv){return(iv.goalIds||[]).includes(g.id);}).sort(function(a,b){return nbSort(a.name,b.name);});
        if(vInvs.length){
          h+='<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--rose);margin:6px 0 3px">Inventarlister</div>';
          vInvs.forEach(function(iv){
            var ic=invCounts(iv);
            h+='<div style="font-size:13px;padding:2px 0"><button class="icon-btn" style="font-size:12px;padding:1px 8px" onclick="event.stopPropagation();goInventar(\''+q(iv.id)+'\')">'+esc(iv.name)+' \u00b7 '+ic.have+'/'+ic.total+' \u203a</button></div>';
          });
        }
        var linkedL=laters.filter(function(l){return(l.goalIds||[]).includes(g.id);}).sort(function(a,b){return nbSort(a.name,b.name);});
        if(linkedL.length){
          h+='<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--rose);margin:6px 0 3px">Senere</div>';
          linkedL.forEach(function(l){h+='<div style="font-size:13px;padding:2px 0">'+esc(l.name)+'</div>';});
        }
        if(!g.text&&!linkedR.length&&!linkedE.length&&!vResults.length){
          h+='<div style="font-size:12px;color:var(--muted)">Ingen utdypning eller koblinger ennå. Bruk \u270e for å skrive mer, og koble resultater, rutiner og hendelser til verdien i skjemaene deres.</div>';
        }
        h+='</div>';
      }
      h+='</div>';
    });
    h+='</div>';
  }
  h+='<button class="add-btn" onclick="openGoalModal()">+ Ny verdi</button>';

  h+='<div class="view-sub" style="padding-top:12px;font-weight:600">Resultater <span style="font-weight:400;color:var(--rose)">\u00b7 m\u00e5lbare, med frist</span></div>';
  if(results.length){
    h+='<div class="card">';
    results.slice().sort(function(a,b){return(a.year*100+a.month)-(b.year*100+b.month)||nbSort(a.name,b.name);}).forEach(function(r){
      var v=goalById(r.valueId);
      var rInvs=inventories.filter(function(iv){return(iv.resultIds||[]).includes(r.id);}).sort(function(a,b){return nbSort(a.name,b.name);});
      h+='<div class="entry-row"><div class="entry-body">'
        +'<div class="entry-text"'+(r.achieved?' style="opacity:.55"':'')+'>'+esc(r.name)+resultDeadlineHTML(r)+'</div>'
        +(v?'<div class="entry-date" style="color:var(--red)">\u2192 '+esc(v.name)+'</div>':'')
        +rInvs.map(function(iv){
          var ic=invCounts(iv);
          return'<div class="entry-date"><button class="icon-btn" style="font-size:11px;padding:1px 8px" onclick="goInventar(\''+q(iv.id)+'\')">'+esc(iv.name)+' \u00b7 '+ic.have+'/'+ic.total+(ic.missing?' \u00b7 <span style="color:var(--amber)">mangler '+ic.missing+'</span>':'')+' \u203a</button></div>';
        }).join('')
        +'</div>'
        +(r.targetAmount?'<button class="icon-btn" style="font-size:11px;padding:2px 7px;align-self:center;flex-shrink:0" onclick="openDepositModal(\''+q(r.id)+'\')">+ kr</button>':'')
        +'<button class="icon-btn" style="font-size:11px;padding:2px 7px;align-self:center" onclick="openEditResult(\''+q(r.id)+'\')">\u270e</button>'
        +'</div>';
    });
    h+='</div>';
  }
  h+='<button class="add-btn" onclick="openResultModal()">+ Nytt resultat</button>';

  h+='<div class="view-sub" style="padding-top:12px;font-weight:600">Inventarlister</div>';
  if(inventories.length){
    h+='<div class="card">';
    inventories.slice().sort(function(a,b){return nbSort(a.name,b.name);}).forEach(function(inv){
      var c=invCounts(inv);
      h+='<div class="entry-row" style="cursor:pointer" onclick="goInventar(\''+q(inv.id)+'\')">'
        +'<div class="entry-body"><div class="entry-text">'+esc(inv.name)+'</div>'
        +'<div class="entry-date">'+c.have+' av '+c.total+(c.missing?' <span style="color:var(--amber)">\u00b7 mangler '+c.missing+'</span>':'')+'</div></div>'
        +'<span style="align-self:center;color:var(--rose)">\u203a</span>'
        +'</div>';
    });
    h+='</div>';
  }
  h+='<button class="add-btn" onclick="openInvModal()">+ Ny inventarliste</button>';

  h+='<div class="view-sub" style="padding-top:12px;font-weight:600">\u00d8konomi</div>'
    +'<div class="card"><div class="entry-row" style="cursor:pointer" onclick="goBudsjett(curYear)">'
    +'<div class="entry-body"><div class="entry-text">Budsjett og regnskap</div>'
    +'<div class="entry-date">plan mot faktisk per kvartal og \u00e5r</div></div>'
    +'<span style="align-self:center;color:var(--rose)">\u203a</span></div></div>';

  h+='<div class="view-sub" style="padding-top:12px;font-weight:600">Senere <span style="font-weight:400;color:var(--rose)">\u00b7 venter p\u00e5 riktig tidspunkt</span></div>';
  if(laters.length){
    h+='<div class="card">';
    laters.slice().sort(function(a,b){return nbSort(a.name,b.name);}).forEach(function(l){
      var gNames=(l.goalIds||[]).map(function(gid){var g=goalById(gid);return g?g.name:null;}).filter(Boolean);
      h+='<div class="entry-row"><div class="entry-body">'
        +'<div class="entry-text">'+esc(l.name)+'</div>'
        +(l.note?'<div style="font-size:12px;font-style:italic;color:var(--muted)">'+esc(l.note)+'</div>':'')
        +(gNames.length?'<div class="entry-date" style="color:var(--red)">\u2192 '+esc(gNames.join(' \u00b7 '))+'</div>':'')
        +'</div>'
        +'<button class="icon-btn" style="font-size:11px;padding:2px 7px;align-self:center" onclick="openEditLater(\''+q(l.id)+'\')">\u270e</button>'
        +'</div>';
    });
    h+='</div>';
  }
  h+='<button class="add-btn" onclick="openLaterModal()">+ Til senere</button>';

  h+='<div class="view-sub" style="padding-top:12px;font-weight:600">Rutiner</div>';
  if(!routines.length){
    h+='<div class="card"><div class="empty">Ingen rutiner ennå.</div></div>';
  } else {
    h+='<div class="card">';
    routines.slice().sort(function(a,b){return nbSort(a.name,b.name);}).forEach(function(r){
      var months=(r.months||[]).length?(r.months||[]).map(function(m){return MND_FULL[m-1].slice(0,3);}).join(', '):'hver måned';
      if(r.freq==='weekly')months+=' · ukentlig';
      if(r.freq==='odd')months+=' · oddetallsuker';
      if(r.freq==='even')months+=' · partallsuker';
      var gNames=(r.goalIds||[]).map(function(gid){var g=goalById(gid);return g?g.name:null;}).filter(Boolean)
        .concat((r.resultIds||[]).map(function(xid){var x=resultById(xid);return x?x.name:null;}).filter(Boolean));
      var gLine=gNames.length
        ?'<div class="entry-date" style="color:var(--red)">\u2192 '+esc(gNames.join(' · '))+'</div>'
        :'<div class="entry-date" style="color:var(--amber)">\u26a0\ufe0e mangler kobling</div>';
      if(r.ease)gLine+='<div style="font-size:12px;font-style:italic;color:var(--muted)">'+esc(r.ease)+'</div>';
      var gear=[];
      inventories.forEach(function(iv){(iv.items||[]).forEach(function(it){
        if((it.routineIds||[]).includes(r.id))gear.push(it.name+(it.have?'':' (mangler)'));
      });});
      if(gear.length)gLine+='<div style="font-size:12px;color:var(--muted)">Utstyr: '+esc(gear.join(' \u00b7 '))+'</div>';
      h+='<div class="entry-row"><div class="entry-body">'
        +'<div class="entry-text">'+esc(r.name)+'</div>'
        +'<div class="entry-date">'+esc(months)+'</div>'
        +gLine
        +catPillsHTML(r.cats)+'</div>'
        +'<button class="icon-btn" style="font-size:11px;padding:2px 7px;align-self:center" onclick="openEditRoutine(\''+q(r.id)+'\')">✎</button>'
        +'</div>';
    });
    h+='</div>';
  }
  h+='<button class="add-btn" onclick="openRoutineModal()">+ Ny rutine</button>';

  h+='<div class="view-sub" style="padding-top:10px;font-weight:600">Hendelser</div>';
  if(!events.length){
    h+='<div class="card"><div class="empty">Ingen hendelser ennå.</div></div>';
  } else {
    h+='<div class="card">';
    events.slice().sort(function(a,b){return(a.year*10000+a.month*100+(a.day||0))-(b.year*10000+b.month*100+(b.day||0))||nbSort(a.name,b.name);}).forEach(function(e){
      var dn=evDone(e,curYear);
      h+='<div class="entry-row">'
        +'<button class="chk'+(dn?' done':'')+'" onclick="toggleEvent(\''+q(e.id)+'\','+curYear+')">'+(dn?'✓':'')+'</button>'
        +'<div class="entry-body">'
        +'<div class="entry-text">'+esc(e.name)+'</div>'
        +'<div class="entry-date">'+(e.day?e.day+'. ':'')+MND_FULL[e.month-1]+(e.repeat?' · hvert år (fra '+e.year+')':' '+e.year)+(evYears(e,curYear)!==null?' · '+evYears(e,curYear)+' år i '+curYear:'')+'</div>'
        +(e.ease?'<div style="font-size:12px;font-style:italic;color:var(--muted)">'+esc(e.ease)+'</div>':'')
        +catPillsHTML(e.cats)+'</div>'
        +'<button class="icon-btn" style="font-size:11px;padding:2px 7px;align-self:center" onclick="openEditEvent(\''+q(e.id)+'\')">✎</button>'
        +'</div>';
    });
    h+='</div>';
  }
  h+='<button class="add-btn" onclick="openEventModal()">+ Ny hendelse</button>';
  return h;
}

/* ── Hovedrender ── */
function render(){
  var wasSearch=false;
  try{wasSearch=document.activeElement&&document.activeElement.id==='search-inp';}catch(e){}

  var topbar='<div class="topbar">'
    +'<div class="topbar-row">'
    +'<button class="menu-btn" onclick="toggleDrawer()" aria-label="Meny">☰</button>'
    +'<h1>TAKK OG PÅ STELL</h1>'
    +(editMode
      ?'<button class="icon-btn" onclick="exportTekst()">↓ Tekst</button>'
       +'<button class="icon-btn" onclick="exportJSON()">↓ JSON</button>'
       +'<button class="icon-btn" onclick="importJSON()">↑ Importer</button>'
      :'')
    +'<button class="edit-btn'+(editMode?' on':'')+'" onclick="setEdit('+(editMode?'false':'true')+')">'+(editMode?'Ferdig':'Rediger')+'</button>'
    +'</div>'
    +'<div class="tabs">'
    +'<button class="tab'+(view.kind==='hjem'?' on':'')+'" onclick="goHjem()">I dag</button>'
    +'<button class="tab" onclick="openEntryModal()">Nytt innlegg</button>'
    +'<button class="tab'+(view.kind==='rapport'?' on':'')+'" onclick="goRapport(curMonth,curYear)">Måneden</button>'
    +'<button class="tab'+(view.kind==='arsrapport'?' on':'')+'" onclick="goArsrapport(curYear)">Året</button>'
    +'<button class="tab'+(view.kind==='oppsummering'?' on':'')+'" onclick="goOppsummering()">Oppsummering</button>'
    +'<button class="tab'+(view.kind==='planlegging'?' on':'')+'" onclick="goPlanlegging()">Planlegging</button>'
    +'</div>'
    +'</div>';

  var content='';
  if(view.kind==='hjem')content=hjemViewHTML();
  else if(view.kind==='dagbok')content=dagbokViewHTML();
  else if(view.kind==='rutiner')content=rutinerViewHTML();
  else if(view.kind==='oppsummering')content=oppsummeringViewHTML();
  else if(view.kind==='rapport')content=rapportViewHTML();
  else if(view.kind==='arsrapport')content=arsrapportViewHTML();
  else if(view.kind==='inventar')content=inventarViewHTML();
  else if(view.kind==='budsjett')content=budsjettViewHTML();
  else if(view.kind==='planlegging')content=planleggingViewHTML();

  var html='<div class="sidebar-overlay'+(drawerOpen?' show':'')+'" onclick="toggleDrawer()"></div>'
    +'<div class="layout">'
    +'<nav class="sidebar'+(drawerOpen?' open':'')+'">'+sidebarHTML()+'</nav>'
    +'<div class="main">'+topbar+content+'</div>'
    +'</div>'
    +modalHTML();

  document.getElementById('app').innerHTML=html;

  var si=document.getElementById('search-inp');
  if(si){si.value=searchQuery;if(wasSearch)si.focus();}
  var ta=document.querySelector('.modal textarea');
  if(ta&&!ta.value)ta.focus();
}

load();
</script>
