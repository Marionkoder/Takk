function catUsage(catId){
  var u=[];
  var n;
  n=goals.filter(function(g){return(g.cats||[]).includes(catId);}).length;
  if(n)u.push(n+' verdi'+(n>1?'er':''));
  n=results.filter(function(r){return(r.subCats||[]).includes(catId);}).length;
  if(n)u.push(n+' resultat'+(n>1?'er':''));
  n=routines.filter(function(r){return(r.cats||[]).includes(catId);}).length;
  if(n)u.push(n+' rutine'+(n>1?'r':''));
  n=events.filter(function(e){return(e.cats||[]).includes(catId);}).length;
  if(n)u.push(n+' hendelse'+(n>1?'r':''));
  n=budgetRows.filter(function(b){return b.catId===catId;}).length;
  if(n)u.push(n+' budsjettpost'+(n>1?'er':''));
  n=entries.filter(function(e){return(e.cats||[]).includes(catId);}).length;
  if(n)u.push(n+' innlegg');
  return u;
}
function kategorierViewHTML(){
  var h='<div style="display:flex;align-items:center;gap:8px;padding:14px 12px 0">'
    +'<button class="icon-btn" onclick="goInnstillinger()">\u2039</button>'
    +'<div class="view-title" style="padding:0;flex:1">Kategorier</div>'
    +'</div>'
    +'<div class="view-sub">Trykk \u270e for \u00e5 endre, velge farge, sl\u00e5 sammen eller slette. Fargen p\u00e5 en hovedkategori arves av underkategoriene.</div>';
  var mains=cats.filter(function(c){return!c.parentId;}).sort(function(a,b){return nbSort(a.name,b.name);});
  if(!mains.length)return h+'<div class="card"><div class="empty">Ingen kategorier enn\u00e5.</div></div>';
  var line=function(c,indent){
    var u=catUsage(c.id);
    var col=catColor(c.id);
    var dot=!indent?'<span class="cat-dot" style="margin-top:5px;background:'+(col||'transparent')+';'+(col?'':'border:1.5px dashed var(--line)')+'"></span>':'';
    return'<div style="display:flex;align-items:flex-start;gap:8px;padding:6px 14px'+(indent?' 6px 28px':'')+'">'
      +dot
      +'<div style="flex:1"><div style="font-size:13px;'+(indent?'':'font-weight:700')+'">'+esc(c.name)+'</div>'
      +(u.length
        ?'<div style="font-size:11px;color:var(--muted)">'+esc(u.join(' \u00b7 '))+'</div>'
        :'<div style="font-size:11px;color:var(--amber)">\u26a0\ufe0e ikke knyttet til noe</div>')
      +'</div>'
      +'<button class="icon-btn" style="font-size:11px;padding:2px 7px" onclick="openEditCat(\''+q(c.id)+'\')">\u270e</button>'
      +'</div>';
  };
  h+='<div class="card">';
  mains.forEach(function(mc){
    h+=line(mc,false);
    cats.filter(function(c){return c.parentId===mc.id;}).sort(function(a,b){return nbSort(a.name,b.name);})
      .forEach(function(sc){h+=line(sc,true);});
  });
  h+='</div>';
  h+='<button class="add-btn" onclick="openNewMainCat()">+ Ny hovedkategori</button>';
  return h;
}

function budsjettViewHTML(){
  var y=view.year;
  var qSel=view.q;
  var h='<div style="display:flex;align-items:center;gap:6px;padding:14px 12px 0">'
    +'<button class="icon-btn" onclick="goBudsjett('+(y-1)+',view.q)">\u2039</button>'
    +'<div class="view-title" style="padding:0;flex:1;text-align:center">Budsjett og regnskap \u00b7 '+y+'</div>'
    +'<button class="icon-btn" onclick="goBudsjett('+(y+1)+',view.q)">\u203a</button>'
    +'</div>';
  h+='<div class="chips" style="justify-content:center;padding:8px 12px 0">'
    +[1,2,3,4].map(function(qn){
      return'<button class="chip'+(qSel===qn?' on':'')+'" onclick="goBudsjett('+y+','+qn+')">'+KVARTAL[qn-1]+'</button>';
    }).join('')
    +'<button class="chip'+(qSel==='\u00e5r'?' on':'')+'" onclick="goBudsjett('+y+',\'\u00e5r\')">\u00c5ret</button>'
    +'</div>';

  var yearRows=budgetRows.filter(function(b){return b.year===y;});
  var sumField=function(row,field){return row[field].reduce(function(a,v){return a+(v===null?0:v);},0);};
  var pOf=function(row){return qSel==='\u00e5r'?sumField(row,'plan'):(row.plan[qSel-1]||0);};
  var aOf=function(row){return qSel==='\u00e5r'?sumField(row,'actual'):(row.actual[qSel-1]||0);};

  var mains=cats.filter(function(c){return!c.parentId;}).sort(function(a,b){return nbSort(a.name,b.name);});

  // avvik: positivt = bedre enn plan (inntekt: faktisk-plan, utgift: plan-faktisk)
  var renderSection=function(type,label){
    var rows=yearRows.filter(function(b){return(b.type==='in'?'in':'ut')===type;});
    if(!rows.length)return{html:'',p:0,a:0,any:false};
    var secP=0,secA=0;
    var hh='<div style="padding:8px 14px 2px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--rose)">'+label+'</div>'
      +'<div style="display:flex;gap:8px;padding:0 14px 2px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--rose)">'
      +'<span style="flex:1"></span><span style="width:76px;text-align:right">Plan</span><span style="width:76px;text-align:right">Faktisk</span><span style="width:60px;text-align:right">Avvik</span></div>';

    var sign=type==='ut'?'\u2212':'';
    var rowLine=function(row,name,indent,computed,col){
      var p=computed?row.p:pOf(row);
      var a=computed?row.a:aOf(row);
      var hasA=computed?(row.hasA||false):(qSel==='\u00e5r'?row.actual.some(function(v){return v!==null;}):row.actual[qSel-1]!==null);
      var diff=type==='in'?(a-p):(p-a);
      var pCell,aCell;
      if(computed||qSel==='\u00e5r'){
        pCell='<span style="width:76px;text-align:right;font-size:13px">'+(p?sign:'')+fmtKr(p)+'</span>';
        aCell='<span style="width:76px;text-align:right;font-size:13px">'+(hasA?(a?sign:'')+fmtKr(a):'\u2013')+'</span>';
      } else {
        pCell=budgetCellHTML(row,qSel-1,'plan');
        aCell=budgetCellHTML(row,qSel-1,'actual');
      }
      var dTxt=hasA?'<span style="width:60px;text-align:right;font-size:12px;color:'+(diff<0?'var(--amber)':'var(--muted)')+'">'+(diff>0?'+':'')+fmtKr(diff)+'</span>':'<span style="width:60px"></span>';
      var noteHtml='';
      if(!computed){
        var noteFor=function(qi){
          var pn=(row.planNote||[])[qi],an=(row.actualNote||[])[qi];
          if(!pn&&!an)return'';
          var pre=qSel==='\u00e5r'?'Q'+(qi+1)+': ':'';
          return'<div style="font-size:10px;line-height:1.4;color:var(--muted);font-style:italic;padding:0 14px 2px '+(indent?'28px':'14px')+'">'
            +pre+(pn?esc(pn):'')+(pn&&an?' \u00b7 ':'')+(an?'regnskap: '+esc(an):'')+'</div>';
        };
        noteHtml=qSel==='\u00e5r'?[0,1,2,3].map(noteFor).join(''):noteFor(qSel-1);
      }
      return'<div style="display:flex;align-items:center;gap:8px;padding:4px 14px">'
        +'<span style="width:3px;border-radius:2px;align-self:stretch;flex-shrink:0;background:'+(col||'transparent')+'"></span>'
        +'<span style="flex:1;font-size:13px;'+(indent?'padding-left:14px;color:var(--muted)':'font-weight:700')+'">'+esc(name)
        +(!computed?' <button class="icon-btn" style="font-size:10px;padding:0 5px" onclick="openEditBudgetRow(\''+q(row.id)+'\')">\u270e</button>':'')
        +'</span>'+pCell+aCell+dTxt+'</div>'+noteHtml;
    };

    mains.forEach(function(mc){
      var mainRow=rows.find(function(b){return b.catId===mc.id;});
      var subRows=rows.filter(function(b){var c=catById(b.catId);return c&&c.parentId===mc.id;})
        .sort(function(a,b){return nbSort((catById(a.catId)||{}).name||'',(catById(b.catId)||{}).name||'');});
      if(!mainRow&&!subRows.length)return;
      var mCol=catColor(mc.id);
      if(subRows.length){
        var hasAOf=function(r){return qSel==='\u00e5r'?r.actual.some(function(v){return v!==null;}):r.actual[qSel-1]!==null;};
        var agg={p:0,a:0,hasA:false};
        subRows.forEach(function(r){agg.p+=pOf(r);agg.a+=aOf(r);if(hasAOf(r))agg.hasA=true;});
        if(mainRow){agg.p+=pOf(mainRow);agg.a+=aOf(mainRow);if(hasAOf(mainRow))agg.hasA=true;}
        hh+=rowLine(agg,mc.name,false,true,mCol);
        if(mainRow)hh+=rowLine(mainRow,'(direkte p\u00e5 '+mc.name+')',true,false,mCol);
        subRows.forEach(function(r){hh+=rowLine(r,(catById(r.catId)||{}).name||'?',true,false,mCol);});
        secP+=agg.p;secA+=agg.a;
      } else {
        hh+=rowLine(mainRow,mc.name,false,false,mCol);
        secP+=pOf(mainRow);secA+=aOf(mainRow);
      }
    });

    var secHasA=rows.some(function(r){return qSel==='\u00e5r'?r.actual.some(function(v){return v!==null;}):r.actual[qSel-1]!==null;});
    var sDiff=type==='in'?(secA-secP):(secP-secA);
    hh+='<div style="display:flex;align-items:center;gap:8px;padding:6px 14px;border-top:1px solid var(--line);border-bottom:3px double var(--muted)">'
      +'<span style="width:3px;flex-shrink:0"></span>'
      +'<span style="flex:1;font-size:13px;font-weight:700">Sum '+label.toLowerCase()+'</span>'
      +'<span style="width:76px;text-align:right;font-size:13px;font-weight:700">'+(secP?sign:'')+fmtKr(secP)+'</span>'
      +'<span style="width:76px;text-align:right;font-size:13px;font-weight:700">'+(secHasA?(secA?sign:'')+fmtKr(secA):'\u2013')+'</span>'
      +(secHasA?'<span style="width:60px;text-align:right;font-size:12px;font-weight:700;color:'+(sDiff<0?'var(--amber)':'var(--muted)')+'">'+(sDiff>0?'+':'')+fmtKr(sDiff)+'</span>':'<span style="width:60px"></span>')+'</div>';
    return{html:hh,p:secP,a:secA,hasA:secHasA,any:true};
  };

  var inn=renderSection('in','Inntekter');
  var ut=renderSection('ut','Utgifter');

  h+='<div class="card" style="margin-top:10px">';
  if(!inn.any&&!ut.any){
    h+='<div class="empty">Ingen budsjettlinjer for '+y+' enn\u00e5.</div>';
  } else {
    h+=inn.html+ut.html;
    var balP=inn.p-ut.p,balA=inn.a-ut.a,balD=balA-balP;
    var balHasA=(inn.hasA||false)||(ut.hasA||false);
    h+='<div style="display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--bg);border-bottom:7px double var(--red)">'
      +'<span style="width:3px;flex-shrink:0"></span>'
      +'<span style="flex:1;font-size:13px;font-weight:700;color:var(--red)">Balanse</span>'
      +'<span style="width:76px;text-align:right;font-size:13px;font-weight:700;color:'+(balP<0?'var(--amber)':'var(--red)')+'">'+fmtKr(balP)+'</span>'
      +'<span style="width:76px;text-align:right;font-size:13px;font-weight:700;color:'+(balA<0?'var(--amber)':'var(--red)')+'">'+(balHasA?fmtKr(balA):'\u2013')+'</span>'
      +(balHasA?'<span style="width:60px;text-align:right;font-size:12px;font-weight:700;color:'+(balD<0?'var(--amber)':'var(--muted)')+'">'+(balD>0?'+':'')+fmtKr(balD)+'</span>':'<span style="width:60px"></span>')+'</div>';
  }
  h+='</div>';
  h+='<button class="add-btn" onclick="openBudgetLineModal()">+ Ny budsjettlinje</button>'
    +'<button class="add-btn" onclick="openPostingModal()">+ Registrer bel\u00f8p</button>';

  var saveGoals=results.filter(function(r){return r.targetAmount&&(r.amountType||'spar')==='spar';}).sort(function(a,b){return(a.year*100+a.month)-(b.year*100+b.month);});
  if(saveGoals.length){
    h+='<div class="view-sub" style="padding-top:12px;font-weight:600">Sparem\u00e5l</div><div class="card">';
    saveGoals.forEach(function(r){
      h+='<div class="entry-row"><div class="entry-body">'
        +'<div class="entry-text"'+(r.achieved?' style="opacity:.55"':'')+'>'+esc(r.name)+resultDeadlineHTML(r)+'</div>'
        +'</div>'
        +'<button class="icon-btn" style="font-size:11px;padding:2px 8px;align-self:center" onclick="openDepositModal(\''+q(r.id)+'\')">+ innbetaling</button>'
        +'</div>';
    });
    h+='</div>';
  }
  return h;
}

function planleggingViewHTML(){
  var h='<div class="view-title">Legg inn m\u00e5l, rutiner og planer</div>'
    +'<div class="view-sub">Verdier er slik du vil leve («Jeg tar vare på helsa»). Resultater er praktiske mål du vil oppnå ved å leve på den måten («Jeg kan løpe fem kilometer»). Rutiner («Jeg trener intervaller to ganger i uka») og hendelser («Testløpe to kilometer») er det du planlegger å gjøre for å nå disse målene.</div>';
  var ptabs=[['verdier','Verdier'],['resultater','Resultater'],['rutiner','Rutiner'],['hendelser','Hendelser'],['bursdager','Bursdager'],['inventar','Lister'],['senere','Til senere']];
  h+='<div class="chips" style="padding:10px 12px 0">'+ptabs.map(function(t){
    return'<button class="chip'+(planTab===t[0]?' on':'')+'" onclick="planTab=\''+t[0]+'\';render()">'+t[1]+'</button>';
  }).join('')+'</div>';

  if(planTab==='verdier'){
  h+='<div class="view-sub" style="padding-top:12px;font-weight:600">Verdier</div>';
  if(!goals.length){
    h+='<div class="card"><div class="empty">Ingen verdier ennå. En verdi er identitetsmålet — hvem du vil være — og eier en hovedkategori.</div></div>';
  } else {
    h+='<div class="card">';
    goals.slice().sort(function(a,b){return nbSort(a.name,b.name);}).forEach(function(g){
      var linkedR=routines.filter(function(r){return(r.goalIds||[]).includes(g.id);}).sort(function(a,b){return nbSort(a.name,b.name);});
      var linkedE=events.filter(function(e){return(e.goalIds||[]).includes(g.id);}).sort(function(a,b){return(a.year*100+a.month)-(b.year*100+b.month)||nbSort(a.name,b.name);});
      var open=!!openGoals[g.id];
      h+='<div style="border-bottom:1px solid var(--line)">'
        +'<div style="display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer" onclick="toggleGoalOpen(\''+q(g.id)+'\')">'
        +'<span class="s-arrow'+(open?' open':'')+'">\u25b6\ufe0e</span>'
        +'<span style="flex:1;min-width:0"><span style="font-weight:700;display:block">'+esc(g.name)+'</span>'
        +((g.cats||[]).length?catPillsHTML(g.cats):'')
        +'</span>'
        +'<span style="font-size:11px;color:var(--rose)">'+((g.span||'livet')==='fem'?'5 \u00e5r \u00b7 ':'')+linkedR.length+' rutiner · '+linkedE.length+' planer</span>'
        +(editMode?'<button class="icon-btn" style="font-size:11px;padding:2px 7px" onclick="event.stopPropagation();openEditGoal(\''+q(g.id)+'\')">\u270e</button>':'')
        +'</div>';
      if((g.span||'livet')==='fem'&&!resultsFor(g.id).length){
        h+='<div style="padding:0 14px 8px;font-size:12px;color:var(--amber)">\u26a0 Fem\u00e5rig styringsverdi uten resultat \u2014 legg til minst ett resultat som viser at du lever den.</div>';
      }
      if(open){
        h+='<div style="padding:0 14px 12px 34px">';
        if(g.text){
          h+='<div style="font-size:12px;font-style:italic;color:var(--muted);white-space:pre-wrap;margin-bottom:8px">'+esc(g.text)+'</div>';
        }
        var vResults=resultsFor(g.id);
        if(vResults.length){
          h+='<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--rose);margin:6px 0 3px">Resultater</div>';
          vResults.forEach(function(r){h+='<div style="font-size:13px;padding:2px 0">'+esc(r.name)+resultDeadlineHTML(r)+'</div>';});
        }
        if(linkedR.length){
          h+='<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--rose);margin:6px 0 3px">Rutiner</div>';
          linkedR.forEach(function(r){h+='<div style="font-size:13px;padding:2px 0">'+esc(r.name)+'</div>';});
        }
        if(linkedE.length){
          h+='<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--rose);margin:6px 0 3px">Planer og hendelser</div>';
          linkedE.forEach(function(e){h+='<div style="font-size:13px;padding:2px 0">'+esc(e.name)+' <span style="color:var(--muted);font-size:11px">· '+(e.day?e.day+'. ':'')+MND_FULL[e.month-1]+(e.repeat?' hvert år':' '+e.year)+'</span></div>';});
        }
        var vInvs=inventories.filter(function(iv){return(iv.goalIds||[]).includes(g.id);}).sort(function(a,b){return nbSort(a.name,b.name);});
        if(vInvs.length){
          h+='<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--rose);margin:6px 0 3px">Lister</div>';
          vInvs.forEach(function(iv){
            var ic=invCounts(iv);
            h+='<div style="font-size:13px;padding:2px 0"><button class="icon-btn" style="font-size:12px;padding:1px 8px" onclick="event.stopPropagation();goInventar(\''+q(iv.id)+'\')">'+esc(iv.name)+' \u00b7 '+ic.have+'/'+ic.total+' \u203a</button></div>';
          });
        }
        var linkedL=laters.filter(function(l){return(l.goalIds||[]).includes(g.id);}).sort(function(a,b){return nbSort(a.name,b.name);});
        if(linkedL.length){
          h+='<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--rose);margin:6px 0 3px">Senere</div>';
          linkedL.forEach(function(l){h+='<div style="font-size:13px;padding:2px 0">'+esc(l.name)+'</div>';});
        }
        if(!g.text&&!linkedR.length&&!linkedE.length&&!vResults.length){
          h+='<div style="font-size:12px;color:var(--muted)">Ingen utdypning eller koblinger ennå. Bruk \u270e for å skrive mer, og koble resultater, rutiner og hendelser til verdien i skjemaene deres.</div>';
        }
        h+='</div>';
      }
      h+='</div>';
    });
    h+='</div>';
  }
  h+='<button class="add-btn" onclick="openGoalModal()">+ Ny verdi</button>';

  }
  if(planTab==='resultater'){
  h+='<div class="view-sub" style="padding-top:12px;font-weight:600">Resultater <span style="font-weight:400;color:var(--rose)">\u00b7 m\u00e5lbare, med frist</span></div>';
  if(results.length){
    h+='<div class="card">';
    results.slice().sort(function(a,b){return(a.year*100+a.month)-(b.year*100+b.month)||nbSort(a.name,b.name);}).forEach(function(r){
      var v=goalById(r.valueId);
      var rInvs=inventories.filter(function(iv){return(iv.resultIds||[]).includes(r.id);}).sort(function(a,b){return nbSort(a.name,b.name);});
      h+='<div class="entry-row"><div class="entry-body">'
        +'<div class="entry-text"'+(r.achieved?' style="opacity:.55"':'')+'>'+esc(r.name)+resultDeadlineHTML(r)+'</div>'
        +(v?'<div class="entry-date" style="color:var(--red)">\u2192 '+esc(v.name)+'</div>':'')
        +(!r.achieved&&!resultHasRoutine(r.id)?'<div class="entry-date" style="color:var(--amber)">\u26a0 Mangler rutine \u2014 et resultat uten rutine er bare et \u00f8nske. Koble en rutine til resultatet.</div>':'')
        +rInvs.map(function(iv){
          var ic=invCounts(iv);
          return'<div class="entry-date"><button class="icon-btn" style="font-size:11px;padding:1px 8px" onclick="goInventar(\''+q(iv.id)+'\')">'+esc(iv.name)+' \u00b7 '+ic.have+'/'+ic.total+(ic.missing?' \u00b7 <span style="color:var(--amber)">mangler '+ic.missing+'</span>':'')+' \u203a</button></div>';
        }).join('')
        +'</div>'
        +(r.targetAmount?'<button class="icon-btn" style="font-size:11px;padding:2px 7px;align-self:center;flex-shrink:0" onclick="openDepositModal(\''+q(r.id)+'\')">+ kr</button>':'')
        +'<button class="icon-btn" style="font-size:11px;padding:2px 7px;align-self:center" onclick="openEditResult(\''+q(r.id)+'\')">\u270e</button>'
        +'</div>';
    });
    h+='</div>';
  }
  h+='<button class="add-btn" onclick="openResultModal()">+ Nytt resultat</button>';

  }
  if(planTab==='rutiner'){
  h+='<div class="view-sub" style="padding-top:12px;font-weight:600">Rutiner</div>';
  if(!routines.length){
    h+='<div class="card"><div class="empty">Ingen rutiner ennå.</div></div>';
  } else {
    h+='<div class="card">';
    routines.slice().sort(function(a,b){return nbSort(a.name,b.name);}).forEach(function(r){
      var months=(r.months||[]).length?(r.months||[]).map(function(m){return MND_FULL[m-1].slice(0,3);}).join(', '):'hver måned';
      if(r.freq==='weekly')months+=' · ukentlig';
      if(r.freq==='odd')months+=' · oddetallsuker';
      if(r.freq==='even')months+=' · partallsuker';
      var gNames=(r.goalIds||[]).map(function(gid){var g=goalById(gid);return g?g.name:null;}).filter(Boolean)
        .concat((r.resultIds||[]).map(function(xid){var x=resultById(xid);return x?x.name:null;}).filter(Boolean));
      var gLine=gNames.length
        ?'<div class="entry-date" style="color:var(--red)">\u2192 '+esc(gNames.join(' · '))+'</div>'
        :'<div class="entry-date" style="color:var(--amber)">\u26a0\ufe0e mangler kobling</div>';
      if(r.ease)gLine+='<div style="font-size:12px;font-style:italic;color:var(--muted)">'+esc(r.ease)+'</div>';
      var gear=[];
      inventories.forEach(function(iv){(iv.items||[]).forEach(function(it){
        if((it.routineIds||[]).includes(r.id))gear.push(it.name+(it.have?'':' (mangler)'));
      });});
      if(gear.length)gLine+='<div style="font-size:12px;color:var(--muted)">Utstyr: '+esc(gear.join(' \u00b7 '))+'</div>';
      h+='<div class="entry-row"><div class="entry-body">'
        +'<div class="entry-text">'+esc(r.name)+'</div>'
        +'<div class="entry-date">'+esc(months)+'</div>'
        +gLine
        +catPillsHTML(r.cats)+'</div>'
        +'<button class="icon-btn" style="font-size:11px;padding:2px 7px;align-self:center" onclick="openEditRoutine(\''+q(r.id)+'\')">✎</button>'
        +'</div>';
    });
    h+='</div>';
  }
  h+='<button class="add-btn" onclick="openRoutineModal()">+ Ny rutine</button>';

  }
  if(planTab==='hendelser'){
  h+='<div class="view-sub" style="padding-top:10px;font-weight:600">Hendelser</div>';
  if(!events.length){
    h+='<div class="card"><div class="empty">Ingen hendelser ennå.</div></div>';
  } else {
    h+='<div class="card">';
    events.filter(function(e){return!e.bday;}).sort(function(a,b){return(a.year*10000+a.month*100+(a.day||0))-(b.year*10000+b.month*100+(b.day||0))||nbSort(a.name,b.name);}).forEach(function(e){
      var dn=evDone(e,curYear);
      h+='<div class="entry-row">'
        +'<button class="chk'+(dn?' done':'')+'" onclick="toggleEvent(\''+q(e.id)+'\','+curYear+')">'+(dn?'✓':'')+'</button>'
        +'<div class="entry-body">'
        +'<div class="entry-text">'+esc(e.name)+'</div>'
        +'<div class="entry-date">'+(e.day?e.day+'. ':'')+MND_FULL[e.month-1]+(e.repeat?' · hvert år (fra '+e.year+')':' '+e.year)+(evYears(e,curYear)!==null?' · '+evYears(e,curYear)+' år i '+curYear:'')+'</div>'
        +(e.ease?'<div style="font-size:12px;font-style:italic;color:var(--muted)">'+esc(e.ease)+'</div>':'')
        +catPillsHTML(e.cats)+'</div>'
        +'<button class="icon-btn" style="font-size:11px;padding:2px 7px;align-self:center" onclick="openEditEvent(\''+q(e.id)+'\')">✎</button>'
        +'</div>';
    });
    h+='</div>';
  }
  h+='<button class="add-btn" onclick="openEventModal()">+ Ny hendelse</button>';
  }
  var bdays=events.filter(function(e){return e.bday;}).sort(function(a,b){return daysToNextBday(a)-daysToNextBday(b)||nbSort(a.name,b.name);});
  if(planTab==='bursdager'){
  h+='<div class="view-sub" style="padding-top:12px;font-weight:600">Bursdager <span style="font-weight:400;color:var(--rose)">\u00b7 '+bdays.length+' av '+BDAY_MAX+'</span></div>';
  if(bdays.length){
    h+='<div class="card" style="padding:6px 0">';
    bdays.forEach(function(e){
      var round=isRoundBdayNext(e);
      var nAge=bdayNextAge(e);
      var age=ageToday(e);
      var dd=daysToNextBday(e);
      var isToday=dd===0;
      var gratd=evDone(e,curYear);
      var when=isToday?'i dag!':dd===1?'i morgen':'om '+dd+' dager';
      h+='<div class="'+(round?'confetti round-bday':'')+'" style="display:flex;align-items:center;gap:8px;padding:3px 14px;font-size:13px;position:relative">'
        +(round?confettiHTML():'')
        +'<span style="width:64px;flex-shrink:0;color:var(--muted);font-size:12px">'+(e.day?e.day+'. ':'')+MND_FULL[e.month-1].slice(0,3)+'</span>'
        +'<span style="flex:1">'+esc(e.name)
        +(age!==null?' <span style="color:var(--muted);font-size:11px">'+age+' \u00e5r</span>':'')
        +' <span style="color:var(--rose);font-size:11px">\u00b7 '+(nAge!==null?'fyller '+nAge+' ':'bursdag ')+when+'</span>'
        +(round?' <span style="color:var(--red);font-weight:700;font-size:11px">\ud83c\udf89</span>':'')
        +'</span>'
        +(isToday?'<button class="chip'+(gratd?' on':'')+'" style="font-size:11px;padding:3px 10px;flex-shrink:0" onclick="toggleEvent(\''+q(e.id)+'\','+curYear+')">'+(gratd?'\u2713 Gratulert':'Gratulert?')+'</button>':'')
        +'<button class="icon-btn" style="font-size:11px;padding:1px 7px" onclick="openEditEvent(\''+q(e.id)+'\')">\u270e</button>'
        +'</div>';
    });
    h+='</div>';
  }
  if(bdays.length>=BDAY_MAX){
    h+='<div class="hint-box" style="color:var(--amber)">Du har n\u00e5dd '+BDAY_MAX+' bursdager \u2014 Dunbars tall for hvor mange meningsfulle relasjoner et menneske greier \u00e5 holde ved like.</div>';
  } else {
    h+='<button class="add-btn" onclick="openBdayModal()">+ Ny bursdag</button>';
  }

  }
  if(planTab==='inventar'){
  h+='<div class="view-sub" style="padding-top:12px;font-weight:600">Lister</div>';
  h+='<div class="chips" style="padding:4px 12px 0">'
    +[['alle','Alle'],['prosjekt','Prosjektlister'],['pakke','Pakkelister'],['inventar','Inventarlister']].map(function(t){
      return'<button class="chip'+(listFilter===t[0]?' on':'')+'" onclick="listFilter=\''+t[0]+'\';render()">'+t[1]+'</button>';
    }).join('')+'</div>';
  if(listFilter==='alle'||listFilter==='prosjekt')h+=ganttHTML();
  var typeOrder={prosjekt:0,pakke:1,inventar:2};
  var shownInvs=inventories.filter(function(iv){return listFilter==='alle'||(iv.type||'inventar')===listFilter;});
  if(shownInvs.length){
    h+='<div class="card">';
    shownInvs.slice().sort(function(a,b){
      var ta=typeOrder[a.type||'inventar'],tb2=typeOrder[b.type||'inventar'];
      var ca=a.completedDate?1:0,cb=b.completedDate?1:0;
      return ta-tb2||ca-cb||nbSort(a.name,b.name);
    }).forEach(function(inv){
      var c=invCounts(inv);
      h+='<div class="entry-row" style="cursor:pointer" onclick="goInventar(\''+q(inv.id)+'\')">'
        +'<div class="entry-body"><div class="entry-text">'+esc(inv.name)+((inv.type||'inventar')==='pakke'?' <span style="font-size:10px;color:var(--rose)">\u00b7 pakkeliste</span>':(inv.type||'inventar')==='prosjekt'?' <span style="font-size:10px;color:var(--rose)">\u00b7 prosjekt</span>':'')+'</div>'
        +'<div class="entry-date">'+c.have+' av '+c.total+((inv.type||'inventar')==='pakke'?' pakket':(inv.type||'inventar')==='prosjekt'?' milep\u00e6ler':'')+((inv.type||'inventar')==='prosjekt'?(inv.completedDate?' \u00b7 <span style="color:var(--red)">\u2713 ferdigstilt '+fmtDate(inv.completedDate)+'</span>':(inv.endDate?' \u00b7 frist '+fmtDate(inv.endDate):'')):'')+(c.missing?' <span style="color:var(--amber)">\u00b7 '+((inv.type||'inventar')!=='inventar'?'gjenst\u00e5r':'mangler')+' '+c.missing+'</span>':'')+'</div></div>'
        +'<span style="align-self:center;color:var(--rose)">\u203a</span>'
        +'</div>';
    });
    h+='</div>';
  }
  h+='<button class="add-btn" onclick="openInvModal()">+ Ny liste</button>';

  }
  if(planTab==='senere'){
  h+='<div class="view-sub" style="padding-top:12px;font-weight:600">Senere <span style="font-weight:400;color:var(--rose)">\u00b7 venter p\u00e5 riktig tidspunkt</span></div>';
  if(laters.length){
    h+='<div class="card">';
    laters.slice().sort(function(a,b){return nbSort(a.name,b.name);}).forEach(function(l){
      var gNames=(l.goalIds||[]).map(function(gid){var g=goalById(gid);return g?g.name:null;}).filter(Boolean);
      h+='<div class="entry-row"><div class="entry-body">'
        +'<div class="entry-text">'+esc(l.name)+'</div>'
        +(l.note?'<div style="font-size:12px;font-style:italic;color:var(--muted)">'+esc(l.note)+'</div>':'')
        +(gNames.length?'<div class="entry-date" style="color:var(--red)">\u2192 '+esc(gNames.join(' \u00b7 '))+'</div>':'')
        +'</div>'
        +'<button class="icon-btn" style="font-size:11px;padding:2px 7px;align-self:center" onclick="openEditLater(\''+q(l.id)+'\')">\u270e</button>'
        +'</div>';
    });
    h+='</div>';
  }
  h+='<button class="add-btn" onclick="openLaterModal()">+ Til senere</button>';

  }
  return h;
}

/* ── Hovedrender ── */
function render(){
  var wasSearch=false,wasQuick=false;
  var wasQTags=false;
  try{wasSearch=document.activeElement&&document.activeElement.id==='search-inp';wasQuick=document.activeElement&&document.activeElement.id==='quick-inp';wasQTags=document.activeElement&&document.activeElement.id==='quick-tags';}catch(e){}

  var topbar='<div class="topbar">'
    +'<div class="topbar-row">'
    +'<h1>Gode dager</h1>'
    +(editMode
      ?'<button class="icon-btn" onclick="exportTekst()">↓ Tekst</button>'
       +'<button class="icon-btn" onclick="exportJSON()">↓ JSON</button>'
       +'<button class="icon-btn" onclick="importJSON()">↑ Importer</button>'
      :'')
    +'<button class="edit-btn'+(editMode?' on':'')+'" onclick="setEdit('+(editMode?'false':'true')+')">'+(editMode?'Ferdig':'Rediger')+'</button>'
    +'<button class="menu-btn" onclick="toggleDrawer()" aria-label="Meny">☰</button>'
    +'</div>'
    +'<div class="stripe-ribbon"></div>'
    +'<div class="tabs">'
    +'<button class="tab'+(view.kind==='hjem'||view.kind==='dagbok'?' on':'')+'" onclick="goHjem()">Dagbok</button>'
    +'<button class="tab'+(view.kind==='kalender'||view.kind==='rutiner'||view.kind==='uke'?' on':'')+'" onclick="goUke()">Kalender</button>'
    +'<button class="tab'+(view.kind==='rapport'||view.kind==='arsrapport'||view.kind==='oppsummering'?' on':'')+'" onclick="goOppsummering()">Rapporter</button>'
    +'<button class="tab'+(view.kind==='planlegging'?' on':'')+'" onclick="goPlanlegging()">Legg inn m\u00e5l, rutiner og planer</button>'
    +'</div>'
    +'</div>';

  var content='';
  if(view.kind==='hjem')content=hjemViewHTML();
  else if(view.kind==='dagbok')content=dagbokViewHTML();
  else if(view.kind==='rutiner')content=rutinerViewHTML();
  else if(view.kind==='kalender')content=kalenderViewHTML();
  else if(view.kind==='uke')content=ukeViewHTML();
  else if(view.kind==='om')content=omViewHTML();
  else if(view.kind==='oppsummering')content=oppsummeringViewHTML();
  else if(view.kind==='rapport')content=rapportViewHTML();
  else if(view.kind==='arsrapport')content=arsrapportViewHTML();
  else if(view.kind==='inventar')content=inventarViewHTML();
  else if(view.kind==='budsjett')content=budsjettViewHTML();
  else if(view.kind==='innstillinger')content=innstillingerViewHTML();
  else if(view.kind==='kategorier')content=kategorierViewHTML();
  else if(view.kind==='planlegging')content=planleggingViewHTML();

  var html='<div class="sidebar-overlay'+(drawerOpen?' show':'')+'" onclick="toggleDrawer()"></div>'
    +'<div class="layout">'
    +'<nav class="sidebar'+(drawerOpen?' open':'')+'">'+sidebarHTML()+'</nav>'
    +'<div class="main">'+topbar+content+'</div>'
    +'</div>'
    +modalHTML();

  document.getElementById('app').innerHTML=html;

  var si=document.getElementById('search-inp');
  if(si){si.value=searchQuery;if(wasSearch)si.focus();}
  var qi=document.getElementById('quick-inp');
  if(qi&&wasQuick){qi.focus();qi.setSelectionRange(qi.value.length,qi.value.length);}
  var qt=document.getElementById('quick-tags');
  if(qt&&wasQTags){qt.focus();qt.setSelectionRange(qt.value.length,qt.value.length);}
  var ta=document.querySelector('.modal textarea');
  if(ta&&!ta.value)ta.focus();
}

load();
</script>
</body>
</html>
