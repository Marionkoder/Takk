<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F2EEE5;--card:#FCFAF4;--ink:#3B2E24;--red:#8E1F1D;
  --salmon:#F5A38B;--red-soft:#F7DACC;--rose:#B08D7C;--amber:#B86E2A;
  --muted:#8B7C6B;--line:#E6E0D2;--done:#E3D9C2;--done-line:#D6C9AA;--btn:#E2D8C0;--sel:#D2C5A2;--sel-line:#BFB088;
}
body{background:var(--bg);color:var(--ink);font-family:"Nunito","Helvetica Neue",Helvetica,Arial,sans-serif;font-size:15px;line-height:1.5;min-height:100vh}

/* ── Layout: sidebar + main ── */
.layout{display:flex;min-height:100vh}
.sidebar{
  width:230px;background:var(--card);border-right:1px solid var(--line);
  padding:16px 0 40px;flex-shrink:0;overflow-y:auto;
  position:fixed;top:0;bottom:0;left:0;z-index:150;
  transform:translateX(-100%);transition:transform .2s;
}
.sidebar.open{transform:translateX(0)}
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:140;display:none}
.sidebar-overlay.show{display:block}
.main{flex:1;min-width:0;padding-bottom:100px}
@media(min-width:900px){
  .sidebar{transform:none;position:sticky;height:100vh}
  .sidebar-overlay{display:none!important}
  .main{margin-left:0}
  .menu-btn{display:none}
}

/* Sidebar innhold */
.side-title{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--rose);padding:6px 18px 10px}
.side-month{display:flex;align-items:center;gap:8px;padding:8px 18px;cursor:pointer;user-select:none;font-size:14px;font-weight:600;color:var(--ink)}
.side-month:hover{background:var(--bg)}
.side-sub{display:flex;align-items:center;gap:8px;padding:6px 18px 6px 34px;cursor:pointer;font-size:13px;color:var(--muted);user-select:none}
.side-sub:hover{background:var(--bg)}
.side-leaf{display:block;width:100%;text-align:left;padding:5px 18px 5px 52px;font-size:13px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:inherit}
.side-leaf:hover{background:var(--bg);color:var(--red)}
.side-leaf.on{color:var(--red);font-weight:600}
.s-arrow{width:14px;flex-shrink:0;color:var(--red);font-size:10px;transition:transform .15s;display:inline-flex;justify-content:center}
.s-arrow.open{transform:rotate(90deg)}

/* Topbar */
.topbar{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--line);padding:0}
.topbar-row{display:flex;align-items:center;gap:10px;margin-bottom:0;padding:14px 16px 10px;background:var(--bg)}
.stripe-ribbon{height:7px;background:linear-gradient(to right,#74A491 0% 5%,#4E6B5C 5% 10%,#8A8B5C 10% 15%,#4E7B8C 15% 20%,#87A7BC 20% 25%,#52657E 25% 30%,#8B7A9E 30% 35%,#6D4A68 35% 40%,#8C5A74 40% 45%,#C0868E 45% 50%,#C46E7E 50% 55%,#A34A5E 55% 60%,#DE9273 60% 65%,#A8574A 65% 70%,#CC7F33 70% 75%,#E2C878 75% 80%,#C2AC85 80% 85%,#9C6B3F 85% 90%,#6F4E37 90% 95%,#94897B 95% 100%)}
.stripe-thin{height:3.5px;border-radius:2px;margin:8px 12px 2px;background:linear-gradient(to right,#74A491 0% 5%,#4E6B5C 5% 10%,#8A8B5C 10% 15%,#4E7B8C 15% 20%,#87A7BC 20% 25%,#52657E 25% 30%,#8B7A9E 30% 35%,#6D4A68 35% 40%,#8C5A74 40% 45%,#C0868E 45% 50%,#C46E7E 50% 55%,#A34A5E 55% 60%,#DE9273 60% 65%,#A8574A 65% 70%,#CC7F33 70% 75%,#E2C878 75% 80%,#C2AC85 80% 85%,#9C6B3F 85% 90%,#6F4E37 90% 95%,#94897B 95% 100%)}
.menu-btn{background:none;border:1px solid var(--line);border-radius:8px;font-size:16px;padding:4px 10px;cursor:pointer;color:var(--ink)}
h1{font-size:24px;font-weight:400;letter-spacing:0;flex:1;color:var(--ink)}
.edit-btn{font-size:13px;font-weight:600;color:var(--muted);background:none;border:none;cursor:pointer;font-family:inherit}
.edit-btn.on{color:var(--red)}
.icon-btn{font-size:12px;font-weight:600;color:var(--muted);background:none;border:1px solid var(--line);border-radius:8px;padding:4px 9px;cursor:pointer;font-family:inherit}
.tabs{display:flex;gap:2px;padding:4px 16px 0}
.tab{flex:1;padding:9px 0;border:none;background:none;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;font-family:inherit}
.tab.on{color:var(--red);border-bottom-color:var(--red)}

/* Innhold */
.view-title{font-size:15px;font-weight:700;padding:16px 16px 2px}
.view-sub{font-size:12px;color:var(--muted);padding:0 16px 8px}
.card{background:var(--card);border-radius:14px;overflow:hidden;margin:8px 12px 4px;border:1px solid var(--line)}
.entry-row{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:1px solid var(--line)}
.entry-row:last-child{border-bottom:none}
.entry-dot{width:5px;height:5px;border-radius:99px;background:var(--rose);flex-shrink:0;margin-top:8px}
.entry-body{flex:1;min-width:0}
.entry-text{font-size:13px;color:var(--ink);line-height:1.5}
.entry-date{font-size:11px;color:var(--rose);margin-top:1px}
.entry-cats{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.entry-cat{font-size:10px;color:var(--ink);background:var(--done);padding:2px 7px;border-radius:99px}
.cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;display:inline-block}
.col-sw{width:30px;height:30px;border-radius:50%;border:2px solid transparent;cursor:pointer;padding:0;flex-shrink:0}
.col-sw.on{border-color:var(--ink);box-shadow:inset 0 0 0 2px var(--card)}
.col-sw.none{background:transparent;border:1.5px dashed var(--muted);color:var(--muted);font-size:11px}
.col-sw.none.on{border:2px solid var(--ink);box-shadow:none}
/* Konfetti på runde bursdager */
.confetti{position:relative;overflow:hidden}
.confetti i{position:absolute;top:-10px;width:5px;height:9px;border-radius:1px;opacity:.85;pointer-events:none;animation:cfall 2.8s linear infinite}
@keyframes cfall{0%{transform:translateY(-12px) rotate(0deg)}100%{transform:translateY(52px) rotate(340deg)}}
@media (prefers-reduced-motion:reduce){.confetti i{animation:none;display:none}}
.round-bday{background:#FBF3DF}
/* Hurtiglogging på I dag */
.quick-log{background:var(--card);border:1px solid var(--line);border-radius:14px;margin:10px 12px 4px;padding:12px 14px}
.quick-log textarea{width:100%;border:1px solid var(--line);border-radius:10px;background:var(--bg);padding:10px;font-family:inherit;font-size:14px;resize:vertical;min-height:64px;color:var(--ink)}
.quick-log textarea:focus{outline:2px solid var(--sel-line)}
.catbox-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 12px}
.cat-box{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--line);border-radius:10px;padding:7px 9px;min-width:0}
.cb-hd{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:3px}
.cb-item{display:block;width:100%;text-align:left;background:none;border:none;font-family:inherit;font-size:12px;line-height:1.45;color:var(--ink);padding:2px 0;cursor:pointer}
.cb-item .o{color:var(--rose)}
.kal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px 12px}
.mm{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 6px;cursor:pointer;font-family:inherit;text-align:left;color:var(--ink)}
.mm-t{font-size:12px;font-weight:700;display:block;margin-bottom:4px;text-align:center}
.mm-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;font-size:8px;color:var(--muted)}
.mm-d{text-align:center;padding:0;line-height:1.3}
.mm-d.today{background:var(--sel);border-radius:3px;color:var(--ink);font-weight:700}
.mm-dots{display:flex;gap:1px;justify-content:center;height:3px}
.mm-dots i{width:3px;height:3px;border-radius:50%;display:inline-block}
.tag-pill{font-size:10px;color:var(--amber);background:#F5E8D8;padding:2px 7px;border-radius:99px}
.del-btn{font-size:12px;color:var(--red);background:none;border:none;cursor:pointer;padding:2px 4px;align-self:center;flex-shrink:0}
.empty{padding:18px;font-size:14px;color:var(--muted);line-height:1.7}
.hint-box{margin:12px 12px 0;padding:9px 14px;background:var(--red-soft);border-radius:10px;font-size:12px;color:var(--red)}

/* Rutinerad */
.chk{width:22px;height:22px;border-radius:6px;flex-shrink:0;margin-top:1px;border:2px solid var(--line);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:transparent}
.chk.done{border-color:var(--done-line);background:var(--done);color:var(--red)}

/* Rutiner som knapper */
.rt-chips{display:flex;flex-wrap:wrap;gap:8px;padding:12px 14px}
.rt-btn{padding:8px 14px;border-radius:99px;border:1.5px solid var(--line);background:var(--card);color:var(--ink);font-size:13px;cursor:pointer;font-family:inherit;transition:background .1s}
.rt-btn.done{background:var(--done);border-color:var(--done-line);color:var(--ink);font-weight:600}

/* Linjert dagliste */
.daylist{padding:6px 10px 8px}
.dl-row{display:flex;align-items:baseline;gap:8px;padding:2px 4px;border-bottom:1px solid var(--line);min-height:19px;font-size:11px}
.dl-row:last-child{border-bottom:none}
.dl-row.wend{background:var(--bg)}
.dl-wk{width:16px;flex-shrink:0;color:var(--rose);font-size:9px;text-align:right}
.dl-date{width:42px;flex-shrink:0;color:var(--muted)}
.dl-row.today .dl-date,.dl-row.today .dl-wk{color:var(--red);font-weight:700}
.dl-evs{display:flex;flex-wrap:wrap;gap:4px;flex:1;min-width:0}
.dl-ev{font-size:11px;line-height:1.4;border:none;background:var(--sel);color:var(--ink);font-weight:600;border-radius:6px;padding:1px 8px;cursor:pointer;font-family:inherit;text-align:left}
.dl-ev.done{opacity:.4;text-decoration:line-through}

/* Komprimert kategorioversikt */
.freq-block{padding:8px 14px;border-bottom:1px solid var(--line)}
.freq-block:last-child{border-bottom:none}
.freq-main{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700}
.freq-subs{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.freq-pill{font-size:11px;color:var(--muted);background:var(--bg);border:1px solid var(--line);padding:2px 8px;border-radius:99px;font-family:inherit}
button.freq-pill{cursor:pointer}
button.freq-pill:hover{color:var(--red);border-color:var(--red)}

/* Oppsummering */
.cloud{padding:26px 18px;display:flex;flex-wrap:wrap;gap:12px 16px;align-items:baseline;justify-content:center}
.cloud-word{background:none;border:none;cursor:pointer;font-family:inherit;padding:0}
.cloud-word.lv1{color:#7A2E28;opacity:.75}
.cloud-word.lv2{color:#9C3D2E}
.cloud-word.lv3{color:#BF5638}
.cloud-word.lv4{color:#E07348}
.cloud-word.lv5{color:#FF9466}
.cloud-word.hot{font-weight:700}
.cloud-word.sel{color:var(--amber);font-weight:700;text-decoration:underline}
.freq-row{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid var(--line)}
.freq-row:last-child{border-bottom:none}
.freq-name{flex:1;font-size:13px}
.freq-name.main{font-weight:700}
.freq-name.sub{padding-left:16px;color:var(--muted)}
.freq-count{font-size:12px;color:var(--rose)}

/* FAB — brukes ikke, Nytt innlegg er i toppmenyen */

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.32);display:flex;align-items:flex-end;justify-content:center;z-index:200}
.modal{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;padding:20px 18px 32px}
.modal-title{font-size:18px;font-weight:700;margin-bottom:16px}
.close-btn{float:right;background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted)}
.field-lbl{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;display:block;margin:16px 0 6px}
.inp{width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid var(--line);font-size:15px;background:var(--bg);color:var(--ink);font-family:inherit}
.inp:focus{outline:none;border-color:var(--red)}
textarea.inp{min-height:80px;resize:vertical}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.chip{padding:6px 12px;border-radius:99px;font-size:13px;cursor:pointer;border:1.5px solid var(--line);background:var(--card);color:var(--ink);font-family:inherit}
.chip.on{border-color:var(--sel-line);background:var(--sel);color:var(--ink);font-weight:700}
.chip-new{padding:6px 12px;border-radius:99px;font-size:13px;cursor:pointer;border:1.5px dashed var(--rose);background:transparent;color:var(--muted);font-family:inherit}
.save-btn{width:100%;margin-top:18px;padding:13px 0;border-radius:12px;border:none;background:var(--btn);color:var(--red);font-size:16px;font-weight:700;cursor:pointer;font-family:inherit}
.save-btn:not(:disabled):active{background:var(--sel)}
.save-btn:disabled{background:#EDE7D8;color:var(--muted);cursor:default}
.del-full-btn{display:block;width:100%;margin-top:10px;padding:11px 0;border-radius:12px;border:1.5px solid var(--red);background:transparent;color:var(--red);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
.step-back{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;margin-bottom:8px;display:block;font-family:inherit}
.hint{font-size:12px;color:var(--rose);margin-top:4px}
.add-btn{display:block;width:calc(100% - 24px);margin:10px 12px;padding:11px 0;border-radius:12px;border:1.5px dashed var(--rose);background:transparent;color:var(--muted);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}

@media(max-width:480px){
  body{font-size:13px}
  .tab{font-size:11px}
  .card{margin:8px 8px 4px}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
#print-area{display:none}
@media print{
  body>*{display:none!important}
  #print-area{display:block!important;color:#000;background:#fff;font-family:Georgia,'Times New Roman',serif;font-size:12pt;line-height:1.5}
  #print-area h1{font-size:17pt;margin:0 0 2pt}
  #print-area .p-sub{font-size:10pt;color:#444;margin:0 0 12pt}
  #print-area h2{font-size:12pt;margin:12pt 0 3pt;border-bottom:.75pt solid #000;padding-bottom:2pt}
  #print-area .p-item{margin:0 0 3pt;page-break-inside:avoid}
  #print-area .p-note{font-size:9.5pt;color:#444;margin-left:16pt}
  #print-area .p-meta{font-size:10pt;margin:1pt 0}
  #print-area .p-foot{margin-top:16pt;font-size:9pt;color:#666}
}

<body>
<div id="app"><div class="empty" style="padding:40px 18px">Laster …</div></div>
<div id="print-area" aria-hidden="true"></div>

<script>
'use strict';

var SK='takknemlighet-v2';
var MND_FULL=['januar','februar','mars','april','mai','juni','juli','august','september','oktober','november','desember'];
var UKEDAGER_FULL=['mandag','tirsdag','onsdag','torsdag','fredag','lørdag','søndag'];

function pad(n){return String(n).padStart(2,'0');}
function dow(d){return(new Date(d).getDay()+6)%7;}
function isoDate(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function fmtDate(s){var d=new Date(s+'T00:00:00');return d.getDate()+'. '+MND_FULL[d.getMonth()]+' '+d.getFullYear();}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function q(s){return String(s).replace(/'/g,'\\x27');}
function nbSort(a,b){return a.localeCompare(b,'nb');}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}

/* ── Kategorifarger: forhåndsdefinert palett, valgfri per hovedkategori, arves av underkategorier ── */
var CAT_COLORS=[
  {id:'salvie',name:'Kirurggrønn',hex:'#74A491'},
  {id:'furu',name:'Furu',hex:'#4E6B5C'},
  {id:'mose',name:'Mose',hex:'#8A8B5C'},
  {id:'petrol',name:'Petrol',hex:'#4E7B8C'},
  {id:'lyseblaa',name:'Lyseblå',hex:'#87A7BC'},
  {id:'marine',name:'Marine',hex:'#52657E'},
  {id:'lavendel',name:'Lavendel',hex:'#8B7A9E'},
  {id:'aubergine',name:'Aubergine',hex:'#6D4A68'},
  {id:'plomme',name:'Plomme',hex:'#8C5A74'},
  {id:'gammelrosa',name:'Gammelrosa',hex:'#C0868E'},
  {id:'rosa',name:'Rosa',hex:'#C46E7E'},
  {id:'bringebaer',name:'Bringebær',hex:'#A34A5E'},
  {id:'fersken',name:'Fersken',hex:'#DE9273'},
  {id:'teglstein',name:'Teglstein',hex:'#A8574A'},
  {id:'rust',name:'Oransje',hex:'#CC7F33'},
  {id:'oker',name:'Lysegul',hex:'#E2C878'},
  {id:'sand',name:'Sand',hex:'#C2AC85'},
  {id:'kanel',name:'Kanel',hex:'#9C6B3F'},
  {id:'espresso',name:'Espresso',hex:'#6F4E37'},
  {id:'varmgraa',name:'Varmgrå',hex:'#94897B'}
];
function colorHexById(colId){var p=CAT_COLORS.find(function(x){return x.id===colId;});return p?p.hex:null;}
function catColor(catId){
  var c=catById(catId);if(!c)return null;
  var m=c.parentId?catById(c.parentId):c;
  return m&&m.color?colorHexById(m.color):null;
}
function textOn(hex){
  if(!hex)return'#FDF7EC';
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  var lum=0.299*r+0.587*g+0.114*b;
  return lum>165?'#3B2E24':'#FDF7EC';
}
function itemColor(catIds){
  var ids=catIds||[];
  for(var i=0;i<ids.length;i++){var col=catColor(ids[i]);if(col)return col;}
  return null;
}
function goalColor(g){
  var ids=g&&g.cats||[];
  for(var i=0;i<ids.length;i++){var col=catColor(ids[i]);if(col)return col;}
  return null;
}

var today=new Date();
var curYear=today.getFullYear();
var curMonth=today.getMonth()+1;

/* ── State ──
   entries:  {id,text,cats:[subIds],tags:[],date}
   cats:     {id,name,parentId?}
   routines: {id,name,cats:[subIds],months:[1-12] (tom=alle),log:['YYYY-MM']}
   events:   {id,name,cats:[subIds],year,month,done}
*/
var entries=[],cats=[],routines=[],events=[],goals=[],laters=[],results=[],inventories=[],budgetRows=[],deposits=[];
var invShowMissing=false;
var openGoals={};
var editMode=false;
var modal=null;
var drawerOpen=false;
var gifts=[];
var tagCats={};
function tagColor(tag){var cid=tagCats[tag];if(!cid)return null;var col=catColor(cid);return col?lightHex(col,0.62):null;}
function setTagCat(tag,catId){if(catId)tagCats[tag]=catId;else delete tagCats[tag];save();render();}
function goHashtags(){view={kind:'hashtags'};drawerOpen=false;render();}
// gift: {id, person, bdayId(valgfri), kind:'bursdag'|'jul'|'annet', year, what, idea:bool, greeting:bool(bursdagshilsen), card:bool(julekort), note}
function giftPeople(){
  var names={};
  gifts.forEach(function(g){var k=(g.person||'').trim();if(k)names[k]=(names[k]||0)+1;});
  events.forEach(function(e){if(e.bday&&e.giftPerson)names[(e.name||'').trim()]=names[(e.name||'').trim()]||0;});
  return Object.keys(names).sort(function(a,b){return nbSort(a,b);});
}
function giftsFor(person){return gifts.filter(function(g){return(g.person||'').trim()===(person||'').trim();});}
function bdayForPerson(person){return events.find(function(e){return e.bday&&(e.name||'').trim()===(person||'').trim();});}
var DEFAULT_UNITS=['n\u00f8ster','stk','boks','g','kg','ml','dl'];
var customUnits=[];
function allUnits(){return DEFAULT_UNITS.concat(customUnits.filter(function(u){return DEFAULT_UNITS.indexOf(u)<0;}));}
function addCustomUnit(u){
  u=(u||'').trim();
  if(!u)return;
  if(allUnits().some(function(x){return x.toLowerCase()===u.toLowerCase();}))return u;
  customUnits.push(u);save();
  return u;
}
function goLister(){view={kind:'lister'};drawerOpen=false;render();}
function goVenteliste(){view={kind:'venteliste'};drawerOpen=false;render();}
function commitNewUnit(){
  var f=mf();var u=addCustomUnit(f._newUnit||'');
  if(u){f.values=f.values||{};f.values.__unit=u;f.__unitSel=u;}
  f._addUnit=false;f._newUnit='';render();
}
function goBursdager(){view={kind:'bursdager'};drawerOpen=false;render();}
function goBursdagsliste(){view={kind:'bursdagsliste'};drawerOpen=false;render();}
function goGaver(){view={kind:'gaver'};drawerOpen=false;render();}
function bursdagerHubHTML(){
  var bdays=events.filter(function(e){return e.bday;});
  var h='<div class="view-title">Bursdager</div>';
  h+='<div class="card"><div class="entry-row" style="cursor:pointer" onclick="goBursdagsliste()">'
    +'<div class="entry-body"><div class="entry-text">Bursdagsliste</div>'
    +'<div class="entry-date">'+bdays.length+' av '+BDAY_MAX+' bursdager</div></div>'
    +'<span style="align-self:center;color:var(--rose)">\u203a</span></div></div>';
  h+='<div class="card"><div class="entry-row" style="cursor:pointer" onclick="goGaver()">'
    +'<div class="entry-body"><div class="entry-text">Gavelogg</div>'
    +'<div class="entry-date">'+giftPeople().length+' personer</div></div>'
    +'<span style="align-self:center;color:var(--rose)">\u203a</span></div></div>';
  return h;
}
function bursdagslisteViewHTML(){
  var bdays=events.filter(function(e){return e.bday;}).sort(function(a,b){return daysToNextBday(a)-daysToNextBday(b)||nbSort(a.name,b.name);});
  var h='<div style="display:flex;align-items:center;gap:8px;padding:14px 12px 0">'
    +'<button class="icon-btn" onclick="goBursdager()">\u2039</button>'
    +'<div class="view-title" style="padding:0;flex:1">Bursdagsliste <span style="font-size:12px;font-weight:400;color:var(--rose)">\u00b7 '+bdays.length+' av '+BDAY_MAX+'</span></div></div>';
  if(bdays.length){
    h+='<div class="card" style="padding:6px 0">';
    bdays.forEach(function(e){
      var round=isRoundBdayNext(e);
      var nAge=bdayNextAge(e);
      var age=ageToday(e);
      var dd=daysToNextBday(e);
      var isToday=dd===0;
      var gratd=evDone(e,curYear);
      var when=isToday?'i dag!':dd===1?'i morgen':'om '+dd+' dager';
      h+='<div class="'+(round?'confetti round-bday':'')+'" style="display:flex;align-items:center;gap:8px;padding:3px 14px;font-size:13px;position:relative">'
        +(round?confettiHTML():'')
        +'<span style="width:64px;flex-shrink:0;color:var(--muted);font-size:12px">'+(e.day?e.day+'. ':'')+MND_FULL[e.month-1].slice(0,3)+'</span>'
        +'<span style="flex:1"><span style="cursor:pointer;text-decoration:underline;text-decoration-color:var(--line);text-underline-offset:2px" onclick="goGavePerson(\''+q(e.name)+'\')">'+esc(e.name)+'</span>'
        +(age!==null?' <span style="color:var(--muted);font-size:11px">'+age+' \u00e5r</span>':'')
        +' <span style="color:var(--rose);font-size:11px">\u00b7 '+(nAge!==null?'fyller '+nAge+' ':'bursdag ')+when+'</span>'
        +(round?' <span style="color:var(--red);font-weight:700;font-size:11px">\ud83c\udf89</span>':'')
        +'</span>'
        +(isToday?'<button class="chip'+(gratd?' on':'')+'" style="font-size:11px;padding:3px 10px;flex-shrink:0" onclick="toggleEvent(\''+q(e.id)+'\','+curYear+')">'+(gratd?'\u2713 Gratulert':'Gratulert?')+'</button>':'')
        +'<button class="icon-btn" style="font-size:11px;padding:1px 7px" onclick="openEditEvent(\''+q(e.id)+'\')">\u270e</button>'
        +'</div>';
    });
    h+='</div>';
  } else {
    h+='<div class="card"><div class="empty">Ingen bursdager ennå.</div></div>';
  }
  if(bdays.length>=BDAY_MAX){
    h+='<div class="hint-box" style="color:var(--amber)">Du har n\u00e5dd '+BDAY_MAX+' bursdager \u2014 Dunbars tall for hvor mange meningsfulle relasjoner et menneske greier \u00e5 holde ved like.</div>';
  } else {
    h+='<button class="add-btn" onclick="openBdayModal()">+ Ny bursdag</button>';
  }
  return h;
}
function openGiftModal(person){
  modal={step:'gift',form:{id:'',person:person||'',kind:'bursdag',year:curYear,what:'',idea:false,note:''}};render();
}
function openEditGift(id){
  var g=gifts.find(function(x){return x.id===id;});if(!g)return;
  modal={step:'gift',form:{id:g.id,person:g.person||'',kind:g.kind||'bursdag',year:g.year||curYear,what:g.what||'',idea:!!g.idea,note:g.note||''}};render();
}
function submitGift(){
  var f=mf();var person=(f.person||'').trim();var what=(f.what||'').trim();
  if(!person||!what)return;
  if(f.id){
    var g=gifts.find(function(x){return x.id===f.id;});if(!g)return;
    g.person=person;g.kind=f.kind;g.year=Number(f.year)||curYear;g.what=what;g.idea=!!f.idea;g.note=(f.note||'').trim();
  } else {
    gifts.push({id:'gf'+Date.now()+Math.random().toString(36).slice(2,6),person:person,kind:f.kind,year:Number(f.year)||curYear,what:what,idea:!!f.idea,note:(f.note||'').trim()});
  }
  save();closeModal();
}
function giftIdeaToGiven(id){var g=gifts.find(function(x){return x.id===id;});if(g){g.idea=false;save();render();}}
function deleteGift(id){gifts=gifts.filter(function(x){return x.id!==id;});save();closeModal();}
// Bursdagshilsen og julekort logges per person per år
function greetKey(person,year,kind){return 'gr_'+kind+'_'+year+'_'+(person||'').trim();}
function greetDone(person,year,kind){return gifts.some(function(g){return g.greetMark&&g.person===(person||'').trim()&&g.year===year&&g.kind===kind;});}
function toggleGreet(person,year,kind){

function evOccYearOk(e,Y){
  if(!e.repeat)return Number(e.year)===Y;
  var st=Number(e.year);if(Y<st)return false;
  return(Y-st)%(Number(e.interval)||1)===0;
}
function eventsOnDate(dm,dd,dy){
  var out=[];
  var target=new Date(dy,dm-1,dd).getTime();
  events.forEach(function(e){
    if(!e.day)return;
    [dy,dy-1].forEach(function(Y){
      if(!evOccYearOk(e,Y))return;
      var start=new Date(Y,e.month-1,e.day);
      var end=start;
      if(e.toDay){
        var wraps=(e.toMonth<e.month)||(e.toMonth===e.month&&e.toDay<e.day);
        end=new Date(Y+(wraps?1:0),e.toMonth-1,e.toDay);
      }
      if(target>=start.getTime()&&target<=end.getTime()){
        if(!out.some(function(o){return o.e.id===e.id&&o.occYear===Y;}))
          out.push({e:e,occYear:Y,isStart:target===start.getTime(),isEnd:target===end.getTime()});
      }
    });
  });
  return out;
}

  mf().resultIds=a.includes(id)?a.filter(function(x){return x!==id;}):[].concat(a,[id]);
  render();
}
function fmtKr(n){return Math.round(Number(n)||0).toString().replace(/\B(?=(\d{3})+(?!\d))/g,'\u00a0');}
function parseKr(v){var n=Number(String(v).replace(/[\s\u00a0]/g,'').replace(',','.'));return isNaN(n)?null:n;}
function budgetRowFor(catId,year,create){
  var row=budgetRows.find(function(b){return b.catId===catId&&b.year===year;});
  if(!row&&create){
    row={id:'b'+Date.now()+Math.random().toString(36).slice(2,6),catId:catId,year:year,plan:[null,null,null,null],actual:[null,null,null,null]};
    budgetRows.push(row);
  }
  return row||null;
}
function setBudget(catId,year,qi,field,val){
  var row=budgetRowFor(catId,Number(year),true);
  row[field][qi]=parseKr(val);
  save();render();
}
var KVARTAL=['Q1 januar\u2013mars','Q2 april\u2013juni','Q3 juli\u2013september','Q4 oktober\u2013desember'];
function setBudgetNote(rowId,qi,field,val){
  var row=budgetRows.find(function(b){return b.id===rowId;});if(!row)return;
  if(!row.planNote)row.planNote=[null,null,null,null];
  if(!row.actualNote)row.actualNote=[null,null,null,null];
  row[field][qi]=(val||'').trim()||null;
  save();
}
function setBudgetRowType(rowId,type){
  var row=budgetRows.find(function(b){return b.id===rowId;});if(!row)return;
  row.type=type;save();render();
}

function listerViewHTML(){
  var h='<div class="view-title">Lister</div>';

  var fixed=inventories.filter(function(iv){return iv.fixed;}).sort(function(a,b){return a.fixed<b.fixed?-1:1;});

  var rowFor=function(inv){
    var c=invCounts(inv);

      :(inv.type||'inventar')==='pakke'?(inv.pakkeFast?'fast pakkeliste':'pakkeliste'):'inventarliste';
    return'<div class="entry-row" style="cursor:pointer" onclick="goInventar(\''+q(inv.id)+'\')">'
      +'<div class="entry-body"><div class="entry-text">'+esc(inv.name)+' <span style="font-size:10px;color:var(--rose)">\u00b7 '+typeTxt+'</span></div>'
      +'<div class="entry-date">'+c.have+' av '+c.total+(c.missing?' <span style="color:var(--amber)">\u00b7 gjenst\u00e5r '+c.missing+'</span>':'')+'</div></div>'
      +'<span style="align-self:center;color:var(--rose)">\u203a</span></div>';
  };
  h+='<div class="card">';
  fixed.forEach(function(inv){
    h+=rowFor(inv);
    // Venteliste rett under Prioriterte innkjøp
    if(inv.fixed==='anskaffelser'){
      h+='<div class="entry-row" style="cursor:pointer" onclick="goVenteliste()">'
        +'<div class="entry-body"><div class="entry-text">Venteliste</div>'
        +'<div class="entry-date">'+laters.length+(laters.length===1?' ting':' ting')+' venter</div></div>'
        +'<span style="align-self:center;color:var(--rose)">\u203a</span></div>';
    }
  });
  h+='</div>';
  // Egne lister
  h+='<button class="add-btn" onclick="openInvModal()">+ Ny liste</button>';
  var packs=userLists.filter(function(iv){return(iv.type||'inventar')==='pakke';}).sort(function(a,b){return nbSort(a.name,b.name);});
  var invs=userLists.filter(function(iv){return(iv.type||'inventar')==='inventar';}).sort(function(a,b){return nbSort(a.name,b.name);});
  var colRow=function(inv){
    var c=invCounts(inv);
    return'<div class="entry-row" style="cursor:pointer;padding:8px 10px" onclick="goInventar(\''+q(inv.id)+'\')">'
      +'<div class="entry-body"><div class="entry-text" style="font-size:14px">'+esc(inv.name)
      +((inv.type||'inventar')==='pakke'&&inv.pakkeFast?' <span style="font-size:10px;color:var(--rose)">\u00b7 fast</span>':'')+'</div>'
      +'<div class="entry-date">'+c.have+' av '+c.total+(c.missing?' <span style="color:var(--amber)">\u00b7 '+c.missing+'</span>':'')+'</div></div></div>';
  };
  if(packs.length||invs.length){
    h+='<div class="view-sub" style="padding-top:12px;font-weight:600">Egne lister</div>';
    h+='<div style="display:flex;gap:8px;padding:0 12px">'

function gaverViewHTML(){
  var people=giftPeople();
  var h='<div class="view-title">Gaver</div>';
  h+='<button class="add-btn" onclick="openGiftModal(\'\')">+ Ny gave eller idé</button>';
  // Kommende bursdager blant gavefolk — hint om ideer
  var soon=events.filter(function(e){return e.bday&&daysToNextBday(e)<=21&&giftsFor(e.name).length;})
    .sort(function(a,b){return daysToNextBday(a)-daysToNextBday(b);});
  if(!people.length){
    h+='<div class="card"><div class="empty">Ingen gaver logget enn\u00e5. Registrer en gave du har gitt, eller en id\u00e9 du vil huske \u2014 s\u00e5 f\u00e5r hver person sin egen gaveside.</div></div>';
    return h;
  }
  // Årsmatrise: personer som rader, år som kolonner delt i Bursdag/Jul/Andre
  var given=gifts.filter(function(g){return!g.greetMark&&!g.idea;});
  var years=Array.from(new Set(given.map(function(g){return Number(g.year);}))).sort(function(a,b){return b-a;});
  var cellText=function(pn,y,k){
    var items=given.filter(function(g){return(g.person||'').trim()===pn&&Number(g.year)===y&&g.kind===k;});
    if(!items.length)return'<span style="color:var(--line)">\u00b7</span>';
    return items.map(function(g){return esc(g.what);}).join('<br>');
  };
  h+='<div class="view-sub" style="padding-top:12px;font-weight:600">Gaveoversikt</div>';
  if(!years.length){
    h+='<div class="card"><div class="empty">Ingen gitte gaver logget enn\u00e5 \u2014 bare id\u00e9er. N\u00e5r du registrerer en gitt gave, dukker den opp i oversikten.</div></div>';
  } else {
    var kinds=[['bursdag','Bursdag'],['jul','Jul'],['annet','Andre']];
    var th='<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><table style="border-collapse:collapse;font-size:11px;min-width:100%">';
    // Rad 1: år
    th+='<tr><th style="position:sticky;left:0;z-index:2;background:var(--card);border-bottom:1px solid var(--line);padding:4px 8px"></th>';
    years.forEach(function(y,i){
      th+='<th colspan="3" style="text-align:center;font-size:11px;font-weight:700;padding:4px 6px 2px;border-bottom:1px solid var(--line)'+(i>0?';border-left:1.5px solid var(--line)':'')+'">'+y+'</th>';
    });
    th+='</tr>';
    // Rad 2: sub-kolonner
    th+='<tr><th style="position:sticky;left:0;z-index:2;background:var(--card);border-bottom:1.5px solid var(--line)"></th>';
    years.forEach(function(y,i){
      kinds.forEach(function(kk,ki){
        th+='<th style="font-size:11px;font-weight:400;color:var(--muted);padding:2px 6px;border-bottom:1.5px solid var(--line);min-width:64px'+(ki===0&&i>0?';border-left:1.5px solid var(--line)':'')+'">'+kk[1]+'</th>';
      });
    });
    th+='</tr>';
    // Rader: personer
    people.forEach(function(pn){
      var bd=bdayForPerson(pn);var dd=bd?daysToNextBday(bd):null;
      var nameCol='<th style="position:sticky;left:0;z-index:1;background:var(--card);text-align:left;font-weight:600;padding:5px 8px;border-bottom:1px solid var(--line);cursor:pointer;white-space:nowrap" onclick="goGavePerson(\''+q(pn)+'\')">'+esc(pn)
        +(dd!==null&&dd<=21?'<br><span style="font-weight:400;color:var(--rose);font-size:10px">bursdag om '+dd+' d</span>':'')+'</th>';
      var cells='';
      years.forEach(function(y,i){
        kinds.forEach(function(kk,ki){
          cells+='<td style="text-align:center;vertical-align:top;padding:5px 6px;border-bottom:1px solid var(--line);color:var(--ink)'+(ki===0&&i>0?';border-left:1.5px solid var(--line)':'')+'">'+cellText(pn,y,kk[0])+'</td>';
        });
      });
      th+='<tr>'+nameCol+cells+'</tr>';
    });
    th+='</table></div>';
    h+='<div class="card" style="padding:8px 4px">'+th
      +'<div style="font-size:10px;color:var(--muted);padding:6px 8px 2px">Trykk p\u00e5 navnet for detaljer og id\u00e9er.</div></div>';
  }
  // Personer uten gitte gaver (bare idéer) — så de ikke forsvinner
  var onlyIdeas=people.filter(function(pn){return!given.some(function(g){return(g.person||'').trim()===pn;});});
  if(onlyIdeas.length){
    h+='<div class="view-sub" style="padding-top:12px;font-weight:600">Bare id\u00e9er enn\u00e5</div><div class="card">';
    onlyIdeas.forEach(function(pn){
      var ideas=giftsFor(pn).filter(function(g){return g.idea;}).length;
      h+='<div class="entry-row" style="cursor:pointer" onclick="goGavePerson(\''+q(pn)+'\')">'
        +'<div class="entry-body"><div class="entry-text">'+esc(pn)+'</div>'
        +'<div class="entry-date">'+ideas+' id\u00e9'+(ideas>1?'er':'')+'</div></div>'
        +'<span style="align-self:center;color:var(--rose)">\u203a</span></div>';
    });
    h+='</div>';
  }
  return h;
}

      ['bursdag','jul','annet'].forEach(function(k){
        given.filter(function(g){return g.year===y&&g.kind===k;}).forEach(function(g){
          h+='<div class="entry-row"><div class="entry-body"><div class="entry-text">'+esc(g.what)+'</div>'
            +'<div class="entry-date">'+giftKindLabel(g.kind)+(g.note?' \u00b7 '+esc(g.note):'')+'</div></div>'
            +'<button class="icon-btn" style="font-size:11px;padding:1px 7px;align-self:center" onclick="openEditGift(\''+q(g.id)+'\')">\u270e</button></div>';
        });

    });

  // Bursdagshilsen og julekort — per år
  h+='<div class="view-sub" style="padding-top:12px;font-weight:600">Hilsener i \u00e5r</div><div class="card" style="padding:8px 0">'
    +'<div style="display:flex;align-items:center;gap:10px;padding:4px 14px">'
    +'<span style="flex:1;font-size:13px">Bursdagshilsen '+curYear+'</span>'
    +'<button class="chip'+(greetDone(pn,curYear,'bursdag')?' on':'')+'" style="font-size:11px;padding:3px 10px" onclick="toggleGreet(\''+q(pn)+'\','+curYear+',\'bursdag\')">'+(greetDone(pn,curYear,'bursdag')?'\u2713 Sendt':'Marker sendt')+'</button></div>'
    +'<div style="display:flex;align-items:center;gap:10px;padding:4px 14px">'
    +'<span style="flex:1;font-size:13px">Julekort '+curYear+'</span>'
    +'<button class="chip'+(greetDone(pn,curYear,'jul')?' on':'')+'" style="font-size:11px;padding:3px 10px" onclick="toggleGreet(\''+q(pn)+'\','+curYear+',\'jul\')">'+(greetDone(pn,curYear,'jul')?'\u2713 Sendt':'Marker sendt')+'</button></div>'

    h+='<div class="card"><div class="empty">Ingen gaver logget for '+esc(pn)+' enn\u00e5. Trykk \u00ab+ Gave\u00bb for \u00e5 registrere en gave eller notere en id\u00e9.</div></div>';

  var pTags=personTagsFor(pn);

    h+='<div class="card"><div class="empty">Knytt en eller flere hashtagger til '+esc(pn)+' (rediger bursdagen, eller bruk «Tilknytt hashtagg»), så vises takknemlighetsinnlegg om denne personen her.</div></div>';
  } else if(!pEntries.length){
    h+='<div class="card"><div class="empty">Ingen innlegg merket med '+pTags.map(function(t){return '#'+esc(t);}).join(', ')+' ennå.</div></div>';
  } else {
    h+='<div class="card">'+pEntries.map(entryRowHTML).join('')+'</div>';
  }
  return h;

function openPinSetup(){
  var pd=pinData();
  modal={step:'pinsetup',form:{has:!!pd,pin:'',pin2:'',q:pd?pd.q:'',a:'',cur:'',showOff:false}};render();
}
function submitPinSetup(){
  var f=mf();
  if(!/^[0-9]{4}$/.test(f.pin)){f._err='PIN-en m\u00e5 v\u00e6re fire siffer.';render();return;}
  if(f.pin!==f.pin2){f._err='De to PIN-kodene er ikke like.';render();return;}
  if(!(f.q||'').trim()||!(f.a||'').trim()){f._err='Fyll inn b\u00e5de sp\u00f8rsm\u00e5l og svar.';render();return;}
  pinSet(f.pin,f.q.trim(),f.a);
  closeModal();
}
function turnPinOff(){
  var f=mf();var pd=pinData();
  if(!pd)return;
  if(f.cur!==pd.pin){f._err2='Feil PIN.';render();return;}
  pinClear();closeModal();
}
function goBudsjett(y,q){view={kind:'budsjett',year:y,q:q||'\u00e5r'};drawerOpen=false;render();}
function addBudgetLine(catId){
  var row=budgetRowFor(catId,view.year,true);
  row.type=(mf()&&mf().type)==='in'?'in':'ut';
  save();closeModal();
}
function removeBudgetLine(rowId){budgetRows=budgetRows.filter(function(b){return b.id!==rowId;});save();closeModal();}
function openBudgetLineModal(){modal={step:'budgetline',form:{type:'ut'}};render();}
function openEditBudgetRow(rowId){
  var row=budgetRows.find(function(b){return b.id===rowId;});if(!row)return;
  modal={step:'budgetrow_edit',form:{id:rowId,catId:row.catId}};render();
}
function savedFor(resultId){
  return deposits.filter(function(d){return d.resultId===resultId;}).reduce(function(a,d){return a+(Number(d.amount)||0);},0);
}
function openPostingModal(){
  modal={step:'posting',form:{rowId:'',amount:'',qi:Math.ceil(curMonth/3)-1,note:''}};render();
}
function submitPosting(){
  var f=mf();var amt=parseKr(f.amount);
  var row=budgetRows.find(function(b){return b.id===f.rowId;});
  if(!row||amt===null||!amt)return;
  var qi=Number(f.qi);
  row.actual[qi]=(row.actual[qi]||0)+amt;
  var note=(f.note||'').trim();
  if(note){
    if(!row.actualNote)row.actualNote=[null,null,null,null];
    row.actualNote[qi]=row.actualNote[qi]?row.actualNote[qi]+' \u00b7 '+note:note;
  }
  save();closeModal();
}
function openDepositModal(resultId){
  modal={step:'deposit',form:{resultId:resultId,amount:'',date:isoDate(today),note:''}};render();
}
function submitDeposit(){
  var f=mf();var amt=parseKr(f.amount);if(amt===null||!amt)return;
  deposits.push({id:'d'+Date.now()+Math.random().toString(36).slice(2,6),resultId:f.resultId,amount:amt,date:f.date||isoDate(today),note:(f.note||'').trim()});
  save();closeModal();
}
function deleteDeposit(id){deposits=deposits.filter(function(d){return d.id!==id;});save();render();}
function invById(id){return inventories.find(function(i){return i.id===id;});}
function invCounts(inv){
  var items=inv.items||[];
  var have=items.filter(function(it){return it.have;}).length;

function exportJSON(){
  var data=JSON.stringify({entries:entries,cats:cats,routines:routines,events:events,goals:goals,laters:laters,results:results,inventories:inventories,budgetRows:budgetRows,deposits:deposits,gifts:gifts,tagCats:tagCats,customUnits:customUnits},null,2);
  var blob=new Blob([data],{type:'application/json'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='takknemlighetsdagbok-'+isoDate(today)+'.json';
  a.click();
  try{localStorage.setItem(SK+'_backup',String(Date.now()));}catch(e){}
  render();
}
function importJSON(){
  var inp=document.createElement('input');
  inp.type='file';inp.accept='.json,application/json';
  inp.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var d=JSON.parse(ev.target.result);
        if(!d.entries)throw new Error('Ugyldig fil');
        entries=d.entries||[];cats=d.cats||[];routines=d.routines||[];events=d.events||[];goals=d.goals||[];laters=d.laters||[];results=d.results||[];inventories=d.inventories||[];budgetRows=d.budgetRows||[];deposits=d.deposits||[];gifts=d.gifts||[];tagCats=d.tagCats||{};customUnits=d.customUnits||[];
        save();render();
      }catch(err){alert('Kunne ikke lese filen: '+err.message);}
    };
    reader.readAsText(file);
  };
  inp.click();
}
function exportTekst(){
  var lines=['# Takknemlighetsdagbok','',''];
  var mains=cats.filter(function(c){return!c.parentId;}).sort(function(a,b){return nbSort(a.name,b.name);});
  mains.forEach(function(m){
    var subs=cats.filter(function(c){return c.parentId===m.id;}).sort(function(a,b){return nbSort(a.name,b.name);});
    var any=false;var block=['## '+m.name,''];
    var direct=entries.filter(function(e){return e.cats.includes(m.id);});
    if(direct.length){
      any=true;
      direct.slice().sort(function(a,b){return a.date<b.date?1:-1;}).forEach(function(e){
        block.push('- '+e.text+' _('+fmtDate(e.date)+')_'+((e.tags||[]).length?' #'+e.tags.join(' #'):''));
      });
      block.push('');
    }
    subs.forEach(function(s){
      var es=entries.filter(function(e){return e.cats.includes(s.id);});
      if(!es.length)return;
      any=true;block.push('### '+s.name,'');
      es.slice().sort(function(a,b){return a.date<b.date?1:-1;}).forEach(function(e){
        block.push('- '+e.text+' _('+fmtDate(e.date)+')_'+((e.tags||[]).length?' #'+e.tags.join(' #'):''));
      });
      block.push('');
    });
    if(any)lines=lines.concat(block);
  });
  var blob=new Blob([lines.join('\n')],{type:'text/markdown'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='takknemlighetsdagbok-'+isoDate(today)+'.md';
  a.click();
}

function addTag(){
  var inp=document.getElementById('tag-inp');
  var raw=(inp?inp.value:'');
  var vals=raw.split(',').map(function(v){return v.trim().toLowerCase();}).filter(Boolean);
  if(!vals.length)return;
  vals.forEach(function(v){if(!mf().tags.includes(v))mf().tags=[].concat(mf().tags,[v]);});
  render();

}

function allTags(){
  var counts={};
  entries.forEach(function(e){(e.tags||[]).forEach(function(t){counts[t]=(counts[t]||0)+1;});});

}
function tagCountsFor(list){
  var counts={};
  (list||[]).forEach(function(e){(e.tags||[]).forEach(function(t){counts[t]=(counts[t]||0)+1;});});

function cloudHTML(counts,clickable){
  var words=Object.keys(counts).sort(nbSort);
  if(!words.length)return'';
  var max=Math.max.apply(null,words.map(function(w){return counts[w];}));
  return'<div class="card"><div class="cloud">'+words.map(function(w){
    var c=counts[w];
    var size=13+Math.round((c/max)*15);
    var lv=Math.min(5,1+Math.floor((c-1)/max*5));
    var cls='cloud-word lv'+lv+(c>10?' hot':'')+(clickable&&selectedTag===w?' sel':'');
    if(clickable)return'<button class="'+cls+'" style="font-size:'+size+'px" onclick="selectTag(\''+q(w)+'\')">'+esc(w)+'</button>';
    return'<span class="'+cls+'" style="font-size:'+size+'px;cursor:default">'+esc(w)+'</span>';
  }).join('')+'</div></div>';
}

function mergeCat(fromId,toId){
  if(!fromId||!toId||fromId===toId)return;
  var from=catById(fromId),to=catById(toId);
  if(!from||!to)return;
  var remap=function(arr){
    var out=(arr||[]).map(function(cid){return cid===fromId?toId:cid;});
    return out.filter(function(c,i){return out.indexOf(c)===i;});
  };
  entries.forEach(function(e){e.cats=remap(e.cats);});
  routines.forEach(function(r){r.cats=remap(r.cats);});
  events.forEach(function(e){e.cats=remap(e.cats);});
  cats.forEach(function(c){if(c.parentId===fromId)c.parentId=toId;});
  cats=cats.filter(function(c){return c.id!==fromId;});
  budgetRows.forEach(function(b){if(b.catId===fromId)b.catId=toId;});
  save();closeModal();
}

function deleteCat(id){
  var c=cats.find(function(x){return x.id===id;});if(!c)return;
  if(!c.parentId){
    var subIds=cats.filter(function(x){return x.parentId===id;}).map(function(x){return x.id;});
    cats=cats.filter(function(x){return x.id!==id&&x.parentId!==id;});
    var strip=function(arr){return arr.filter(function(cid){return !subIds.includes(cid)&&cid!==id;});};
    entries.forEach(function(e){e.cats=strip(e.cats);});
    routines.forEach(function(r){r.cats=strip(r.cats||[]);});
    events.forEach(function(e){e.cats=strip(e.cats||[]);});
  } else {
    cats=cats.filter(function(x){return x.id!==id;});
    entries.forEach(function(e){e.cats=e.cats.filter(function(cid){return cid!==id;});});
    routines.forEach(function(r){r.cats=(r.cats||[]).filter(function(cid){return cid!==id;});});
    events.forEach(function(e){e.cats=(e.cats||[]).filter(function(cid){return cid!==id;});});
  }
  save();closeModal();
}

      .forEach(function(v){if(!f.tags.includes(v))f.tags=[].concat(f.tags,[v]);});

}

function updateSaveBtn(){
  var btn=document.querySelector('.save-btn');
  if(!btn||!modal)return;
  var step=modal.step,enabled=false;
  if(step==='entry'||step==='entry_edit')enabled=entryValid();
  if(step==='routine'||step==='routine_edit'||step==='event'||step==='event_edit')enabled=routineValid();
  if(step==='cat_new'){
    enabled=(mf()._newMain||'').trim().length>0;
  }
  if(step==='cat_edit'||step==='goal'||step==='goal_edit'||step==='later'||step==='later_edit')enabled=(mf().name||'').trim().length>0;
  if(step==='result'||step==='result_edit')enabled=(mf().name||'').trim().length>0&&!!mf().valueId;
  if(step==='invsec'||step==='invsec_edit')enabled=(mf().name||'').trim().length>0;
  if(step==='invitem'||step==='invitem_edit'){var iv2=invById(mf().invId)||{};enabled=(mf().name||'').trim().length>0&&(!iv2.qty||String((mf().values||{}).__qty||'').length>0);}
  if(step==='gift')enabled=(mf().person||'').trim().length>0&&(mf().what||'').trim().length>0;
  if(step==='inv'||step==='inv_edit')enabled=invValid(mf());
  if(step==='deposit')enabled=!!parseKr(mf().amount);
  if(step==='posting')enabled=!!parseKr(mf().amount)&&!!mf().rowId;
  btn.disabled=!enabled;
}

function catBoxesHTML(items){
  if(!items.length)return'';
  var groups={},order=[];
  items.forEach(function(it){
    var k=it.cat?it.cat.id:'_annet';
    if(!groups[k]){groups[k]={cat:it.cat,items:[]};order.push(k);}
    groups[k].items.push(it);
  });
  order.sort(function(a,b){
    if(a==='_annet')return 1;
    if(b==='_annet')return -1;
    return nbSort(groups[a].cat.name,groups[b].cat.name);
  });
  return'<div class="catbox-grid">'+order.map(function(k){
    var g=groups[k];
    var col=g.cat?catColor(g.cat.id):null;
    return'<div class="cat-box"'+(col?' style="border-left-color:'+col+'"':'')+'>'
      +'<div class="cb-hd">'+esc(g.cat?g.cat.name:'Annet')+'</div>'
      +g.items.map(function(it){
        if(it.done){
          return'<button class="cb-item" style="opacity:.5" onclick="'+it.click+'"><span style="color:var(--red)">\u2713</span> <span style="text-decoration:line-through">'+esc(it.label)+'</span>'
            +(it.sub?' <span style="color:var(--muted);font-size:10px">'+esc(it.sub)+'</span>':'')+'</button>';
        }
        return'<button class="cb-item" onclick="'+it.click+'"><span class="o">\u25cb</span> '+esc(it.label)
          +(it.sub?' <span style="color:var(--muted);font-size:10px">'+esc(it.sub)+'</span>':'')+'</button>';
      }).join('')
      +'</div>';
  }).join('')+'</div>';
}
function periodTodoItems(scope){
  // scope: {wk, wKey, ym, m, y, includeDatedWeek (kun dagbok), includeUndated (kun uke)}
  var out=[];var total=0;
  var pushR=function(r,key,sub){
    total++;
    var done=(r.log||[]).includes(key);
    var rk='r_'+r.id+'_'+key;
    if(done&&!recentDone[rk])return;
    out.push({label:r.name,sub:sub,done:done,cat:mainCatOf(r.cats),click:"boxToggleRoutine('"+q(r.id)+"','"+q(key)+"')"});
  };
  routines.forEach(function(r){
    var months=r.months||[];
    if(months.length&&!months.includes(scope.m))return;
    if(r.freq==='daily'){
      // Daglige rutiner vises bare i dagbokboksene, aldri i kalenderen
      if(!scope.daily)return;
      pushR(r,'d'+scope.daily,'daglig');
    } else if(r.freq==='yearly'){
      pushR(r,'y'+scope.y,'\u00e5rlig');
    } else if(isWeekly(r)){
      if(r.freq==='odd'&&scope.wk%2===0)return;
      if(r.freq==='even'&&scope.wk%2===1)return;
      pushR(r,scope.wKey,'');
    } else {
      pushR(r,scope.ym,'hver m\u00e5ned');
    }
  });
  if(scope.includeDatedWeek){
    scope._seen={};
    var ws=mondayOf(today);
    for(var i=0;i<7;i++){
      var d=new Date(ws);d.setDate(d.getDate()+i);
      (function(d){
        var dy=d.getFullYear(),dm=d.getMonth()+1,dd=d.getDate();
        eventsOnDate(dm,dd,dy).forEach(function(o){
          var k=o.e.id+'_'+o.occYear;
          if(scope._seen[k])return;
          scope._seen[k]=1;
          total++;
          var done=evDone(o.e,o.occYear);
          if(done&&!recentDone['e_'+k])return;
          var isTod=isoDate(d)===isoDate(today);
          var sub=o.e.toDay?evSpanTxt(o.e):(isTod?'i dag':UKEDAGER_FULL[dow(d)]+' '+dd+'.');
          out.push({label:o.e.name,sub:sub,done:done,cat:mainCatOf(o.e.cats),click:"boxToggleEvent('"+q(o.e.id)+"',"+o.occYear+")"});
        });
      })(d);
    }
  }
  if(scope.includeUndated){
    monthEventsFor(scope.m,scope.y).forEach(function(e){
      if(e.day)return;
      total++;
      var done=evDone(e,scope.y);
      if(done&&!recentDone['e_'+e.id+'_'+scope.y])return;
      out.push({label:e.name,sub:'i l\u00f8pet av m\u00e5neden',done:done,cat:mainCatOf(e.cats),click:"boxToggleEvent('"+q(e.id)+"',"+scope.y+")"});
    });
  }
  return{items:out,total:total};
}

function monthEventsFor(m,y){
  return events.filter(function(e){
    if(e.month!==m)return false;
    if(!e.repeat)return Number(e.year)===y;
    var start=Number(e.year);
    if(y<start)return false;
    var iv=Number(e.interval)||1;
    return(y-start)%iv===0;
  });
}

var BDAY_MAX=150;
function bdayCount(){return events.filter(function(e){return e.bday;}).length;}
function bdayNextAge(e){
  var s=Number(e.sinceYear);if(!(s>0))return null;
  var passed=(e.month<curMonth)||(e.month===curMonth&&(e.day||31)<today.getDate());
  var age=(passed?curYear+1:curYear)-s;
  return age>0?age:null;
}
function isRoundBdayNext(e){
  if(!e.bday)return false;
  var a=bdayNextAge(e);
  return a!==null&&a%10===0;
}
function isRoundBdayInYear(e,y){
  if(!e.bday)return false;
  var n=evYears(e,y);
  return n!==null&&n%10===0;
}

function weekNum(date){
  var d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));
  var day=(d.getUTCDay()+6)%7;
  d.setUTCDate(d.getUTCDate()-day+3);
  var thu=d.getTime();
  d.setUTCMonth(0,1);
  if(d.getUTCDay()!==4)d.setUTCMonth(0,1+((4-d.getUTCDay())+7)%7);
  return 1+Math.round((thu-d.getTime())/(7*24*3600*1000));
}

function isWeekly(r){return r.freq==='weekly'||r.freq==='odd'||r.freq==='even';}
function weekYear(date){
  var d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));
  var day=(d.getUTCDay()+6)%7;
  d.setUTCDate(d.getUTCDate()-day+3);
  return d.getUTCFullYear();
}
function routineWeeksIn(m,y,freq){
  var daysIn=new Date(y,m,0).getDate();
  var seen={},list=[];
  for(var d=1;d<=daysIn;d++){
    var dt=new Date(y,m-1,d);
    var wn=weekNum(dt);
    var key='w'+weekYear(dt)+'-'+pad(wn);
    if(seen[key])continue;seen[key]=1;
    if(freq==='odd'&&wn%2===0)continue;
    if(freq==='even'&&wn%2===1)continue;
    list.push({week:wn,key:key});
  }
  return list;
}
function routineChipItems(list,m,y,onlyCurrentWeek){
  var ym=y+'-'+pad(m);
  var items=[];
  var nowKey='w'+weekYear(today)+'-'+pad(weekNum(today));
  list.forEach(function(r){
    if(isWeekly(r)){
      routineWeeksIn(m,y,r.freq).forEach(function(w){
        if(onlyCurrentWeek&&w.key!==nowKey)return;
        items.push({rid:r.id,key:w.key,label:r.name+' · uke '+w.week,done:(r.log||[]).includes(w.key)});
      });
    } else {
      items.push({rid:r.id,key:ym,label:r.name,done:(r.log||[]).includes(ym)});
    }
  });
  return items;
}

function routineMonthStatus(r,m,y){
  var ym=y+'-'+pad(m);
  if(isWeekly(r)){
    var weeks=routineWeeksIn(m,y,r.freq);
    var dn=weeks.filter(function(w){return(r.log||[]).includes(w.key);}).length;
    return{done:weeks.length>0&&dn===weeks.length,txt:dn+'/'+weeks.length+' uker'};
  }
  return{done:(r.log||[]).includes(ym),txt:null};
}
function hasMonthContent(m,y){
  var ym=y+'-'+pad(m);
  if(entries.some(function(e){return e.date.slice(0,7)===ym;}))return true;
  if(routines.some(function(r){
    if(isWeekly(r)){
      return routineWeeksIn(m,y,r.freq).some(function(w){return(r.log||[]).includes(w.key);});
    }
    return(r.log||[]).includes(ym);
  }))return true;
  if(monthEventsFor(m,y).some(function(e){return evDone(e,y);}))return true;
  return false;
}
function goalGroupSort(rows){
  return rows.sort(function(a,b){
    var ga=a.gent.length?0:(a.done>0?1:(a.total>0?2:3));
    var gb=b.gent.length?0:(b.done>0?1:(b.total>0?2:3));
    if(ga!==gb)return ga-gb;
    if(ga===0&&a.gent.length!==b.gent.length)return b.gent.length-a.gent.length;
    return nbSort(a.g.name,b.g.name);
  });
}

        xr.forEach(function(r){shown[r.id]=1;var st=routineMonthStatus(r,m,y);h+=outLine(r.name,st.done,st.txt);});
        xe.forEach(function(e){shown[e.id]=1;h+=outLine(e.name,evDone(e,y),'hendelse');});
        h+='</div>';
      }
      if(xEnt!==null)h+='<div style="padding:0 14px 8px;font-size:12px;color:var(--muted)">Takknemlighet \u00b7 '+xEnt+' innlegg i resultatets underkategorier</div>';
      if(!xr.length&&!xe.length&&xEnt===null)h+=secNote('Ingen rutiner eller planer koblet enn\u00e5.');
    });

    var dirR=row.gr.filter(function(r){return!shown[r.id];});
    var dirE=row.ge.filter(function(e){return!shown[e.id];});
    if(dirR.length||dirE.length){
      h+=secLbl(row.vRes.length?'Direkte p\u00e5 verdien':'Rutiner og hendelser')
        +'<div style="padding:2px 14px 10px">';
      dirR.forEach(function(r){var st=routineMonthStatus(r,m,y);h+=outLine(r.name,st.done,st.txt);});
      dirE.forEach(function(e){h+=outLine(e.name,evDone(e,y),'hendelse');});
      h+='</div>';
    } else if(!row.vRes.length){
      h+=secLbl('Rutiner og hendelser')+secNote('Ingenting knyttet til denne verdien denne m\u00e5neden.');
    }

    if(!(g.cats||[]).length){
      h+=secLbl('Takknemlighet')
        +secNote('Koble verdien til hovedkategorier (via \u270e under Planlegging) for \u00e5 se takknemligheten den gir.');
    } else {
      h+=secLbl('Takknemlighet \u00b7 '+gent.length);
      h+=gent.length?gent.map(entryRowHTML).join(''):secNote('Ingen innlegg i tilknyttede kategorier denne m\u00e5neden.');
    }
    h+='</div>';
  });

  var rest=monthEntries.filter(function(e){return!goals.some(function(g){return goalCatMatch(g,e.cats);});});
  if(rest.length){
    h+='<div class="card" style="margin-top:14px">'
      +'<div style="display:flex;align-items:center;gap:8px;padding:11px 14px;border-bottom:1px solid var(--line)">'
      +'<span style="font-weight:700;flex:1">Utenfor verdiene</span>'
      +'<span style="font-size:12px;color:var(--rose)">'+rest.length+' innlegg</span></div>'
      +secNote('Gleder du ikke har planlagt deg til.')
      +rest.map(entryRowHTML).join('')
      +'</div>';
  }

  var prevMonths=[];
  for(var pm=1;pm<curMonth;pm++){if(hasMonthContent(pm,curYear)&&!(pm===m&&curYear===y))prevMonths.push(pm);}
  if(prevMonths.length){
    h+='<div class="view-sub" style="padding-top:14px;font-weight:600">Tidligere m\u00e5nedsrapporter i '+curYear+'</div>'
      +'<div class="card"><div class="rt-chips">'
      +prevMonths.map(function(pm){
        return'<button class="rt-btn" onclick="goRapport('+pm+','+curYear+')">'+MND_FULL[pm-1]+'</button>';
      }).join('')
      +'</div></div>';
  }
  return h;
}

function yearsWithContent(){
  var ys={};
  entries.forEach(function(e){ys[Number(e.date.slice(0,4))]=1;});
  routines.forEach(function(r){(r.log||[]).forEach(function(k){
    ys[Number(k.charAt(0)==='w'?k.slice(1,5):k.slice(0,4))]=1;
  });});
  events.forEach(function(e){
    if(e.repeat)(e.log||[]).forEach(function(yy){ys[Number(yy)]=1;});
    else if(e.done)ys[Number(e.year)]=1;
  });
  return Object.keys(ys).map(Number).sort();
}

function bgToneHex(hex){
  // Ferdig blandet lys tone mot kremhvit — lys nok til lesbar mørk tekst, metta nok til å kjennes
  if(!hex||hex[0]!=='#')return null;
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  var f=0.82; // 82% mot kremhvit
  var mix=function(a,c){return Math.round(a+(c-a)*f);};
  var to=function(n){return('0'+n.toString(16)).slice(-2);};
  return'#'+to(mix(r,242))+to(mix(g,238))+to(mix(b,229));
}
function applyBgTone(){
  var tone='';try{tone=localStorage.getItem(SK+'_bgtone')||'';}catch(e){}
  var hex=tone?colorHexById(tone):null;
  var bg=hex?bgToneHex(hex):'#F2EEE5';
  document.documentElement.style.setProperty('--bg',bg);
}
function setBgTone(colId){
  try{if(colId)localStorage.setItem(SK+'_bgtone',colId);else localStorage.removeItem(SK+'_bgtone');}catch(e){}
  applyBgTone();render();
}
function currentBgTone(){try{return localStorage.getItem(SK+'_bgtone')||'';}catch(e){return'';}}
function lightHex(hex,f){
  if(!hex||hex[0]!=='#')return hex;
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  var mix=function(a,c){return Math.round(a+(c-a)*f);};
  return'rgb('+mix(r,242)+','+mix(g,238)+','+mix(b,229)+')';
}
function ganttHTML(){
  var projs=inventories.filter(function(iv){return(iv.type||'inventar')==='prosjekt'&&(iv.startDate||iv.endDate);});
  if(!projs.length)return'';
  // Tidsvindu i hele måneder, begrenset til 18
  var minD=null,maxD=null;
  projs.forEach(function(iv){
    var a=iv.startDate||iv.endDate,b=iv.endDate||iv.startDate;
    if(!minD||a<minD)minD=a;
    if(!maxD||b>maxD)maxD=b;
  });
  var tNow=isoDate(today);
  if(tNow<minD)minD=tNow;
  if(tNow>maxD)maxD=tNow;
  var m0=new Date(Number(minD.slice(0,4)),Number(minD.slice(5,7))-1,1);
  var m1=new Date(Number(maxD.slice(0,4)),Number(maxD.slice(5,7)),0);
  var months=[];
  var cur=new Date(m0);
  while(cur<=m1&&months.length<18){
    months.push({y:cur.getFullYear(),m:cur.getMonth()+1});
    cur.setMonth(cur.getMonth()+1);
  }
  var span=months.length;
  var mStart=new Date(months[0].y,months[0].m-1,1);
  var mEnd=new Date(months[span-1].y,months[span-1].m,0);
  var total=mEnd-mStart;
  var pct=function(d){return Math.max(0,Math.min(100,(new Date(d)-mStart)/total*100));};

  // Kvartalsgrenser i prosent (ved starten av jan/apr/jul/okt)
  var qLines=[];
  months.forEach(function(mo,i){
    if(i>0&&(mo.m===1||mo.m===4||mo.m===7||mo.m===10))qLines.push(pct(mo.y+'-'+pad(mo.m)+'-01'));
  });
  var h='<div class="view-sub" style="padding-top:8px;font-weight:600">Prosjektene i tid</div>'
    +'<div class="card" style="padding:10px 14px 12px">';
  // Månedslinjal: JAN FEB MAR \u2026 med diskret kvartalsskille
  h+='<div style="display:flex;margin-left:88px">';
  months.forEach(function(mo,i){
    var q=i>0&&(mo.m===1||mo.m===4||mo.m===7||mo.m===10);
    h+='<div style="flex:1;font-size:'+(span>12?'6':'7')+'px;letter-spacing:0;color:var(--muted);text-align:center;overflow:hidden;'+(q?'border-left:1px solid var(--done-line)':'border-left:1px solid transparent')+'">'
      +MND_FULL[mo.m-1].slice(0,3).toUpperCase()+(mo.m===1||i===0?'<br>'+String(mo.y).slice(2):'')+'</div>';
  });
  h+='</div>';
  // Rader
  projs.sort(function(a,b){return(a.startDate||a.endDate)<(b.startDate||b.endDate)?-1:1;}).forEach(function(iv){
    var a=iv.startDate||iv.endDate,b=iv.endDate||iv.startDate;
    var l=pct(a),r=pct(b);
    var w=Math.max(2,r-l);
    var col=(iv.catId?catColor(iv.catId):null)||'#B08D7C';
    var grad='linear-gradient(to right,'+lightHex(col,0.55)+','+col+')';
    var overdue=!iv.completedDate&&b<tNow;
    var barStyle='position:absolute;left:'+l.toFixed(1)+'%;width:'+w.toFixed(1)+'%;top:2px;bottom:2px;border-radius:0;overflow:hidden;background:'+grad+';'
      +(iv.completedDate?'opacity:.45;':'')
      +(overdue?'box-shadow:inset 0 0 0 1.5px var(--amber);':'');
    // Faser: skillestreker og demping av udekkede strekk, oppå gradienten
    var phases=(iv.sections||[]).filter(function(sc){return sc.startDate&&sc.endDate;})
      .sort(function(x,y){return x.startDate<y.startDate?-1:1;});
    var inner='';
    if(phases.length){
      var span2=Math.max(1,new Date(b)-new Date(a));
      var pp=function(d){return Math.max(0,Math.min(100,(new Date(d)-new Date(a))/span2*100));};
      var covered=[];
      phases.forEach(function(sc,pi){
        var pl=pp(sc.startDate),prr=pp(sc.endDate);
        covered.push([pl,prr]);
        if(pl>0.5)inner+='<div style="position:absolute;left:'+pl.toFixed(1)+'%;top:0;bottom:0;width:1.5px;background:#F2EEE5"></div>';
      });
      // Dim utenfor fasene
      var cur2=0;
      covered.forEach(function(cv){
        if(cv[0]>cur2)inner+='<div style="position:absolute;left:'+cur2.toFixed(1)+'%;width:'+(cv[0]-cur2).toFixed(1)+'%;top:0;bottom:0;background:rgba(242,238,229,.5)"></div>';
        cur2=Math.max(cur2,cv[1]);
      });
      if(cur2<100)inner+='<div style="position:absolute;left:'+cur2.toFixed(1)+'%;width:'+(100-cur2).toFixed(1)+'%;top:0;bottom:0;background:rgba(242,238,229,.5)"></div>';
    }
    h+='<div style="display:flex;align-items:center;gap:0;margin-top:6px;cursor:pointer" onclick="goInventar(\''+q(iv.id)+'\')">'
      +'<span style="width:88px;flex-shrink:0;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:6px'+(iv.completedDate?';color:var(--muted)':'')+'">'+(iv.completedDate?'\u2713 ':'')+esc(dispName(iv))+'</span>'
      +'<div style="flex:1;position:relative;height:14px;background:var(--bg);border-radius:0">'
      +qLines.map(function(qp){return'<div style="position:absolute;left:'+qp.toFixed(1)+'%;top:0;bottom:0;width:1px;background:var(--line)"></div>';}).join('')
      +'<div style="'+barStyle+'">'+inner+'</div>'
      +'<div style="position:absolute;left:'+pct(tNow).toFixed(1)+'%;top:-2px;bottom:-2px;width:1.5px;background:var(--ink);opacity:.55"></div>'
      +'</div></div>';
  });
  h+='<div style="margin-top:10px;font-size:9px;color:var(--muted)">Fargen er hovedkategorien, lys ved start og m\u00f8rkere mot slutt \u00b7 lyse skillestreker er faser \u00b7 \u2713 dempet = ferdigstilt \u00b7 ravgul kant = frist passert \u00b7 | = i dag</div>';
  h+='</div>';
  return h;
}
function printListHTML(inv){

  var isProjP=(inv.type||'inventar')==='prosjekt';

  var sortItems=function(arr){
    return arr.sort(function(a,b){
      if(isProjP)return(a.date||'9999')<(b.date||'9999')?-1:(a.date||'9999')>(b.date||'9999')?1:nbSort(a.name,b.name);

    if(secs.length)h+='<h2>'+(isProjP?'Uten fase':'Uten overskrift')+'</h2>';

function catUsage(catId){
  var u=[];
  var n;
  n=goals.filter(function(g){return(g.cats||[]).includes(catId);}).length;
  if(n)u.push(n+' verdi'+(n>1?'er':''));
  n=results.filter(function(r){return(r.subCats||[]).includes(catId);}).length;
  if(n)u.push(n+' resultat'+(n>1?'er':''));
  n=routines.filter(function(r){return(r.cats||[]).includes(catId);}).length;
  if(n)u.push(n+' rutine'+(n>1?'r':''));
  n=events.filter(function(e){return(e.cats||[]).includes(catId);}).length;
  if(n)u.push(n+' hendelse'+(n>1?'r':''));
  n=budgetRows.filter(function(b){return b.catId===catId;}).length;
  if(n)u.push(n+' budsjettpost'+(n>1?'er':''));
  n=entries.filter(function(e){return(e.cats||[]).includes(catId);}).length;
  if(n)u.push(n+' innlegg');
  return u;
}
function tagCloudSpread(counts){
  // Ordsky: gradert fargeskala etter hyppighet, alfabetisk rekkefølge (ikke frekvenssortert)
  var words=Object.keys(counts).filter(function(w){return counts[w]>0;}).sort(nbSort);
  if(!words.length)return'';
  var max=Math.max.apply(null,words.map(function(w){return counts[w];}));
  return'<div class="cloud" style="padding:6px 2px 4px">'+words.map(function(w){
    var c=counts[w];
    var size=13+Math.round((c/max)*13);
    var lv=Math.min(5,1+Math.floor((c-1)/max*5));
    return'<button class="cloud-word lv'+lv+(c>10?' hot':'')+(selectedTag===w?' sel':'')+'" style="font-size:'+size+'px" onclick="selectTag(\''+q(w)+'\')">#'+esc(w)+'</button>';
  }).join('')+'</div>';
}
function catTagCloudHTML(catId){
  var counts={};
  Object.keys(tagCats).forEach(function(t){if(tagCats[t]===catId)counts[t]=0;});
  entries.forEach(function(e){(e.tags||[]).forEach(function(t){if(counts.hasOwnProperty(t))counts[t]++;});});
  return tagCloudSpread(counts);
}
function frittTagCloudHTML(){
  var counts={};
  var used=allTags();
  Object.keys(used).forEach(function(t){if(!tagCats[t])counts[t]=used[t];});
  return tagCloudSpread(counts);
}

  var byFreq=function(a,b){return counts[b]-counts[a]||nbSort(a,b);};
  var tagRow=function(t){
    var tc=tagColor(t);
    return'<div style="padding:8px 14px;border-bottom:1px solid var(--line)">'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">'
      +'<span class="tag-pill"'+(tc?' style="background:'+tc+';border-color:'+tc+';color:var(--ink)"':'')+'>#'+esc(t)+'</span>'
      +'<span style="font-size:11px;color:var(--muted)">'+counts[t]+' innlegg</span></div>'
      +'<div class="chips">'
      +'<button class="chip'+(!tagCats[t]?' on':'')+'" onclick="setTagCat(\''+q(t)+'\',\'\')">Ingen</button>'
      +mains.map(function(mc){
        var on=tagCats[t]===mc.id;var col=catColor(mc.id);
        return'<button class="chip'+(on?' on':'')+'"'+(on&&col?' style="background:'+col+';border-color:'+col+';color:'+textOn(col)+'"':'')+' onclick="setTagCat(\''+q(t)+'\',\''+q(mc.id)+'\')">'+esc(mc.name)+'</button>';
      }).join('')
      +'</div></div>';
  };
  // Frittstående gleder øverst — stikkord uten kategori
  var fritt=tags.filter(function(t){return!tagCats[t];}).sort(byFreq);
  h+='<div class="view-sub" style="padding-top:12px;font-weight:600">Frittst\u00e5ende gleder</div>';
  if(fritt.length)h+='<div class="card">'+fritt.map(tagRow).join('')+'</div>';
  else h+='<div class="card"><div class="empty">Alle stikkord er knyttet til en kategori.</div></div>';
  // Deretter hver kategori med sine stikkord
  mains.forEach(function(mc){
    var mine=tags.filter(function(t){return tagCats[t]===mc.id;}).sort(byFreq);
    if(!mine.length)return;
    var col=catColor(mc.id);
    h+='<div class="view-sub" style="padding-top:12px;font-weight:600;display:flex;align-items:center;gap:8px">'
      +(col?'<span style="width:11px;height:11px;border-radius:50%;background:'+col+';display:inline-block"></span>':'')
      +esc(mc.name)+'</div>'
      +'<div class="card">'+mine.map(tagRow).join('')+'</div>';
  });
  return h;
}
function kategorierViewHTML(){
  var h='<div style="display:flex;align-items:center;gap:8px;padding:14px 12px 0">'
    +'<button class="icon-btn" onclick="goInnstillinger()">\u2039</button>'

      +'</div>'
      +'<button class="icon-btn" style="font-size:11px;padding:2px 7px" onclick="openEditCat(\''+q(c.id)+'\')">\u270e</button>'

      return'<button class="chip-new" onclick="addCommonCat(\''+q(n)+'\')">+ '+esc(n)+'</button>';
    }).join('')+'</div>';

}

function budsjettViewHTML(){
  var y=view.year;
  var qSel=view.q;
  var h='<div style="display:flex;align-items:center;gap:6px;padding:14px 12px 0">'
    +'<button class="icon-btn" onclick="goBudsjett('+(y-1)+',view.q)">\u2039</button>'
    +'<div class="view-title" style="padding:0;flex:1;text-align:center">Budsjett og regnskap \u00b7 '+y+'</div>'
    +'<button class="icon-btn" onclick="goBudsjett('+(y+1)+',view.q)">\u203a</button>'
    +'</div>';
  h+='<div class="chips" style="justify-content:center;padding:8px 12px 0">'
    +[1,2,3,4].map(function(qn){
      return'<button class="chip'+(qSel===qn?' on':'')+'" onclick="goBudsjett('+y+','+qn+')">'+KVARTAL[qn-1]+'</button>';
    }).join('')
    +'<button class="chip'+(qSel==='\u00e5r'?' on':'')+'" onclick="goBudsjett('+y+',\'\u00e5r\')">\u00c5ret</button>'
    +'</div>';

  var yearRows=budgetRows.filter(function(b){return b.year===y;});
  var sumField=function(row,field){return row[field].reduce(function(a,v){return a+(v===null?0:v);},0);};
  var pOf=function(row){return qSel==='\u00e5r'?sumField(row,'plan'):(row.plan[qSel-1]||0);};
  var aOf=function(row){return qSel==='\u00e5r'?sumField(row,'actual'):(row.actual[qSel-1]||0);};

  var mains=cats.filter(function(c){return!c.parentId;}).sort(function(a,b){return nbSort(a.name,b.name);});

  // avvik: positivt = bedre enn plan (inntekt: faktisk-plan, utgift: plan-faktisk)
  var renderSection=function(type,label){
    var rows=yearRows.filter(function(b){return(b.type==='in'?'in':'ut')===type;});
    if(!rows.length)return{html:'',p:0,a:0,any:false};
    var secP=0,secA=0;
    var hh='<div style="padding:8px 14px 2px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--rose)">'+label+'</div>'
      +'<div style="display:flex;gap:8px;padding:0 14px 2px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--rose)">'
      +'<span style="flex:1"></span><span style="width:76px;text-align:right">Plan</span><span style="width:76px;text-align:right">Faktisk</span><span style="width:60px;text-align:right">Avvik</span></div>';

    var sign=type==='ut'?'\u2212':'';
    var rowLine=function(row,name,indent,computed,col){
      var p=computed?row.p:pOf(row);
      var a=computed?row.a:aOf(row);
      var hasA=computed?(row.hasA||false):(qSel==='\u00e5r'?row.actual.some(function(v){return v!==null;}):row.actual[qSel-1]!==null);
      var diff=type==='in'?(a-p):(p-a);
      var pCell,aCell;
      if(computed||qSel==='\u00e5r'){
        pCell='<span style="width:76px;text-align:right;font-size:13px">'+(p?sign:'')+fmtKr(p)+'</span>';
        aCell='<span style="width:76px;text-align:right;font-size:13px">'+(hasA?(a?sign:'')+fmtKr(a):'\u2013')+'</span>';
      } else {
        pCell=budgetCellHTML(row,qSel-1,'plan');
        aCell=budgetCellHTML(row,qSel-1,'actual');
      }
      var dTxt=hasA?'<span style="width:60px;text-align:right;font-size:12px;color:'+(diff<0?'var(--amber)':'var(--muted)')+'">'+(diff>0?'+':'')+fmtKr(diff)+'</span>':'<span style="width:60px"></span>';
      var noteHtml='';
      if(!computed){
        var noteFor=function(qi){
          var pn=(row.planNote||[])[qi],an=(row.actualNote||[])[qi];
          if(!pn&&!an)return'';
          var pre=qSel==='\u00e5r'?'Q'+(qi+1)+': ':'';
          return'<div style="font-size:10px;line-height:1.4;color:var(--muted);font-style:italic;padding:0 14px 2px '+(indent?'28px':'14px')+'">'
            +pre+(pn?esc(pn):'')+(pn&&an?' \u00b7 ':'')+(an?'regnskap: '+esc(an):'')+'</div>';
        };
        noteHtml=qSel==='\u00e5r'?[0,1,2,3].map(noteFor).join(''):noteFor(qSel-1);
      }
      return'<div style="display:flex;align-items:center;gap:8px;padding:4px 14px">'
        +'<span style="width:3px;border-radius:2px;align-self:stretch;flex-shrink:0;background:'+(col||'transparent')+'"></span>'
        +'<span style="flex:1;font-size:13px;'+(indent?'padding-left:14px;color:var(--muted)':'font-weight:700')+'">'+esc(name)
        +(!computed?' <button class="icon-btn" style="font-size:10px;padding:0 5px" onclick="openEditBudgetRow(\''+q(row.id)+'\')">\u270e</button>':'')
        +'</span>'+pCell+aCell+dTxt+'</div>'+noteHtml;
    };

    mains.forEach(function(mc){
      var mainRow=rows.find(function(b){return b.catId===mc.id;});
      var subRows=rows.filter(function(b){var c=catById(b.catId);return c&&c.parentId===mc.id;})
        .sort(function(a,b){return nbSort((catById(a.catId)||{}).name||'',(catById(b.catId)||{}).name||'');});
      if(!mainRow&&!subRows.length)return;
      var mCol=catColor(mc.id);
      if(subRows.length){
        var hasAOf=function(r){return qSel==='\u00e5r'?r.actual.some(function(v){return v!==null;}):r.actual[qSel-1]!==null;};
        var agg={p:0,a:0,hasA:false};
        subRows.forEach(function(r){agg.p+=pOf(r);agg.a+=aOf(r);if(hasAOf(r))agg.hasA=true;});
        if(mainRow){agg.p+=pOf(mainRow);agg.a+=aOf(mainRow);if(hasAOf(mainRow))agg.hasA=true;}
        hh+=rowLine(agg,mc.name,false,true,mCol);
        if(mainRow)hh+=rowLine(mainRow,'(direkte p\u00e5 '+mc.name+')',true,false,mCol);
        subRows.forEach(function(r){hh+=rowLine(r,(catById(r.catId)||{}).name||'?',true,false,mCol);});
        secP+=agg.p;secA+=agg.a;
      } else {
        hh+=rowLine(mainRow,mc.name,false,false,mCol);
        secP+=pOf(mainRow);secA+=aOf(mainRow);
      }
    });

    var secHasA=rows.some(function(r){return qSel==='\u00e5r'?r.actual.some(function(v){return v!==null;}):r.actual[qSel-1]!==null;});
    var sDiff=type==='in'?(secA-secP):(secP-secA);
    hh+='<div style="display:flex;align-items:center;gap:8px;padding:6px 14px;border-top:1px solid var(--line);border-bottom:3px double var(--muted)">'
      +'<span style="width:3px;flex-shrink:0"></span>'
      +'<span style="flex:1;font-size:13px;font-weight:700">Sum '+label.toLowerCase()+'</span>'
      +'<span style="width:76px;text-align:right;font-size:13px;font-weight:700">'+(secP?sign:'')+fmtKr(secP)+'</span>'
      +'<span style="width:76px;text-align:right;font-size:13px;font-weight:700">'+(secHasA?(secA?sign:'')+fmtKr(secA):'\u2013')+'</span>'
      +(secHasA?'<span style="width:60px;text-align:right;font-size:12px;font-weight:700;color:'+(sDiff<0?'var(--amber)':'var(--muted)')+'">'+(sDiff>0?'+':'')+fmtKr(sDiff)+'</span>':'<span style="width:60px"></span>')+'</div>';
    return{html:hh,p:secP,a:secA,hasA:secHasA,any:true};
  };

  var inn=renderSection('in','Inntekter');
  var ut=renderSection('ut','Utgifter');

  h+='<div class="card" style="margin-top:10px">';
  if(!inn.any&&!ut.any){
    h+='<div class="empty">Ingen budsjettlinjer for '+y+' enn\u00e5.</div>';
  } else {
    h+=inn.html+ut.html;
    var balP=inn.p-ut.p,balA=inn.a-ut.a,balD=balA-balP;
    var balHasA=(inn.hasA||false)||(ut.hasA||false);
    h+='<div style="display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--bg);border-bottom:7px double var(--red)">'
      +'<span style="width:3px;flex-shrink:0"></span>'
      +'<span style="flex:1;font-size:13px;font-weight:700;color:var(--red)">Balanse</span>'
      +'<span style="width:76px;text-align:right;font-size:13px;font-weight:700;color:'+(balP<0?'var(--amber)':'var(--red)')+'">'+fmtKr(balP)+'</span>'
      +'<span style="width:76px;text-align:right;font-size:13px;font-weight:700;color:'+(balA<0?'var(--amber)':'var(--red)')+'">'+(balHasA?fmtKr(balA):'\u2013')+'</span>'
      +(balHasA?'<span style="width:60px;text-align:right;font-size:12px;font-weight:700;color:'+(balD<0?'var(--amber)':'var(--muted)')+'">'+(balD>0?'+':'')+fmtKr(balD)+'</span>':'<span style="width:60px"></span>')+'</div>';
  }
  h+='</div>';
  h+='<button class="add-btn" onclick="openBudgetLineModal()">+ Ny budsjettlinje</button>'
    +'<button class="add-btn" onclick="openPostingModal()">+ Registrer bel\u00f8p</button>';

  var saveGoals=results.filter(function(r){return r.targetAmount&&(r.amountType||'spar')==='spar';}).sort(function(a,b){return(a.year*100+a.month)-(b.year*100+b.month);});
  if(saveGoals.length){
    h+='<div class="view-sub" style="padding-top:12px;font-weight:600">Sparem\u00e5l</div><div class="card">';
    saveGoals.forEach(function(r){
      h+='<div class="entry-row"><div class="entry-body">'
        +'<div class="entry-text"'+(r.achieved?' style="opacity:.55"':'')+'>'+esc(r.name)+resultDeadlineHTML(r)+'</div>'
        +'</div>'
        +'<button class="icon-btn" style="font-size:11px;padding:2px 8px;align-self:center" onclick="openDepositModal(\''+q(r.id)+'\')">+ innbetaling</button>'
        +'</div>';
    });
    h+='</div>';
  }
  return h;
}
