<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F2EEE5;--card:#FCFAF4;--ink:#3B2E24;--red:#8E1F1D;
  --salmon:#F5A38B;--red-soft:#F7DACC;--rose:#B08D7C;--amber:#B86E2A;
  --muted:#8B7C6B;--line:#E6E0D2;--done:#E3D9C2;--done-line:#D6C9AA;--btn:#E2D8C0;--sel:#D2C5A2;--sel-line:#BFB088;
}
body{background:var(--bg);color:var(--ink);font-family:"Nunito","Helvetica Neue",Helvetica,Arial,sans-serif;font-size:15px;line-height:1.5;min-height:100vh}

/* ── Layout: sidebar + main ── */
.layout{display:flex;min-height:100vh}
.sidebar{
  width:230px;background:var(--card);border-right:1px solid var(--line);
  padding:16px 0 40px;flex-shrink:0;overflow-y:auto;
  position:fixed;top:0;bottom:0;left:0;z-index:150;
  transform:translateX(-100%);transition:transform .2s;
}
.sidebar.open{transform:translateX(0)}
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:140;display:none}
.sidebar-overlay.show{display:block}
.main{flex:1;min-width:0;padding-bottom:100px}
@media(min-width:900px){
  .sidebar{transform:none;position:sticky;height:100vh}
  .sidebar-overlay{display:none!important}
  .main{margin-left:0}
  .menu-btn{display:none}
}

/* Sidebar innhold */
.side-title{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--rose);padding:6px 18px 10px}
.side-month{display:flex;align-items:center;gap:8px;padding:8px 18px;cursor:pointer;user-select:none;font-size:14px;font-weight:600;color:var(--ink)}
.side-month:hover{background:var(--bg)}
.side-sub{display:flex;align-items:center;gap:8px;padding:6px 18px 6px 34px;cursor:pointer;font-size:13px;color:var(--muted);user-select:none}
.side-sub:hover{background:var(--bg)}
.side-leaf{display:block;width:100%;text-align:left;padding:5px 18px 5px 52px;font-size:13px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:inherit}
.side-leaf:hover{background:var(--bg);color:var(--red)}
.side-leaf.on{color:var(--red);font-weight:600}
.s-arrow{width:14px;flex-shrink:0;color:var(--red);font-size:10px;transition:transform .15s;display:inline-flex;justify-content:center}
.s-arrow.open{transform:rotate(90deg)}

/* Topbar */
.topbar{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--line);padding:0}
.topbar-row{display:flex;align-items:center;gap:10px;margin-bottom:0;padding:14px 16px 10px;background:var(--bg)}
.stripe-ribbon{height:7px;background:linear-gradient(to right,#74A491 0% 5%,#4E6B5C 5% 10%,#8A8B5C 10% 15%,#4E7B8C 15% 20%,#87A7BC 20% 25%,#52657E 25% 30%,#8B7A9E 30% 35%,#6D4A68 35% 40%,#8C5A74 40% 45%,#C0868E 45% 50%,#C46E7E 50% 55%,#A34A5E 55% 60%,#DE9273 60% 65%,#A8574A 65% 70%,#CC7F33 70% 75%,#E2C878 75% 80%,#C2AC85 80% 85%,#9C6B3F 85% 90%,#6F4E37 90% 95%,#94897B 95% 100%)}
.menu-btn{background:none;border:1px solid var(--line);border-radius:8px;font-size:16px;padding:4px 10px;cursor:pointer;color:var(--ink)}
h1{font-size:24px;font-weight:400;letter-spacing:0;flex:1;color:var(--ink)}
.edit-btn{font-size:13px;font-weight:600;color:var(--muted);background:none;border:none;cursor:pointer;font-family:inherit}
.edit-btn.on{color:var(--red)}
.icon-btn{font-size:12px;font-weight:600;color:var(--muted);background:none;border:1px solid var(--line);border-radius:8px;padding:4px 9px;cursor:pointer;font-family:inherit}
.tabs{display:flex;gap:2px;padding:4px 16px 0}
.tab{flex:1;padding:9px 0;border:none;background:none;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;font-family:inherit}
.tab.on{color:var(--red);border-bottom-color:var(--red)}

/* Innhold */
.view-title{font-size:15px;font-weight:700;padding:16px 16px 2px}
.view-sub{font-size:12px;color:var(--muted);padding:0 16px 8px}
.card{background:var(--card);border-radius:14px;overflow:hidden;margin:8px 12px 4px;border:1px solid var(--line)}
.entry-row{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:1px solid var(--line)}
.entry-row:last-child{border-bottom:none}
.entry-dot{width:5px;height:5px;border-radius:99px;background:var(--rose);flex-shrink:0;margin-top:8px}
.entry-body{flex:1;min-width:0}
.entry-text{font-size:13px;color:var(--ink);line-height:1.5}
.entry-date{font-size:11px;color:var(--rose);margin-top:1px}
.entry-cats{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.entry-cat{font-size:10px;color:var(--ink);background:var(--done);padding:2px 7px;border-radius:99px}
.cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;display:inline-block}
.col-sw{width:30px;height:30px;border-radius:50%;border:2px solid transparent;cursor:pointer;padding:0;flex-shrink:0}
.col-sw.on{border-color:var(--ink);box-shadow:inset 0 0 0 2px var(--card)}
.col-sw.none{background:transparent;border:1.5px dashed var(--muted);color:var(--muted);font-size:11px}
.col-sw.none.on{border:2px solid var(--ink);box-shadow:none}
/* Konfetti på runde bursdager */
.confetti{position:relative;overflow:hidden}
.confetti i{position:absolute;top:-10px;width:5px;height:9px;border-radius:1px;opacity:.85;pointer-events:none;animation:cfall 2.8s linear infinite}
@keyframes cfall{0%{transform:translateY(-12px) rotate(0deg)}100%{transform:translateY(52px) rotate(340deg)}}
@media (prefers-reduced-motion:reduce){.confetti i{animation:none;display:none}}
.round-bday{background:#FBF3DF}
/* Hurtiglogging på I dag */
.quick-log{background:var(--card);border:1px solid var(--line);border-radius:14px;margin:10px 12px 4px;padding:12px 14px}
.quick-log textarea{width:100%;border:1px solid var(--line);border-radius:10px;background:var(--bg);padding:10px;font-family:inherit;font-size:14px;resize:vertical;min-height:64px;color:var(--ink)}
.quick-log textarea:focus{outline:2px solid var(--sel-line)}
.kal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px 12px}
.mm{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 6px;cursor:pointer;font-family:inherit;text-align:left;color:var(--ink)}
.mm-t{font-size:12px;font-weight:700;display:block;margin-bottom:4px;text-align:center}
.mm-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;font-size:8px;color:var(--muted)}
.mm-d{text-align:center;padding:0;line-height:1.3}
.mm-d.today{background:var(--sel);border-radius:3px;color:var(--ink);font-weight:700}
.mm-dots{display:flex;gap:1px;justify-content:center;height:3px}
.mm-dots i{width:3px;height:3px;border-radius:50%;display:inline-block}
.tag-pill{font-size:10px;color:var(--amber);background:#F5E8D8;padding:2px 7px;border-radius:99px}
.del-btn{font-size:12px;color:var(--red);background:none;border:none;cursor:pointer;padding:2px 4px;align-self:center;flex-shrink:0}
.empty{padding:18px;font-size:14px;color:var(--muted);line-height:1.7}
.hint-box{margin:12px 12px 0;padding:9px 14px;background:var(--red-soft);border-radius:10px;font-size:12px;color:var(--red)}

/* Rutinerad */
.chk{width:22px;height:22px;border-radius:6px;flex-shrink:0;margin-top:1px;border:2px solid var(--line);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:transparent}
.chk.done{border-color:var(--done-line);background:var(--done);color:var(--red)}

/* Rutiner som knapper */
.rt-chips{display:flex;flex-wrap:wrap;gap:8px;padding:12px 14px}
.rt-btn{padding:8px 14px;border-radius:99px;border:1.5px solid var(--line);background:var(--card);color:var(--ink);font-size:13px;cursor:pointer;font-family:inherit;transition:background .1s}
.rt-btn.done{background:var(--done);border-color:var(--done-line);color:var(--ink);font-weight:600}

/* Linjert dagliste */
.daylist{padding:6px 10px 8px}
.dl-row{display:flex;align-items:baseline;gap:8px;padding:2px 4px;border-bottom:1px solid var(--line);min-height:19px;font-size:11px}
.dl-row:last-child{border-bottom:none}
.dl-row.wend{background:var(--bg)}
.dl-wk{width:16px;flex-shrink:0;color:var(--rose);font-size:9px;text-align:right}
.dl-date{width:42px;flex-shrink:0;color:var(--muted)}
.dl-row.today .dl-date,.dl-row.today .dl-wk{color:var(--red);font-weight:700}
.dl-evs{display:flex;flex-wrap:wrap;gap:4px;flex:1;min-width:0}
.dl-ev{font-size:11px;line-height:1.4;border:none;background:var(--sel);color:var(--ink);font-weight:600;border-radius:6px;padding:1px 8px;cursor:pointer;font-family:inherit;text-align:left}
.dl-ev.done{opacity:.4;text-decoration:line-through}

/* Komprimert kategorioversikt */
.freq-block{padding:8px 14px;border-bottom:1px solid var(--line)}
.freq-block:last-child{border-bottom:none}
.freq-main{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700}
.freq-subs{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.freq-pill{font-size:11px;color:var(--muted);background:var(--bg);border:1px solid var(--line);padding:2px 8px;border-radius:99px;font-family:inherit}
button.freq-pill{cursor:pointer}
button.freq-pill:hover{color:var(--red);border-color:var(--red)}

/* Oppsummering */
.cloud{padding:26px 18px;display:flex;flex-wrap:wrap;gap:12px 16px;align-items:baseline;justify-content:center}
.cloud-word{background:none;border:none;cursor:pointer;font-family:inherit;padding:0}
.cloud-word.lv1{color:#7A2E28;opacity:.75}
.cloud-word.lv2{color:#9C3D2E}
.cloud-word.lv3{color:#BF5638}
.cloud-word.lv4{color:#E07348}
.cloud-word.lv5{color:#FF9466}
.cloud-word.hot{font-weight:700}
.cloud-word.sel{color:var(--amber);font-weight:700;text-decoration:underline}
.freq-row{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid var(--line)}
.freq-row:last-child{border-bottom:none}
.freq-name{flex:1;font-size:13px}
.freq-name.main{font-weight:700}
.freq-name.sub{padding-left:16px;color:var(--muted)}
.freq-count{font-size:12px;color:var(--rose)}

/* FAB — brukes ikke, Nytt innlegg er i toppmenyen */

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.32);display:flex;align-items:flex-end;justify-content:center;z-index:200}
.modal{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;padding:20px 18px 32px}
.modal-title{font-size:18px;font-weight:700;margin-bottom:16px}
.close-btn{float:right;background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted)}
.field-lbl{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;display:block;margin:16px 0 6px}
.inp{width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid var(--line);font-size:15px;background:var(--bg);color:var(--ink);font-family:inherit}
.inp:focus{outline:none;border-color:var(--red)}
textarea.inp{min-height:80px;resize:vertical}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.chip{padding:6px 12px;border-radius:99px;font-size:13px;cursor:pointer;border:1.5px solid var(--line);background:var(--card);color:var(--ink);font-family:inherit}
.chip.on{border-color:var(--sel-line);background:var(--sel);color:var(--ink);font-weight:700}
.chip-new{padding:6px 12px;border-radius:99px;font-size:13px;cursor:pointer;border:1.5px dashed var(--rose);background:transparent;color:var(--muted);font-family:inherit}
.save-btn{width:100%;margin-top:18px;padding:13px 0;border-radius:12px;border:none;background:var(--btn);color:var(--red);font-size:16px;font-weight:700;cursor:pointer;font-family:inherit}
.save-btn:not(:disabled):active{background:var(--sel)}
.save-btn:disabled{background:#EDE7D8;color:var(--muted);cursor:default}
.del-full-btn{display:block;width:100%;margin-top:10px;padding:11px 0;border-radius:12px;border:1.5px solid var(--red);background:transparent;color:var(--red);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
.step-back{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;margin-bottom:8px;display:block;font-family:inherit}
.hint{font-size:12px;color:var(--rose);margin-top:4px}
.add-btn{display:block;width:calc(100% - 24px);margin:10px 12px;padding:11px 0;border-radius:12px;border:1.5px dashed var(--rose);background:transparent;color:var(--muted);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}

@media(max-width:480px){
  body{font-size:13px}
  .tab{font-size:11px}
  .card{margin:8px 8px 4px}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div id="app"><div class="empty" style="padding:40px 18px">Laster …</div></div>

<script>
'use strict';

var SK='takknemlighet-v2';
var MND_FULL=['januar','februar','mars','april','mai','juni','juli','august','september','oktober','november','desember'];
var UKEDAGER_FULL=['mandag','tirsdag','onsdag','torsdag','fredag','lørdag','søndag'];

function pad(n){return String(n).padStart(2,'0');}
function dow(d){return(new Date(d).getDay()+6)%7;}
function isoDate(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function fmtDate(s){var d=new Date(s+'T00:00:00');return d.getDate()+'. '+MND_FULL[d.getMonth()]+' '+d.getFullYear();}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function q(s){return String(s).replace(/'/g,'\\x27');}
function nbSort(a,b){return a.localeCompare(b,'nb');}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}

/* ── Kategorifarger: forhåndsdefinert palett, valgfri per hovedkategori, arves av underkategorier ── */
var CAT_COLORS=[
  {id:'salvie',name:'Kirurggrønn',hex:'#74A491'},
  {id:'furu',name:'Furu',hex:'#4E6B5C'},
  {id:'mose',name:'Mose',hex:'#8A8B5C'},
  {id:'petrol',name:'Petrol',hex:'#4E7B8C'},
  {id:'lyseblaa',name:'Lyseblå',hex:'#87A7BC'},
  {id:'marine',name:'Marine',hex:'#52657E'},
  {id:'lavendel',name:'Lavendel',hex:'#8B7A9E'},
  {id:'aubergine',name:'Aubergine',hex:'#6D4A68'},
  {id:'plomme',name:'Plomme',hex:'#8C5A74'},
  {id:'gammelrosa',name:'Gammelrosa',hex:'#C0868E'},
  {id:'rosa',name:'Rosa',hex:'#C46E7E'},
  {id:'bringebaer',name:'Bringebær',hex:'#A34A5E'},
  {id:'fersken',name:'Fersken',hex:'#DE9273'},
  {id:'teglstein',name:'Teglstein',hex:'#A8574A'},
  {id:'rust',name:'Oransje',hex:'#CC7F33'},
  {id:'oker',name:'Lysegul',hex:'#E2C878'},
  {id:'sand',name:'Sand',hex:'#C2AC85'},
  {id:'kanel',name:'Kanel',hex:'#9C6B3F'},
  {id:'espresso',name:'Espresso',hex:'#6F4E37'},
  {id:'varmgraa',name:'Varmgrå',hex:'#94897B'}
];
function colorHexById(colId){var p=CAT_COLORS.find(function(x){return x.id===colId;});return p?p.hex:null;}
function catColor(catId){
  var c=catById(catId);if(!c)return null;
  var m=c.parentId?catById(c.parentId):c;
  return m&&m.color?colorHexById(m.color):null;
}
function textOn(hex){
  if(!hex)return'#FDF7EC';
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  var lum=0.299*r+0.587*g+0.114*b;
  return lum>165?'#3B2E24':'#FDF7EC';
}
function itemColor(catIds){
  var ids=catIds||[];
  for(var i=0;i<ids.length;i++){var col=catColor(ids[i]);if(col)return col;}
  return null;
}
function goalColor(g){
  var ids=g&&g.cats||[];
  for(var i=0;i<ids.length;i++){var col=catColor(ids[i]);if(col)return col;}
  return null;
}

var today=new Date();
var curYear=today.getFullYear();
var curMonth=today.getMonth()+1;

/* ── State ──
   entries:  {id,text,cats:[subIds],tags:[],date}
   cats:     {id,name,parentId?}
   routines: {id,name,cats:[subIds],months:[1-12] (tom=alle),log:['YYYY-MM']}
   events:   {id,name,cats:[subIds],year,month,done}
*/
var entries=[],cats=[],routines=[],events=[],goals=[],laters=[],results=[],inventories=[],budgetRows=[],deposits=[];
var invShowMissing=false;
var openGoals={};
var editMode=false;
var modal=null;
var drawerOpen=false;
var dOpenMonth={},dOpenSec={};
var view={kind:'hjem',month:curMonth,year:curYear};
var selectedTag=null;
var searchQuery='';

/* ── Persist ── */
function load(){
  try{entries=JSON.parse(localStorage.getItem(SK+'_entries')||'[]');}catch(e){entries=[];}
  try{cats=JSON.parse(localStorage.getItem(SK+'_cats')||'[]');}catch(e){cats=[];}
  try{routines=JSON.parse(localStorage.getItem(SK+'_routines')||'[]');}catch(e){routines=[];}
  try{events=JSON.parse(localStorage.getItem(SK+'_events')||'[]');}catch(e){events=[];}
  try{goals=JSON.parse(localStorage.getItem(SK+'_goals')||'[]');}catch(e){goals=[];}
  try{laters=JSON.parse(localStorage.getItem(SK+'_laters')||'[]');}catch(e){laters=[];}
  try{results=JSON.parse(localStorage.getItem(SK+'_results')||'[]');}catch(e){results=[];}
  try{inventories=JSON.parse(localStorage.getItem(SK+'_inv')||'[]');}catch(e){inventories=[];}
  try{budgetRows=JSON.parse(localStorage.getItem(SK+'_budget')||'[]');}catch(e){budgetRows=[];}
  try{deposits=JSON.parse(localStorage.getItem(SK+'_deposits')||'[]');}catch(e){deposits=[];}
  try{tb=JSON.parse(localStorage.getItem(SK+'_tb')||'null')||tb;}catch(e){}
  // Defaultkategorier ved første oppstart — kan slettes fritt av brukeren
  var seeded=false;try{seeded=!!localStorage.getItem(SK+'_seeded');}catch(e){}
  if(!seeded&&!cats.length){
    cats=[
      {id:'c_helse',name:'Helse',color:'salvie'},
      {id:'c_okonomi',name:'\u00d8konomi',color:'petrol'},
      {id:'c_hjem',name:'Hjem',color:'oker'}
    ];
    try{localStorage.setItem(SK+'_seeded','1');}catch(e){}
    save();
  } else if(!seeded){
    try{localStorage.setItem(SK+'_seeded','1');}catch(e){}
  }
  render();
}
function save(){
  try{localStorage.setItem(SK+'_entries',JSON.stringify(entries));}catch(e){}
  try{localStorage.setItem(SK+'_cats',JSON.stringify(cats));}catch(e){}
  try{localStorage.setItem(SK+'_routines',JSON.stringify(routines));}catch(e){}
  try{localStorage.setItem(SK+'_events',JSON.stringify(events));}catch(e){}
  try{localStorage.setItem(SK+'_goals',JSON.stringify(goals));}catch(e){}
  try{localStorage.setItem(SK+'_laters',JSON.stringify(laters));}catch(e){}
  try{localStorage.setItem(SK+'_results',JSON.stringify(results));}catch(e){}
  try{localStorage.setItem(SK+'_inv',JSON.stringify(inventories));}catch(e){}
  try{localStorage.setItem(SK+'_budget',JSON.stringify(budgetRows));}catch(e){}
  try{localStorage.setItem(SK+'_deposits',JSON.stringify(deposits));}catch(e){}
  try{localStorage.setItem(SK+'_tb',JSON.stringify(tb));}catch(e){}
}

var tb={sleep:8,work:40,meals:2,rest:10};
function setTb(k,v){tb[k]=Number(v)||0;save();render();}
function tbFreeHours(){
  return Math.max(0,168-(Number(tb.sleep)||0)*7-(Number(tb.work)||0)-(Number(tb.meals)||0)*7-(Number(tb.rest)||0));
}
function routineWeeklyHours(r){
  var min=Number(r.minutes)||0;if(!min)return 0;
  var perWeek=r.freq==='weekly'?1:(r.freq==='odd'||r.freq==='even')?0.5:1/4.345;
  var monthShare=(r.months&&r.months.length)?r.months.length/12:1;
  return min/60*perWeek*monthShare;
}
function projActive(iv){
  if((iv.type||'inventar')!=='prosjekt')return false;
  var t=isoDate(today);
  if(iv.startDate&&t<iv.startDate)return false;
  if(iv.endDate&&t>iv.endDate)return false;
  return!(iv.items||[]).length||(iv.items||[]).some(function(it){return!it.have;});
}

var listFilter='alle';

/* ── Navigasjon ── */
function toggleDrawer(){drawerOpen=!drawerOpen;render();}
function dToggleMonth(m){dOpenMonth[m]=!dOpenMonth[m];render();}
function dToggleSec(key){dOpenSec[key]=!dOpenSec[key];render();}
function goArsrapport(y){view={kind:'arsrapport',year:y};selectedTag=null;searchQuery='';drawerOpen=false;render();}
function goRapport(m,y){view={kind:'rapport',month:m,year:y};selectedTag=null;searchQuery='';drawerOpen=false;render();}
function goHjem(){view={kind:'hjem',month:curMonth,year:curYear};selectedTag=null;searchQuery='';drawerOpen=false;render();}
function goDagbok(m,y){view={kind:'dagbok',month:m,year:y};selectedTag=null;searchQuery='';drawerOpen=false;render();}
function goRutiner(m,catId,y){view={kind:'rutiner',month:m,cat:catId||null,year:y||null};drawerOpen=false;render();}
function goKalender(y){view={kind:'kalender',year:y||curYear};drawerOpen=false;render();}
function mondayOf(d){var x=new Date(d);var wd=(x.getDay()+6)%7;x.setDate(x.getDate()-wd);return x;}
function goUke(iso){
  var d=iso?new Date(iso):mondayOf(today);
  view={kind:'uke',ws:isoDate(mondayOf(d))};drawerOpen=false;render();
}
function ukeShift(days){
  var d=new Date(view.ws);d.setDate(d.getDate()+days);
  view.ws=isoDate(d);render();
}
function goOppsummering(){view={kind:'oppsummering'};selectedTag=null;drawerOpen=false;render();}
function goPlanlegging(){view={kind:'planlegging'};drawerOpen=false;render();}
function selectTag(t){selectedTag=(selectedTag===t)?null:t;render();}
function setEdit(v){editMode=v;render();}

/* ── Dagbok-handlinger ── */
function deleteEntry(id){entries=entries.filter(function(e){return e.id!==id;});save();render();}

/* ── Rutine/hendelse-handlinger ── */
function toggleRoutine(id,ym){
  var r=routines.find(function(x){return x.id===id;});if(!r)return;
  r.log=r.log||[];
  r.log=r.log.includes(ym)?r.log.filter(function(l){return l!==ym;}):[].concat(r.log,[ym]);
  save();render();
}
function toggleEvent(id,year){
  var e=events.find(function(x){return x.id===id;});if(!e)return;
  if(e.repeat){
    year=Number(year)||curYear;
    e.log=e.log||[];
    e.log=e.log.includes(year)?e.log.filter(function(y){return y!==year;}):[].concat(e.log,[year]);
  } else {
    e.done=!e.done;
  }
  save();render();
}
function daysToNextBday(e){
  var now=new Date(today.getFullYear(),today.getMonth(),today.getDate());
  var next=new Date(curYear,e.month-1,e.day||1);
  if(next<now)next=new Date(curYear+1,e.month-1,e.day||1);
  return Math.round((next-now)/86400000);
}
function ageToday(e){
  var s=Number(e.sinceYear);if(!(s>0))return null;
  var had=(e.month<curMonth)||(e.month===curMonth&&(e.day||31)<=today.getDate());
  return(had?curYear:curYear-1)-s;
}
function milestonesFor(m,y){
  var out=[];
  var pre=y+'-'+pad(m)+'-';
  inventories.forEach(function(iv){
    if((iv.type||'inventar')!=='prosjekt')return;
    (iv.items||[]).forEach(function(it){
      if(it.date&&it.inCal!==false&&it.date.slice(0,8)===pre)out.push({invId:iv.id,itemId:it.id,day:Number(it.date.slice(8,10)),name:it.name,listName:iv.name,done:!!it.have});
    });
  });
  return out;
}
function milestoneBtnHTML(ms){
  var click=editMode?'openEditInvItem(\''+q(ms.invId)+'\',\''+q(ms.itemId)+'\')':'toggleInvItem(\''+q(ms.invId)+'\',\''+q(ms.itemId)+'\')';
  return'<button class="dl-ev'+(ms.done?' done':'')+'" style="background:var(--bg);border:1px dashed var(--sel-line);color:var(--ink);font-weight:400" onclick="'+click+'">'+(editMode?'\u270e ':'')+'\u25c6 '+esc(ms.name)+' <span style="opacity:.6">\u00b7 '+esc(ms.listName)+'</span>'+(ms.done?' \u2713':'')+'</button>';
}
function evFreqTxt(e){
  if(!e.repeat)return'';
  var iv=Number(e.interval)||1;
  return iv===1?'hvert \u00e5r':'hvert '+iv+'. \u00e5r';
}
function evDone(e,year){return e.repeat?(e.log||[]).includes(Number(year)):!!e.done;}
function evYears(e,y){var s=Number(e.sinceYear);return s>0&&y-s>0?y-s:null;}
function evYearsTag(e,y,light){
  var n=evYears(e,y);if(n===null)return'';
  return light
    ?' <span style="opacity:.75;font-weight:400">· '+n+' år</span>'
    :' <span style="color:var(--rose);font-size:11px;font-weight:400">· '+n+' år</span>';
}
function deleteRoutine(id){routines=routines.filter(function(r){return r.id!==id;});save();closeModal();}
function deleteEvent(id){events=events.filter(function(e){return e.id!==id;});save();closeModal();}
function goalById(id){return goals.find(function(g){return g.id===id;});}
function resultHasRoutine(id){
  return routines.some(function(rt){return(rt.resultIds||[]).includes(id);});
}
function resultById(id){return results.find(function(r){return r.id===id;});}
function resultsFor(goalId){return results.filter(function(r){return r.valueId===goalId;}).sort(function(a,b){return(a.year*100+a.month)-(b.year*100+b.month)||nbSort(a.name,b.name);});}
function monthsLeft(r){return(r.year-curYear)*12+(r.month-curMonth);}
function resultDeadlineHTML(r){
  var saveTxt='';
  if(r.targetAmount){
    var sv=savedFor(r.id);
    saveTxt=' \u00b7 '+fmtKr(sv)+' av '+fmtKr(r.targetAmount)+' kr';
    var ml0=monthsLeft(r);
    if(!r.achieved&&ml0>0&&sv<r.targetAmount){
      var qLeft=Math.ceil(ml0/3);
      saveTxt+=' \u00b7 '+fmtKr(r.targetAmount-sv)+' igjen p\u00e5 '+qLeft+' kvartal'+(qLeft>1?'er':'')+' = ~'+fmtKr((r.targetAmount-sv)/qLeft)+'/kvartal';
    }
  }
  if(r.achieved)return' <span style="font-size:11px;color:var(--red);font-weight:700">\u2713 oppn\u00e5dd'+saveTxt+'</span>';
  var ml=monthsLeft(r);
  var txt='frist '+MND_FULL[r.month-1]+' '+r.year;
  if(ml<0)return' <span style="font-size:11px;color:var(--muted);font-weight:400">'+txt+' \u00b7 passert'+saveTxt+'</span>';
  return' <span style="font-size:11px;color:var(--rose);font-weight:400">'+txt+' \u00b7 '+(ml===0?'denne m\u00e5neden':ml+' mnd igjen')+saveTxt+'</span>';
}
function resultCatMatch(r,entryCats){
  var sc=r.subCats||[];
  if(!sc.length)return false;
  return(entryCats||[]).some(function(cid){
    if(sc.includes(cid))return true;
    var c=catById(cid);
    return!!(c&&c.parentId&&sc.includes(c.parentId));
  });
}
function openResultModal(){modal={step:'result',form:{name:'',valueId:'',month:curMonth,year:curYear+1,subCats:[],achieved:false,targetAmount:'',amountType:'spar',invIds:[],budgetCat:''}};render();}
function openEditResult(id){

/* ── Eksport / import ── */
function exportJSON(){
  var data=JSON.stringify({entries:entries,cats:cats,routines:routines,events:events,goals:goals,laters:laters,results:results,inventories:inventories,budgetRows:budgetRows,deposits:deposits},null,2);
  var blob=new Blob([data],{type:'application/json'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='takknemlighetsdagbok-'+isoDate(today)+'.json';
  a.click();
  try{localStorage.setItem(SK+'_backup',String(Date.now()));}catch(e){}
  render();
}
function importJSON(){
  var inp=document.createElement('input');
  inp.type='file';inp.accept='.json,application/json';
  inp.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var d=JSON.parse(ev.target.result);
        if(!d.entries)throw new Error('Ugyldig fil');
        entries=d.entries||[];cats=d.cats||[];routines=d.routines||[];events=d.events||[];goals=d.goals||[];laters=d.laters||[];results=d.results||[];inventories=d.inventories||[];budgetRows=d.budgetRows||[];deposits=d.deposits||[];
        save();render();
      }catch(err){alert('Kunne ikke lese filen: '+err.message);}
    };
    reader.readAsText(file);
  };
  inp.click();
}
function exportTekst(){
  var lines=['# Takknemlighetsdagbok','',''];
  var mains=cats.filter(function(c){return!c.parentId;}).sort(function(a,b){return nbSort(a.name,b.name);});
  mains.forEach(function(m){
    var subs=cats.filter(function(c){return c.parentId===m.id;}).sort(function(a,b){return nbSort(a.name,b.name);});
    var any=false;var block=['## '+m.name,''];
    var direct=entries.filter(function(e){return e.cats.includes(m.id);});
    if(direct.length){
      any=true;
      direct.slice().sort(function(a,b){return a.date<b.date?1:-1;}).forEach(function(e){
        block.push('- '+e.text+' _('+fmtDate(e.date)+')_'+((e.tags||[]).length?' #'+e.tags.join(' #'):''));
      });
      block.push('');
    }
    subs.forEach(function(s){
      var es=entries.filter(function(e){return e.cats.includes(s.id);});
      if(!es.length)return;
      any=true;block.push('### '+s.name,'');
      es.slice().sort(function(a,b){return a.date<b.date?1:-1;}).forEach(function(e){
        block.push('- '+e.text+' _('+fmtDate(e.date)+')_'+((e.tags||[]).length?' #'+e.tags.join(' #'):''));
      });
      block.push('');
    });
    if(any)lines=lines.concat(block);
  });
  var blob=new Blob([lines.join('\n')],{type:'text/markdown'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='takknemlighetsdagbok-'+isoDate(today)+'.md';
  a.click();
}

function cloudHTML(counts,clickable){
  var words=Object.keys(counts).sort(nbSort);
  if(!words.length)return'';
  var max=Math.max.apply(null,words.map(function(w){return counts[w];}));
  return'<div class="card"><div class="cloud">'+words.map(function(w){
    var c=counts[w];
    var size=13+Math.round((c/max)*15);
    var lv=Math.min(5,1+Math.floor((c-1)/max*5));
    var cls='cloud-word lv'+lv+(c>10?' hot':'')+(clickable&&selectedTag===w?' sel':'');
    if(clickable)return'<button class="'+cls+'" style="font-size:'+size+'px" onclick="selectTag(\''+q(w)+'\')">'+esc(w)+'</button>';
    return'<span class="'+cls+'" style="font-size:'+size+'px;cursor:default">'+esc(w)+'</span>';
  }).join('')+'</div></div>';
}

function mergeCat(fromId,toId){
  if(!fromId||!toId||fromId===toId)return;
  var from=catById(fromId),to=catById(toId);
  if(!from||!to)return;
  var remap=function(arr){
    var out=(arr||[]).map(function(cid){return cid===fromId?toId:cid;});
    return out.filter(function(c,i){return out.indexOf(c)===i;});
  };
  entries.forEach(function(e){e.cats=remap(e.cats);});
  routines.forEach(function(r){r.cats=remap(r.cats);});
  events.forEach(function(e){e.cats=remap(e.cats);});
  cats.forEach(function(c){if(c.parentId===fromId)c.parentId=toId;});
  cats=cats.filter(function(c){return c.id!==fromId;});
  budgetRows.forEach(function(b){if(b.catId===fromId)b.catId=toId;});
  save();closeModal();
}

function deleteCat(id){
  var c=cats.find(function(x){return x.id===id;});if(!c)return;
  if(!c.parentId){
    var subIds=cats.filter(function(x){return x.parentId===id;}).map(function(x){return x.id;});
    cats=cats.filter(function(x){return x.id!==id&&x.parentId!==id;});
    var strip=function(arr){return arr.filter(function(cid){return !subIds.includes(cid)&&cid!==id;});};
    entries.forEach(function(e){e.cats=strip(e.cats);});
    routines.forEach(function(r){r.cats=strip(r.cats||[]);});
    events.forEach(function(e){e.cats=strip(e.cats||[]);});
  } else {
    cats=cats.filter(function(x){return x.id!==id;});
    entries.forEach(function(e){e.cats=e.cats.filter(function(cid){return cid!==id;});});
    routines.forEach(function(r){r.cats=(r.cats||[]).filter(function(cid){return cid!==id;});});
    events.forEach(function(e){e.cats=(e.cats||[]).filter(function(cid){return cid!==id;});});
  }
  save();closeModal();
}

function updateSaveBtn(){
  var btn=document.querySelector('.save-btn');
  if(!btn||!modal)return;
  var step=modal.step,enabled=false;
  if(step==='entry'||step==='entry_edit')enabled=entryValid();
  if(step==='routine'||step==='routine_edit'||step==='event'||step==='event_edit')enabled=routineValid();
  if(step==='cat_new'){
    enabled=(mf()._newMain||'').trim().length>0;
  }
  if(step==='cat_edit'||step==='goal'||step==='goal_edit'||step==='later'||step==='later_edit')enabled=(mf().name||'').trim().length>0;
  if(step==='result'||step==='result_edit')enabled=(mf().name||'').trim().length>0&&!!mf().valueId;
  if(step==='invsec'||step==='invsec_edit'||step==='invitem'||step==='invitem_edit')enabled=(mf().name||'').trim().length>0;
  if(step==='inv'||step==='inv_edit')enabled=(mf().name||'').trim().length>0&&invLinked(mf());
  if(step==='deposit')enabled=!!parseKr(mf().amount);
  if(step==='posting')enabled=!!parseKr(mf().amount)&&!!mf().rowId;
  btn.disabled=!enabled;
}

var quickForm={text:'',cats:[],tags:''};
var planTab='verdier';
function toggleQuickCat(id){
  var a=quickForm.cats;
  quickForm.cats=a.includes(id)?a.filter(function(x){return x!==id;}):[].concat(a,[id]);
  render();
}
function submitQuick(){
  var text=(quickForm.text||'').trim();
  if(!text||!quickForm.cats.length)return;
  var tags=(quickForm.tags||'').split(',').map(function(v){return v.trim().toLowerCase();}).filter(Boolean)
    .filter(function(v,i,a){return a.indexOf(v)===i;});
  entries.unshift({id:'e'+Date.now()+Math.random().toString(36).slice(2,6),text:text,cats:quickForm.cats,tags:tags,date:isoDate(today)});
  quickForm={text:'',cats:[],tags:''};
  save();render();
}

  // Hurtiglogging — det første som møter deg

  // Dagens innlegg
  var todaysEntries=entries.filter(function(e){return e.date===todayIso;});
  if(todaysEntries.length){
    h+='<div class="view-sub" style="padding-top:10px;font-weight:600">Skrevet i dag</div>'
      +'<div class="card">'+todaysEntries.map(entryRowHTML).join('')+'</div>';
  }

  // På denne dagen — takknemlighet fra tidligere år
  var mmdd=todayIso.slice(5);
  var memYears={};
  entries.forEach(function(e){
    if(e.date.slice(5)!==mmdd)return;
    var ey=Number(e.date.slice(0,4));
    if(ey>=curYear)return;
    (memYears[ey]=memYears[ey]||[]).push(e);
  });
  var memKeys=Object.keys(memYears).map(Number).sort(function(a,b){return b-a;});
  if(memKeys.length){
    h+='<div class="view-sub" style="padding-top:10px;font-weight:600">P\u00e5 denne dagen</div><div class="card">';
    memKeys.forEach(function(ey){
      var diff=curYear-ey;
      h+='<div style="padding:8px 14px 2px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--rose)">'
        +(diff===1?'For ett \u00e5r siden':'For '+diff+' \u00e5r siden')+' \u00b7 '+ey+'</div>'
        +memYears[ey].map(entryRowHTML).join('');
    });
    h+='</div>';
  }

  // På denne dagen tidligere år
  var mmdd=todayIso.slice(5);
  var earlier=entries.filter(function(e){return e.date.slice(5)===mmdd&&e.date<todayIso;})
    .sort(function(a,b){return a.date<b.date?1:-1;});
  if(earlier.length){
    h+='<div class="view-sub" style="padding-top:12px;font-weight:600;color:var(--red)">På denne dagen tidligere år</div>'
      +'<div class="card">'+earlier.map(entryRowHTML).join('')+'</div>';
  }

  // Rutiner denne måneden
  var monthRoutines=routines.filter(function(r){
    var months=r.months||[];
    return !months.length||months.includes(curMonth);
  }).sort(function(a,b){return nbSort(a.name,b.name);});

  var chipItems=routineChipItems(monthRoutines,curMonth,curYear,true);
  if(chipItems.length){
    var doneCount=chipItems.filter(function(it){return it.done;}).length;
    h+='<div class="view-sub" style="padding-top:12px;font-weight:600">Rutiner i '+MND_FULL[curMonth-1]+' <span style="font-weight:400;color:var(--rose)">· '+doneCount+' av '+chipItems.length+'</span></div>'
      +'<div class="card">'+routineChipsHTML(chipItems)+'</div>';
  }

  // Hendelser denne måneden
  var monthEvents=monthEventsFor(curMonth,curYear)
    .sort(function(a,b){return(a.day||99)-(b.day||99)||nbSort(a.name,b.name);});
  if(monthEvents.length){
    h+='<div class="view-sub" style="padding-top:12px;font-weight:600">Hendelser i '+MND_FULL[curMonth-1]+'</div><div class="card">';
    monthEvents.forEach(function(e){
      var dn=evDone(e,curYear);
      var round=isRoundBdayInYear(e,curYear);
      h+='<div class="entry-row'+(round?' confetti round-bday':'')+'">'
        +(round?confettiHTML():'')
        +'<button class="chk'+(dn?' done':'')+'" onclick="toggleEvent(\''+q(e.id)+'\','+curYear+')">'+(dn?'✓':'')+'</button>'
        +'<div class="entry-body"><div class="entry-text">'+esc(e.name)+evYearsTag(e,curYear)+(round?' 🎉':'')+'</div>'
        +'<div class="entry-date">'+(e.day?e.day+'. '+MND_FULL[curMonth-1]:'i løpet av måneden')+(e.repeat?' · '+evFreqTxt(e):'')+'</div>'
        +catPillsHTML(e.cats)+'</div>'
        +(editMode?'<button class="icon-btn" style="font-size:11px;padding:2px 7px;align-self:center" onclick="openEditEvent(\''+q(e.id)+'\')">✎</button>':'')
        +'</div>';
    });
    h+='</div>';
  }

  if(!chipItems.length&&!monthEvents.length){
    h+='<div class="card"><div class="empty">Ingen rutiner eller hendelser denne måneden. Legg til under Planlegging.</div></div>';
  }

  var lb=0;try{lb=Number(localStorage.getItem(SK+'_backup')||0);}catch(e){}
  var bDays=lb?Math.floor((Date.now()-lb)/86400000):null;
  var bWarn=bDays===null||bDays>30;
  h+='<div class="hint-box" style="display:flex;align-items:center;gap:10px;margin-top:14px'+(bWarn?';color:var(--amber)':'')+'">'
    +'<span style="flex:1">Siste sikkerhetskopi: '+(bDays===null?'aldri':bDays===0?'i dag':bDays===1?'i går':bDays+' dager siden')+'</span>'
    +'<button class="icon-btn" style="flex-shrink:0" onclick="exportJSON()">Ta kopi nå</button></div>';

  // Tidligere i dagboka — bla i påbegynte og avsluttede måneder og år
  var byYear={};
  entries.forEach(function(e){
    var ey=Number(e.date.slice(0,4)),em=Number(e.date.slice(5,7));
    (byYear[ey]=byYear[ey]||{})[em]=((byYear[ey]||{})[em]||0)+1;
  });
  var archYears=Object.keys(byYear).map(Number).sort(function(a,b){return b-a;});

      var total=months.reduce(function(a,mm){return a+byYear[ay][mm];},0);

        +'<div style="display:flex;align-items:baseline;gap:8px;font-size:13px;font-weight:700">'+ay
        +'<span style="font-weight:400;font-size:11px;color:var(--rose)">'+total+' innlegg</span></div>'
        +'<div class="chips" style="margin-top:5px">'
        +months.map(function(mm){
          var cur=(ay===curYear&&mm===curMonth);
          return'<button class="chip" style="font-size:12px;padding:4px 11px" onclick="goDagbok('+mm+','+ay+')">'+cap(MND_FULL[mm-1])+(cur?' · nå':'')+' <span style="color:var(--rose)">'+byYear[ay][mm]+'</span></button>';

    });

  }

  return h;
}

function monthEventsFor(m,y){
  return events.filter(function(e){
    if(e.month!==m)return false;
    if(!e.repeat)return Number(e.year)===y;
    var start=Number(e.year);
    if(y<start)return false;
    var iv=Number(e.interval)||1;
    return(y-start)%iv===0;
  });
}

/* ── Bursdager: Dunbars tall og runde år ── */
var BDAY_MAX=150;
function bdayCount(){return events.filter(function(e){return e.bday;}).length;}
function bdayNextAge(e){
  var s=Number(e.sinceYear);if(!(s>0))return null;
  var passed=(e.month<curMonth)||(e.month===curMonth&&(e.day||31)<today.getDate());
  var age=(passed?curYear+1:curYear)-s;
  return age>0?age:null;
}
function isRoundBdayNext(e){
  if(!e.bday)return false;
  var a=bdayNextAge(e);
  return a!==null&&a%10===0;
}
function isRoundBdayInYear(e,y){
  if(!e.bday)return false;
  var n=evYears(e,y);
  return n!==null&&n%10===0;
}
function confettiHTML(){
  var cols=['#DE9273','#74A491','#4E7B8C','#E2C878','#8C5A74','#CC7F33','#8B7A9E','#A34A5E'];

  for(var i=0;i<8;i++){
    h+='<i style="left:'+(6+i*12)+'%;background:'+cols[i%cols.length]+';animation-delay:'+(i*0.33).toFixed(2)+'s"></i>';
  }
  return h;
}

function weekNum(date){
  var d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));
  var day=(d.getUTCDay()+6)%7;
  d.setUTCDate(d.getUTCDate()-day+3);
  var thu=d.getTime();
  d.setUTCMonth(0,1);
  if(d.getUTCDay()!==4)d.setUTCMonth(0,1+((4-d.getUTCDay())+7)%7);
  return 1+Math.round((thu-d.getTime())/(7*24*3600*1000));
}

function isWeekly(r){return r.freq==='weekly'||r.freq==='odd'||r.freq==='even';}
function weekYear(date){
  var d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));
  var day=(d.getUTCDay()+6)%7;
  d.setUTCDate(d.getUTCDate()-day+3);
  return d.getUTCFullYear();
}
function routineWeeksIn(m,y,freq){
  var daysIn=new Date(y,m,0).getDate();
  var seen={},list=[];
  for(var d=1;d<=daysIn;d++){
    var dt=new Date(y,m-1,d);
    var wn=weekNum(dt);
    var key='w'+weekYear(dt)+'-'+pad(wn);
    if(seen[key])continue;seen[key]=1;
    if(freq==='odd'&&wn%2===0)continue;
    if(freq==='even'&&wn%2===1)continue;
    list.push({week:wn,key:key});
  }
  return list;
}
function routineChipItems(list,m,y,onlyCurrentWeek){
  var ym=y+'-'+pad(m);
  var items=[];
  var nowKey='w'+weekYear(today)+'-'+pad(weekNum(today));
  list.forEach(function(r){
    if(isWeekly(r)){
      routineWeeksIn(m,y,r.freq).forEach(function(w){
        if(onlyCurrentWeek&&w.key!==nowKey)return;
        items.push({rid:r.id,key:w.key,label:r.name+' · uke '+w.week,done:(r.log||[]).includes(w.key)});
      });
    } else {
      items.push({rid:r.id,key:ym,label:r.name,done:(r.log||[]).includes(ym)});
    }
  });
  return items;
}
function routineChipsHTML(items){
  var h='<div class="rt-chips">';

}

function miniMonthHTML(m,y){

function routineMonthStatus(r,m,y){
  var ym=y+'-'+pad(m);
  if(isWeekly(r)){
    var weeks=routineWeeksIn(m,y,r.freq);
    var dn=weeks.filter(function(w){return(r.log||[]).includes(w.key);}).length;
    return{done:weeks.length>0&&dn===weeks.length,txt:dn+'/'+weeks.length+' uker'};
  }
  return{done:(r.log||[]).includes(ym),txt:null};
}
function hasMonthContent(m,y){
  var ym=y+'-'+pad(m);
  if(entries.some(function(e){return e.date.slice(0,7)===ym;}))return true;
  if(routines.some(function(r){
    if(isWeekly(r)){
      return routineWeeksIn(m,y,r.freq).some(function(w){return(r.log||[]).includes(w.key);});
    }
    return(r.log||[]).includes(ym);
  }))return true;
  if(monthEventsFor(m,y).some(function(e){return evDone(e,y);}))return true;
  return false;
}
function goalGroupSort(rows){
  return rows.sort(function(a,b){
    var ga=a.gent.length?0:(a.done>0?1:(a.total>0?2:3));
    var gb=b.gent.length?0:(b.done>0?1:(b.total>0?2:3));
    if(ga!==gb)return ga-gb;
    if(ga===0&&a.gent.length!==b.gent.length)return b.gent.length-a.gent.length;
    return nbSort(a.g.name,b.g.name);
  });
}

      +'<div class="card"><div style="padding:10px 14px;font-size:13px">'
      +'Inntekter '+fmtKr(eInA)+' av '+fmtKr(eInP)+' kr \u00b7 utgifter '+fmtKr(eUtA)+' av '+fmtKr(eUtP)+' kr'
      +'<div style="margin-top:4px">Balanse: plan '+fmtKr(balP)+' kr \u00b7 faktisk <span style="color:'+(balA<0?'var(--amber)':'var(--red)')+';font-weight:700">'+fmtKr(balA)+' kr</span></div>'
      +(yDeps?'<div style="margin-top:4px;color:var(--muted)">Spart til m\u00e5l i '+y+': '+fmtKr(yDeps)+' kr</div>':'')
      +'<div style="margin-top:4px"><button class="icon-btn" style="font-size:11px;padding:1px 8px" onclick="goBudsjett('+y+')">\u00c5pne budsjettet \u203a</button></div>'
      +'</div></div>';
  }
  if(!goals.length){
    h+='<div class="card"><div class="empty">Ingen verdier enn\u00e5. Legg til under Planlegging, s\u00e5 bygges rapporten rundt dem.</div></div>';
  } else {
    var rows=goals.map(function(g){
      var resIdSet=resultsFor(g.id).map(function(x){return x.id;});
      var gr=routines.filter(function(r){return(r.goalIds||[]).includes(g.id)||(r.resultIds||[]).some(function(x){return resIdSet.includes(x);});}).map(function(r){
        var active=[],dn=0;
        for(var mm=fromM;mm<=12;mm++){
          var mo=r.months||[];
          if(mo.length&&!mo.includes(mm))continue;
          active.push(mm);
          if(routineMonthStatus(r,mm,y).done)dn++;
        }
        return{r:r,done:dn,total:active.length};
      });
      var ge=yEvents.filter(function(e){return(e.goalIds||[]).includes(g.id)||(e.resultIds||[]).some(function(x){return resIdSet.includes(x);});});
      var gent=yearEntries.filter(function(e){return goalCatMatch(g,e.cats);});
      var total=gr.length+ge.length;
      var done=gr.filter(function(x){return x.total>0&&x.done===x.total;}).length
              +ge.filter(function(e){return evDone(e,y);}).length;
      return{g:g,gr:gr,ge:ge,gent:gent,total:total,done:done};
    });
    goalGroupSort(rows).forEach(function(row){
      var g=row.g;
      var gCol=goalColor(g);
      h+='<div class="card" style="margin-top:14px'+(gCol?';border-left:4px solid '+gCol:'')+'">'
        +'<div style="display:flex;align-items:center;gap:8px;padding:11px 14px;border-bottom:1px solid var(--line)">'
        +'<span style="font-weight:700;flex:1;color:var(--red)">'+esc(g.name)+'</span>'
        +(row.total?'<span style="font-size:12px;color:var(--rose)">'+row.done+'/'+row.total+' \u2713</span>':'')
        +'</div>';

      var vRes=resultsFor(g.id);
      var rLine=function(x){
        var d=x.total>0&&x.done===x.total;
        return'<div style="font-size:13px;padding:2px 0">'+(d?'<span style="color:var(--red);font-weight:700">\u2713</span>':'<span style="color:var(--rose)">\u25cb</span>')+' '+esc(x.r.name)+' <span style="color:var(--muted);font-size:11px">'+x.done+'/'+x.total+' m\u00e5neder</span></div>';
      };
      var eLine=function(e){
        var d=evDone(e,y);
        return'<div style="font-size:13px;padding:2px 0">'+(d?'<span style="color:var(--red);font-weight:700">\u2713</span>':'<span style="color:var(--rose)">\u25cb</span>')+' '+esc(e.name)+' <span style="color:var(--muted);font-size:11px">'+MND_FULL[e.month-1]+'</span></div>';
      };
      var shownY={};
      vRes.forEach(function(x){
        var xr=row.gr.filter(function(w){return(w.r.resultIds||[]).includes(x.id);});
        var xe=row.ge.filter(function(e){return(e.resultIds||[]).includes(x.id);});
        var xEnt=(x.subCats||[]).length?yearEntries.filter(function(e){return resultCatMatch(x,e.cats);}).length:null;
        h+=secLbl(esc(x.name)+resultDeadlineHTML(x));
      inventories.filter(function(iv){return(iv.resultIds||[]).includes(x.id);}).forEach(function(iv){
        var ic=invCounts(iv);
        h+='<div style="padding:0 14px 4px;font-size:12px;color:var(--muted)">'+esc(iv.name)+': '+ic.have+'/'+ic.total+(ic.missing?' \u00b7 mangler '+ic.missing:' \u00b7 komplett')+'</div>';
      });
        if(xr.length||xe.length){
          h+='<div style="padding:2px 14px 6px">';
          xr.forEach(function(w){shownY[w.r.id]=1;h+=rLine(w);});
          xe.forEach(function(e){shownY[e.id]=1;h+=eLine(e);});
          h+='</div>';
        }
        if(xEnt!==null)h+='<div style="padding:0 14px 8px;font-size:12px;color:var(--muted)">Takknemlighet \u00b7 '+xEnt+' innlegg i resultatets underkategorier</div>';
        if(!xr.length&&!xe.length&&xEnt===null)h+='<div style="padding:4px 14px 10px;font-size:12px;color:var(--muted)">Ingen rutiner eller planer koblet enn\u00e5.</div>';
      });
      var dirRY=row.gr.filter(function(w){return!shownY[w.r.id];});
      var dirEY=row.ge.filter(function(e){return!shownY[e.id];});
      if(dirRY.length||dirEY.length){
        h+=secLbl(vRes.length?'Direkte p\u00e5 verdien':'Rutiner og hendelser')
          +'<div style="padding:2px 14px 10px">';
        dirRY.forEach(function(w){h+=rLine(w);});
        dirEY.forEach(function(e){h+=eLine(e);});
        h+='</div>';
      } else if(!vRes.length){
        h+=secLbl('Rutiner og hendelser')+secNote('Ingenting knyttet til denne verdien i '+y+'.');
      }

      if(!(g.cats||[]).length){
        h+=secLbl('Takknemlighet')
          +secNote('Koble verdien til hovedkategorier (via \u270e under Planlegging) for \u00e5 se takknemligheten den gir.');
      } else {
        h+=secLbl('Takknemlighet \u00b7 '+row.gent.length);
        if(row.gent.length){
          var perM={};
          row.gent.forEach(function(e){var mm=Number(e.date.slice(5,7));perM[mm]=(perM[mm]||0)+1;});
          var dist=Object.keys(perM).map(Number).sort(function(a,b){return a-b;})
            .map(function(mm){return MND_FULL[mm-1].slice(0,3)+' '+perM[mm];}).join(' \u00b7 ');
          h+='<div style="padding:2px 14px 10px;font-size:13px">'+dist+'</div>'
            +secNote('\u00c5pne m\u00e5nedsrapportene for \u00e5 lese innleggene.');
        } else {
          h+=secNote('Ingen innlegg i tilknyttede kategorier i '+y+'.');
        }
      }
      h+='</div>';
    });
  }

  var yrs=yearsWithContent().filter(function(yy){return yy!==y;});
  if(yrs.length){
    h+='<div class="view-sub" style="padding-top:14px;font-weight:600">Andre \u00e5rsrapporter</div>'
      +'<div class="card"><div class="rt-chips">'
      +yrs.map(function(yy){return'<button class="rt-btn" onclick="goArsrapport('+yy+')">'+yy+'</button>';}).join('')
      +'</div></div>';
  }
  return h;
}

function ganttHTML(){
  var projs=inventories.filter(function(iv){return(iv.type||'inventar')==='prosjekt'&&(iv.startDate||iv.endDate);});
  if(!projs.length)return'';
  // Tidsvindu i hele måneder, begrenset til 18
  var minD=null,maxD=null;
  projs.forEach(function(iv){
    var a=iv.startDate||iv.endDate,b=iv.endDate||iv.startDate;
    if(!minD||a<minD)minD=a;
    if(!maxD||b>maxD)maxD=b;
  });
  var tNow=isoDate(today);
  if(tNow<minD)minD=tNow;
  if(tNow>maxD)maxD=tNow;
  var m0=new Date(Number(minD.slice(0,4)),Number(minD.slice(5,7))-1,1);
  var m1=new Date(Number(maxD.slice(0,4)),Number(maxD.slice(5,7)),0);
  var months=[];
  var cur=new Date(m0);
  while(cur<=m1&&months.length<18){
    months.push({y:cur.getFullYear(),m:cur.getMonth()+1});
    cur.setMonth(cur.getMonth()+1);
  }
  var span=months.length;
  var mStart=new Date(months[0].y,months[0].m-1,1);
  var mEnd=new Date(months[span-1].y,months[span-1].m,0);
  var total=mEnd-mStart;
  var pct=function(d){return Math.max(0,Math.min(100,(new Date(d)-mStart)/total*100));};

  var h='<div class="view-sub" style="padding-top:8px;font-weight:600">Prosjektene i tid</div>'
    +'<div class="card" style="padding:10px 14px 12px">';
  // Månedslinjal
  h+='<div style="display:flex;margin-left:88px">';
  months.forEach(function(mo){
    h+='<div style="flex:1;font-size:8px;color:var(--muted);text-align:center;border-left:1px solid var(--line);overflow:hidden">'
      +MND_FULL[mo.m-1].slice(0,1).toUpperCase()+(mo.m===1||months[0].m===mo.m&&months[0].y===mo.y?'<br>'+String(mo.y).slice(2):'')+'</div>';
  });
  h+='</div>';
  // Rader
  projs.sort(function(a,b){return(a.startDate||a.endDate)<(b.startDate||b.endDate)?-1:1;}).forEach(function(iv){
    var a=iv.startDate||iv.endDate,b=iv.endDate||iv.startDate;
    var l=pct(a),r=pct(b);
    var w=Math.max(2,r-l);
    var col=iv.completedDate?'var(--done-line)':(b<tNow?'var(--amber)':(a<=tNow?'var(--red)':'var(--rose)'));
    h+='<div style="display:flex;align-items:center;gap:0;margin-top:6px;cursor:pointer" onclick="goInventar(\''+q(iv.id)+'\')">'
      +'<span style="width:88px;flex-shrink:0;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:6px'+(iv.completedDate?';color:var(--muted)':'')+'">'+(iv.completedDate?'\u2713 ':'')+esc(iv.name)+'</span>'
      +'<div style="flex:1;position:relative;height:14px;background:var(--bg);border-radius:7px">'
      +'<div style="position:absolute;left:'+l.toFixed(1)+'%;width:'+w.toFixed(1)+'%;top:2px;bottom:2px;border-radius:5px;background:'+col+'"></div>'
      +'<div style="position:absolute;left:'+pct(tNow).toFixed(1)+'%;top:-2px;bottom:-2px;width:1.5px;background:var(--ink);opacity:.55"></div>'
      +'</div></div>';
  });
  h+='<div style="display:flex;gap:12px;margin-top:10px;font-size:9px;color:var(--muted)">'
    +'<span><span style="display:inline-block;width:14px;height:7px;border-radius:3px;background:var(--red);vertical-align:middle"></span> p\u00e5g\u00e5r</span>'
    +'<span><span style="display:inline-block;width:14px;height:7px;border-radius:3px;background:var(--rose);vertical-align:middle"></span> kommer</span>'
    +'<span><span style="display:inline-block;width:14px;height:7px;border-radius:3px;background:var(--amber);vertical-align:middle"></span> frist passert</span>'
    +'<span><span style="display:inline-block;width:14px;height:7px;border-radius:3px;background:var(--done-line);vertical-align:middle"></span> ferdigstilt</span>'
    +'<span>| i dag</span>'
    +'</div>';
  h+='</div>';
  return h;
}

      +'</div>'
      +(vals?'<div class="entry-date">'+vals+'</div>':'')
      +(it.note?'<div style="font-size:12px;font-style:italic;color:var(--muted)">'+esc(it.note)+'</div>':'')
      +(function(){var ln=invItemLinkNames(it);return ln.length?'<div class="entry-date" style="color:var(--red)">\u2192 '+esc(ln.join(' \u00b7 '))+'</div>':'';})()
      +(function(){

        return others.length?'<div style="font-size:11px;color:var(--rose)">Ogs\u00e5 p\u00e5: '+esc(others.join(' \u00b7 '))+'</div>':'';

      +'</div>';

  var secs=[].concat(inv.sections||[]);

      +'<button class="icon-btn" style="font-size:11px;padding:1px 8px" onclick="openInvItemModal(\''+q(inv.id)+'\',\''+q(sc.id)+'\')">'+(isProj?'+ milep\u00e6l':'+ punkt')+'</button>'

    h+=rowsHtml||(invShowMissing?'':'<div style="padding:2px 14px 8px;font-size:12px;color:var(--muted)">Ingen punkter enn\u00e5.</div>');

      return nbSort(a.name,b.name);}).map(itemRow).join('');
  }
  if(!secs.length&&!lone.length){
    h+='<div class="empty">Tom liste. Start med en overskrift, eller legg punkter rett inn.</div>';

  return h;
